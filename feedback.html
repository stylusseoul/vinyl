<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Stylus Feedback</title>
    <!-- 외부 설정 파일 로드 (REQUEST_API_URL 포함) -->
    <script src="config.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@200;400;600&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web" defer></script>
    <style>
        :root {
            --bg:      #080808;
            --surface: #111;
            --border:  rgba(255,255,255,0.05);
            --text:    #fff;
            --sub:     rgba(255,255,255,0.38);
            --sub2:    rgba(255,255,255,0.18);
            --accent:  #EF7C1C;
            --font:    'Inter', -apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); color: var(--text); font-family: var(--font); 
            line-height: 1.6; -webkit-font-smoothing: antialiased; 
            min-height: 100vh; display: flex; flex-direction: column; 
        }

        .eng { font-family: 'Outfit', sans-serif; }

        @keyframes fadeUp { 
            from { opacity: 0; transform: translateY(15px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        .animate-up { animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }

        header { 
            position: relative; background: var(--bg);
            padding: 40px 24px 10px; 
            text-align: center; display: flex; flex-direction: column; align-items: center;
        }
        .logo-img { height: 28px; width: auto; margin-bottom: 6px; filter: brightness(0) invert(1); opacity: 0.95; }
        .page-title { 
            font-size: 11px; font-weight: 800; color: var(--accent); 
            letter-spacing: 0.18em; text-transform: uppercase; 
            position: relative; padding-bottom: 10px;
        }
        .page-title::after {
            content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 20px; height: 1px; background: var(--accent); opacity: 0.6;
        }

        /* 컨텐츠 영역 패딩 조정 */
        main { padding: 0 24px 20px; max-width: 500px; margin: 0 auto; width: 100%; flex: 1; display: flex; flex-direction: column; gap: 40px; }

        .feedback-intro { text-align: center; margin-top: 10px; }
        .intro-title { font-size: 18px; font-weight: 600; margin-bottom: 8px; color: var(--text); }
        .intro-desc { font-size: 13px; color: var(--sub); word-break: keep-all; line-height: 1.6; }

        .feedback-form { display: flex; flex-direction: column; gap: 28px; }
        .form-group { display: flex; flex-direction: column; gap: 10px; }
        .form-header { display: flex; justify-content: space-between; align-items: center; }
        .form-label { font-size: 12px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.05em; }

        .anon-toggle { display: flex; align-items: center; gap: 6px; cursor: pointer; user-select: none; }
        .anon-toggle input { display: none; }
        .anon-toggle .checkbox-ui { 
            width: 16px; height: 16px; border: 1px solid var(--sub); border-radius: 4px; 
            display: flex; align-items: center; justify-content: center; transition: all 0.2s;
        }
        .anon-toggle input:checked + .checkbox-ui { background: var(--accent); border-color: var(--accent); }
        .anon-toggle .checkbox-ui i { font-size: 12px; color: #000; display: none; }
        .anon-toggle input:checked + .checkbox-ui i { display: block; }
        .anon-text { font-size: 12px; color: var(--sub); font-weight: 500; }

        .category-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .category-chip {
            background: var(--surface); border: 1px solid var(--border);
            padding: 12px 6px; border-radius: 12px; text-align: center;
            font-size: 12px; color: var(--sub); cursor: pointer; transition: all 0.2s;
        }
        .category-chip.active { background: rgba(239, 124, 28, 0.1); border-color: var(--accent); color: var(--accent); font-weight: 600; }

        input[type="text"], textarea {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 14px; padding: 16px; color: var(--text);
            font-family: var(--font); font-size: 14px; width: 100%; outline: none; transition: all 0.2s;
        }
        input[type="text"]:focus, textarea:focus { border-color: rgba(239, 124, 28, 0.5); }
        input[type="text"]:disabled { opacity: 0.4; cursor: not-allowed; background: rgba(255,255,255,0.02); }
        textarea { height: 160px; resize: none; line-height: 1.6; }
        input::placeholder, textarea::placeholder { color: var(--sub2); }

        .submit-btn {
            background: var(--accent); color: #000; border: none;
            border-radius: 16px; padding: 18px; font-size: 15px; font-weight: 700;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            cursor: pointer; transition: transform 0.2s, opacity 0.2s;
        }
        .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .submit-btn:active:not(:disabled) { transform: scale(0.98); }

        /* 푸터 패딩 조정 */
        .list-footer {
            padding: 20px 24px; 
            border-top: 1px solid var(--border);
            display: flex; flex-direction: column; align-items: center; gap: 12px; text-align: center;
        }
        .footer-desc { font-size: 12px; font-weight: 300; color: var(--sub); line-height: 1.85; font-style: italic; max-width: 320px; }
        .footer-insta {
            display: inline-flex; align-items: center; justify-content: center; gap: 6px;
            text-decoration: none; color: var(--sub); font-size: 12px; font-weight: 500;
            border: 1px solid var(--border); border-radius: 999px; padding: 8px 14px;
        }
        .footer-insta svg { width: 15px; height: 15px; display: block; }

        #toast {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            background: var(--accent); color: #fff; padding: 12px 24px; border-radius: 999px;
            font-size: 13px; font-weight: 600; opacity: 0; transition: all 0.3s; z-index: 1000;
            pointer-events: none;
        }
        #toast.show { opacity: 1; transform: translate(-50%, -10px); }
    </style>
</head>
<body>

    <header class="animate-up">
        <img src="https://stylusseoul.github.io/vinyl/images/logo.png" alt="Stylus" class="logo-img">
        <div class="page-title">FEEDBACK</div>
    </header>

    <main>
        <section class="feedback-intro animate-up delay-1">
            <h2 class="intro-title">의견을 남겨주세요</h2>
            <p class="intro-desc">스타일러스에서의 경험은 어떠셨나요? <br>남겨주시는 소중한 의견은 더 나은 공간을 위해 활용됩니다.</p>
        </section>

        <form id="feedbackForm" class="feedback-form animate-up delay-2" onsubmit="return handleFormSubmit(event)">
            <div class="form-group">
                <label class="form-label">Category</label>
                <div class="category-grid" id="categoryContainer">
                    <div class="category-chip active" onclick="selectCategory(this, '제안')">제안 / 아이디어</div>
                    <div class="category-chip" onclick="selectCategory(this, '칭찬')">칭찬 / 응원</div>
                    <div class="category-chip" onclick="selectCategory(this, '불편')">불편 사항</div>
                    <div class="category-chip" onclick="selectCategory(this, '기타')">기타</div>
                </div>
                <input type="hidden" id="categoryInput" value="제안">
            </div>

            <div class="form-group">
                <div class="form-header">
                    <label class="form-label">Name / Contact</label>
                    <label class="anon-toggle">
                        <input type="checkbox" id="isAnonymous" onchange="toggleAnonymous(this)">
                        <div class="checkbox-ui"><i class="ph-bold ph-check"></i></div>
                        <span class="anon-text">익명으로 남기기</span>
                    </label>
                </div>
                <input type="text" id="userName" placeholder="성함 또는 연락처를 입력해주세요" autocomplete="off">
            </div>

            <div class="form-group">
                <label class="form-label">Message</label>
                <textarea id="userMessage" placeholder="자유롭게 의견을 적어주세요." required></textarea>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">
                <span>보내기</span>
                <i class="ph-bold ph-paper-plane-right"></i>
            </button>
        </form>
    </main>

    <footer class="list-footer animate-up delay-3">
        <p class="footer-desc">A small room designed for listening, where sound is free to breathe and time is never in a hurry.</p>
        <a class="footer-insta" href="https://www.instagram.com/stylus.seoul" target="_blank" rel="noopener noreferrer">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><circle cx="12" cy="12" r="4.5"/><circle cx="17.5" cy="6.5" r="0.8" fill="currentColor" stroke="none"/></svg>
            <span>stylus.seoul</span>
        </a>
    </footer>

    <div id="toast">의견이 전달되었습니다. 감사합니다!</div>

    <script>
        function selectCategory(element, value) {
            const chips = document.querySelectorAll('.category-chip');
            chips.forEach(chip => chip.classList.remove('active'));
            element.classList.add('active');
            document.getElementById('categoryInput').value = value;
        }

        function toggleAnonymous(checkbox) {
            const nameInput = document.getElementById('userName');
            if (checkbox.checked) {
                nameInput.value = "";
                nameInput.placeholder = "익명으로 작성됩니다";
                nameInput.disabled = true;
            } else {
                nameInput.placeholder = "성함 또는 연락처를 입력해주세요";
                nameInput.disabled = false;
            }
        }

        async function handleFormSubmit(event) {
            event.preventDefault();
            const btn = document.getElementById('submitBtn');
            const originalText = btn.innerHTML;
            
            const category = document.getElementById('categoryInput').value;
            const isAnon = document.getElementById('isAnonymous').checked;
            const name = isAnon ? "익명" : (document.getElementById('userName').value || "미입력");
            const contents = document.getElementById('userMessage').value;

            const payload = {
                type: 'feedback',
                category: category,
                name: name,
                contents: contents
            };

            try {
                btn.disabled = true;
                btn.innerHTML = '<span>전송 중...</span>';

                const base64Data = btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
                
                const response = await fetch(REQUEST_API_URL, {
                    method: 'POST',
                    body: base64Data
                });

                const result = await response.text();

                if (result.toLowerCase().includes("success")) {
                    showToast("의견이 전달되었습니다. 감사합니다!");
                    document.getElementById('feedbackForm').reset();
                    const defaultChip = document.querySelector('.category-chip');
                    selectCategory(defaultChip, '제안');
                    document.getElementById('userName').disabled = false;
                } else {
                    throw new Error(result);
                }
            } catch (error) {
                console.error(error);
                showToast("전송에 실패했습니다. 다시 시도해 주세요.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalText;
            }

            return false;
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            if (msg) toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }
    </script>

</body>
</html>
