<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STYLUS | ICE BREAKER</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    <style>
        :root { --black: #000; --white: #fff; --gray: #888; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--black);
            color: var(--white);
            font-family: "Pretendard", sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 기존 스타일러스 헤더 스타일 */
        header {
            padding: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            position: absolute;
            top: 0;
        }
        .logo { font-size: 20px; font-weight: 700; text-decoration: none; color: var(--white); letter-spacing: -0.5px; }
        .nav-info { font-size: 11px; color: var(--gray); letter-spacing: 0.2em; text-transform: uppercase; }

        main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        /* 번호 표시 및 애니메이션 */
        #number-display {
            font-size: 15vw;
            font-weight: 800;
            margin-bottom: 30px;
            cursor: default;
            transition: transform 0.3s ease;
        }
        #number-display.clickable { cursor: pointer; text-shadow: 0 0 25px rgba(255,255,255,0.6); }
        #number-display.clickable:hover { transform: scale(1.05); }
        .shuffling { filter: blur(4px); opacity: 0.6; }

        .btn-draw {
            background: none; border: 1px solid #333; color: var(--white);
            padding: 14px 40px; font-size: 12px; letter-spacing: 0.2em;
            cursor: pointer; transition: 0.3s;
        }
        .btn-draw:hover { border-color: var(--white); background: var(--white); color: var(--black); }

        /* 결과 화면 (따란!) */
        #result-overlay {
            position: fixed; inset: 0; background: var(--black);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            padding: 40px; z-index: 100; text-align: center;
        }
        .res-label { font-size: 10px; color: var(--gray); letter-spacing: 0.4em; margin-bottom: 20px; }
        .res-q { font-size: 2.2rem; font-weight: 600; line-height: 1.5; margin-bottom: 50px; word-break: keep-all; max-width: 700px; }
        .res-p { font-size: 1.4rem; border-bottom: 1.5px solid var(--white); padding-bottom: 8px; font-weight: 500; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">STYLUS</a>
        <div class="nav-info">Ice Breaking Session</div>
    </header>

    <main>
        <div id="number-display">00</div>
        <button id="draw-btn" class="btn-draw" onclick="startDraw()">PICK A NUMBER</button>
    </main>

    <div id="result-overlay" onclick="closeResult()">
        <div class="res-label">QUESTION</div>
        <div id="display-q" class="res-q">질문이 여기에 표시됩니다.</div>
        <div class="res-label">SPEAKER</div>
        <div id="display-p" class="res-p">참여자</div>
        <div style="margin-top: 80px; font-size: 9px; color: #333; letter-spacing: 0.1em;">CLICK TO CLOSE</div>
    </div>

    <script>
        // 제공해주신 URL의 형식을 CSV 추출용으로 자동 변경합니다.
        const BASE_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTXikyTZ6Abe3Ome-3JYTQK83jSC7vpQXKBPqLuGhNLVmn_1Dzh48iVB77w_9GbUCHO4VuK2K3LZ48P/pub?output=csv';

        let questions = [];
        let participants = [];

        // 데이터 로드 함수
        function loadSheetData() {
            Papa.parse(BASE_URL, {
                download: true,
                complete: function(results) {
                    const data = results.data;
                    // B1: 참여자 명단
                    if(data[0] && data[0][1]) participants = data[0][1].split(',').map(n => n.trim());
                    // B4부터 질문 리스트 (빈 칸 제외)
                    questions = data.slice(3).map(row => row[1]).filter(q => q && q.trim() !== "");
                    console.log("Data Loaded:", { questions, participants });
                }
            });
        }

        const display = document.getElementById('number-display');
        const btn = document.getElementById('draw-btn');

        function startDraw() {
            if (questions.length === 0) return alert("데이터를 불러오는 중입니다. 잠시만 기다려주세요.");
            
            btn.style.display = 'none';
            display.classList.add('shuffling');

            let count = 0;
            const timer = setInterval(() => {
                display.innerText = Math.floor(Math.random() * questions.length) + 1;
                count++;
                if (count > 18) {
                    clearInterval(timer);
                    const finalIdx = Math.floor(Math.random() * questions.length);
                    display.innerText = (finalIdx + 1).toString().padStart(2, '0');
                    display.classList.remove('shuffling');
                    display.classList.add('clickable');
                    
                    // 번호를 클릭하면 결과 창 표시
                    display.onclick = () => {
                        const speaker = participants[Math.floor(Math.random() * participants.length)];
                        document.getElementById('display-q').innerText = `"${questions[finalIdx]}"`;
                        document.getElementById('display-p').innerText = speaker || "Anyone";
                        document.getElementById('result-overlay').style.display = 'flex';
                    };
                }
            }, 80);
        }

        function closeResult() {
            document.getElementById('result-overlay').style.display = 'none';
            display.innerText = "00";
            display.classList.remove('clickable');
            display.onclick = null;
            btn.style.display = 'inline-block';
        }

        // 초기화
        window.onload = loadSheetData;
    </script>
</body>
</html>
