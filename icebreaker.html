<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
    <title>Stylus - Ice Breaker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <style>
        :root {
            --bg: #080808; 
            --accent: #EF7C1C;
            --sub-text: rgba(255, 255, 255, 0.03); /* 숫자는 배경에 거의 녹아들게 */
            --main-text: #ffffff;
            --card-bg: #111111;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: var(--bg); 
            color: var(--main-text); 
            font-family: 'Inter', sans-serif; 
            height: 100dvh; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
        }

        /* HEADER: 기존 디자인 유지 */
        .list-header { 
            padding-top: env(safe-area-inset-top, 0); 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
        }
        .header-top { 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 20px; height: 64px; 
        }
        .logo-img { height: 26px; filter: invert(1); opacity: 0.9; }
        .header-label { font-size: 11px; font-weight: 700; color: var(--accent); letter-spacing: 0.2em; text-transform: uppercase; }

        /* MAIN: 레이아웃 밸런스 조정 */
        main { 
            flex: 1; position: relative; 
            display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
        }

        /* 배경 숫자: 레이아웃의 베이스 역할 */
        .visual-container { 
            position: absolute; width: 100%; height: 100%; 
            display: flex; align-items: center; justify-content: center; 
            pointer-events: none; 
        }
        #number-display { 
            font-size: 60vw; font-weight: 900; 
            color: var(--sub-text); 
            letter-spacing: -0.05em; 
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* 복선 힌트: 시각적 임팩트 중심 */
        #hint-display { 
            position: relative; z-index: 10;
            font-size: 1.8rem; font-weight: 800; 
            letter-spacing: -0.03em; 
            opacity: 0; transform: translateY(20px);
            transition: all 0.5s ease;
            text-align: center;
        }
        #hint-display.show { opacity: 1; transform: translateY(0); }
        #hint-display::after { 
            content: ''; display: block; width: 30px; height: 3px; 
            background: var(--accent); margin: 15px auto 0; 
        }

        /* 하단 버튼: 밸런스를 잡는 앵커 */
        .footer-group { 
            padding-bottom: calc(40px + env(safe-area-inset-bottom)); 
            display: flex; gap: 12px; z-index: 20; 
        }
        .draw-btn { 
            background: #fff; color: #000; border: none; 
            padding: 18px 50px; border-radius: 50px; 
            font-size: 14px; font-weight: 800; 
            text-transform: uppercase; cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .reroll-btn { 
            width: 54px; height: 54px; border-radius: 50%; 
            background: #1a1a1a; border: 1px solid rgba(255,255,255,0.1); 
            display: none; align-items: center; justify-content: center;
            cursor: pointer;
        }

        /* 결과 화면: 카드 디자인 */
        #result-overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); 
            display: none; flex-direction: column; 
            align-items: center; justify-content: center; 
            padding: 40px 30px; z-index: 1000; backdrop-filter: blur(10px);
        }
        .res-card { 
            background: var(--card-bg); width: 100%; max-width: 450px; 
            padding: 50px 30px; border-radius: 24px; 
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }
        .res-label { font-size: 10px; color: var(--accent); font-weight: 800; letter-spacing: 0.3em; margin-bottom: 24px; text-transform: uppercase; }
        .res-question { font-size: 24px; font-weight: 700; line-height: 1.6; margin-bottom: 40px; word-break: keep-all; }
        .speaker-tag { display: inline-block; padding: 8px 20px; background: #000; border-radius: 30px; font-size: 14px; font-weight: 600; }
    </style>
</head>
<body>
    <header class="list-header">
        <div class="header-top">
            <img src="images/logo.png" alt="Stylus" class="logo-img">
            <div class="header-label">Ice Breaker</div>
        </div>
    </header>

    <main>
        <div class="visual-container">
            <div id="number-display">00</div>
        </div>
        <div id="hint-display">#복선이_여기에</div>
    </main>

    <div class="footer-group">
        <button id="draw-btn" class="draw-btn" onclick="handleMainAction()">Pick a Number</button>
        <button id="reroll-btn" class="reroll-btn" onclick="runShuffle()">
            <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" style="width:20px;"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
        </button>
    </div>

    <div id="result-overlay" onclick="closeOverlay()">
        <div class="res-card">
            <div class="res-label">Selected Question</div>
            <div id="display-q" class="res-question">질문 데이터를 불러오는 중입니다...</div>
            <div class="res-label">Speaker</div>
            <div class="speaker-tag" id="display-p">...</div>
        </div>
        <div style="margin-top: 40px; font-size: 12px; color: rgba(255,255,255,0.3);">Tap anywhere to close</div>
    </div>

    <script>
        const SHEET_GID = '1769137139'; 
        const SHEET_URL = `https://docs.google.com/spreadsheets/d/e/2PACX-1vTXikyTZ6Abe3Ome-3JYTQK83jSC7vpQXKBPqLuGhNLVmn_1Dzh48iVB77w_9GbUCHO4VuK2K3LZ48P/pub?gid=${SHEET_GID}&output=csv`;

        let questionData = [];
        let participants = [];
        let currentState = 'init'; 
        let finalIdx = null;

        function initData() {
            Papa.parse(SHEET_URL, {
                download: true,
                complete: function(results) {
                    const data = results.data;
                    if (data[0] && data[0][1]) participants = data[0][1].split(',').map(n => n.trim());
                    questionData = data.slice(3).filter(r => r[1]).map(r => ({ q: r[1], h: r[2] || "???" }));
                }
            });
        }

        function handleMainAction() {
            if (currentState === 'init') runShuffle();
            else if (currentState === 'ready') showResult();
        }

        function runShuffle() {
            if (questionData.length === 0) return;
            currentState = 'shuffling';
            const btn = document.getElementById('draw-btn');
            const numEl = document.getElementById('number-display');
            const hintEl = document.getElementById('hint-display');
            
            btn.disabled = true;
            btn.innerText = 'Picking...';
            hintEl.classList.remove('show');
            numEl.style.color = "rgba(255,255,255,0.1)";

            let count = 0;
            const shuffleInterval = setInterval(() => {
                const tempIdx = Math.floor(Math.random() * questionData.length);
                numEl.innerText = (tempIdx + 1).toString().padStart(2, '0');
                if (++count > 20) {
                    clearInterval(shuffleInterval);
                    finalIdx = Math.floor(Math.random() * questionData.length);
                    numEl.innerText = (finalIdx + 1).toString().padStart(2, '0');
                    hintEl.innerText = questionData[finalIdx].h;
                    
                    numEl.style.color = "rgba(255,255,255,0.03)";
                    hintEl.classList.add('show');
                    
                    currentState = 'ready';
                    btn.disabled = false;
                    btn.innerText = 'Reveal Question';
                    document.getElementById('reroll-btn').style.display = 'flex';
                }
            }, 60);
        }

        function showResult() {
            const p = participants[Math.floor(Math.random() * participants.length)] || "Anyone";
            document.getElementById('display-q').innerText = questionData[finalIdx].q;
            document.getElementById('display-p').innerText = p;
            document.getElementById('result-overlay').style.display = 'flex';
        }

        function closeOverlay() {
            document.getElementById('result-overlay').style.display = 'none';
            document.getElementById('number-display').innerText = "00";
            document.getElementById('hint-display').classList.remove('show');
            document.getElementById('reroll-btn').style.display = 'none';
            document.getElementById('draw-btn').innerText = 'Pick a Number';
            currentState = 'init';
        }

        window.onload = initData;
    </script>
</body>
</html>
