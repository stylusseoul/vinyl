<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Stylus - Ice Breaker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <style>
        :root {
            --bg: #080808; 
            --accent: #EF7C1C;
            --sub-text: rgba(255, 255, 255, 0.03); 
            --main-text: #ffffff;
            --surface: #111;
            --border: rgba(255,255,255,0.08);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: var(--bg); 
            color: var(--main-text); 
            font-family: 'Inter', sans-serif; 
            height: 100dvh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* HEADER: 고정 높이 + 반응형 패딩 */
        .list-header { 
            flex-shrink: 0;
            padding-top: env(safe-area-inset-top, 0); 
            background: var(--bg);
            z-index: 100;
        }
        .header-top { 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 20px; height: 60px; 
            border-bottom: 1px solid var(--border);
        }
        .logo-img { height: 20px; filter: brightness(0) invert(1); }
        .header-label { font-size: 10px; font-weight: 800; color: var(--accent); letter-spacing: 0.15em; }

        /* MAIN: 반응형 유연성 확보 */
        main { 
            flex: 1; 
            position: relative; 
            display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
            padding: 0 20px;
        }

        /* 배경 숫자: 화면 너비에 맞춰 유동적으로 조절 */
        .visual-bg { 
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center; 
            z-index: 1; pointer-events: none;
        }
        #number-display { 
            font-size: min(60vw, 400px); /* 최대 크기 제한으로 태블릿 대응 */
            font-weight: 900; color: var(--sub-text); 
            line-height: 1; letter-spacing: -0.05em;
        }

        /* 힌트: 텍스트 길이에 맞춰 자동 줄바꿈 및 크기 조절 */
        #hint-display { 
            position: relative; z-index: 10;
            font-size: clamp(1.2rem, 5vw, 1.8rem); /* 최소/최대 폰트 크기 지정 */
            font-weight: 800; text-align: center;
            opacity: 0; transform: translateY(10px);
            transition: all 0.4s ease;
            max-width: 100%; word-break: keep-all;
        }
        #hint-display.show { opacity: 1; transform: translateY(0); }
        #hint-display::before {
            content: ''; display: block; width: 24px; height: 3px; 
            background: var(--accent); margin: 0 auto 16px;
        }

        /* FOOTER: 하단 고정 및 반응형 버튼 */
        .footer-group { 
            flex-shrink: 0;
            width: 100%;
            padding: 20px 20px calc(20px + env(safe-area-inset-bottom)); 
            display: flex; justify-content: center; align-items: center; 
            gap: 12px; z-index: 100;
        }
        .draw-btn { 
            flex: 1; max-width: 300px; height: 54px;
            background: #fff; color: #000; border: none; border-radius: 27px; 
            font-size: 14px; font-weight: 800; text-transform: uppercase; 
            cursor: pointer; transition: transform 0.1s;
        }
        .draw-btn:active { transform: scale(0.96); }
        .reroll-btn { 
            width: 54px; height: 54px; border-radius: 50%; 
            background: var(--surface); border: 1px solid var(--border); 
            display: none; align-items: center; justify-content: center;
        }

        /* RESULT OVERLAY: 모바일 최적화 */
        #result-overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.98); 
            display: none; flex-direction: column; align-items: center; justify-content: center; 
            padding: 20px; z-index: 2000; 
        }
        .res-card { 
            background: var(--surface); width: 100%; max-width: 400px; 
            padding: clamp(30px, 8vh, 50px) 24px; 
            border-radius: 28px; border: 1px solid var(--border); text-align: center;
        }
        .res-question { 
            font-size: clamp(1.2rem, 4.5vw, 1.6rem); 
            font-weight: 700; line-height: 1.6; margin-bottom: 40px; 
        }
        .speaker-tag { 
            padding: 8px 20px; background: #000; border-radius: 20px; 
            font-size: 14px; font-weight: 600; border: 1px solid var(--border);
        }
    </style>
</head>
<body>
    <header class="list-header">
        <div class="header-top">
            <img src="images/logo.png" alt="Stylus" class="logo-img">
            <div class="header-label">Ice Breaker</div>
        </div>
    </header>

    <main>
        <div class="visual-bg"><div id="number-display">00</div></div>
        <div id="hint-display"></div>
    </main>

    <div class="footer-group">
        <button id="draw-btn" class="draw-btn" onclick="handleAction()">Pick a Number</button>
        <button id="reroll-btn" class="reroll-btn" onclick="runShuffle()">
            <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" style="width:20px;"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
        </button>
    </div>

    <div id="result-overlay" onclick="closeOverlay()">
        <div class="res-card">
            <div class="res-label" style="font-size:10px; color:var(--accent); letter-spacing:0.2em; margin-bottom:15px; font-weight:800; text-transform:uppercase;">Selected Question</div>
            <div id="display-q" class="res-question">...</div>
            <div class="res-label" style="font-size:10px; color:var(--accent); letter-spacing:0.2em; margin-bottom:15px; font-weight:800; text-transform:uppercase;">Speaker</div>
            <div class="speaker-tag" id="display-p">...</div>
        </div>
    </div>

    <script>
        // (기존 스크립트 로직 동일하게 유지하되, 리사이즈 이슈 방지 위해 최적화)
        const SHEET_GID = '1769137139'; 
        const SHEET_URL = `https://docs.google.com/spreadsheets/d/e/2PACX-1vTXikyTZ6Abe3Ome-3JYTQK83jSC7vpQXKBPqLuGhNLVmn_1Dzh48iVB77w_9GbUCHO4VuK2K3LZ48P/pub?gid=${SHEET_GID}&output=csv`;

        let questionData = [];
        let participants = [];
        let currentState = 'init'; 
        let finalIdx = null;

        function initData() {
            Papa.parse(SHEET_URL, {
                download: true,
                complete: function(results) {
                    const data = results.data;
                    if (data[0] && data[0][1]) participants = data[0][1].split(',').map(n => n.trim());
                    questionData = data.slice(3).filter(r => r[1]).map(r => ({ q: r[1], h: r[2] || "#복선_없음" }));
                }
            });
        }

        function handleAction() {
            if (currentState === 'init') runShuffle();
            else if (currentState === 'ready') showResult();
        }

        function runShuffle() {
            if (questionData.length === 0) return;
            currentState = 'shuffling';
            const btn = document.getElementById('draw-btn');
            const numEl = document.getElementById('number-display');
            const hintEl = document.getElementById('hint-display');
            
            btn.disabled = true;
            btn.innerText = 'Picking...';
            hintEl.classList.remove('show');

            let count = 0;
            const shuffle = setInterval(() => {
                numEl.innerText = Math.floor(Math.random() * questionData.length + 1).toString().padStart(2, '0');
                if (++count > 15) {
                    clearInterval(shuffle);
                    finalIdx = Math.floor(Math.random() * questionData.length);
                    numEl.innerText = (finalIdx + 1).toString().padStart(2, '0');
                    hintEl.innerText = questionData[finalIdx].h;
                    hintEl.classList.add('show');
                    currentState = 'ready';
                    btn.disabled = false;
                    btn.innerText = 'Open Question';
                    document.getElementById('reroll-btn').style.display = 'flex';
                }
            }, 70);
        }

        function showResult() {
            document.getElementById('display-q').innerText = questionData[finalIdx].q;
            document.getElementById('display-p').innerText = participants[Math.floor(Math.random() * participants.length)] || "Guest";
            document.getElementById('result-overlay').style.display = 'flex';
        }

        function closeOverlay() {
            document.getElementById('result-overlay').style.display = 'none';
            document.getElementById('hint-display').classList.remove('show');
            document.getElementById('reroll-btn').style.display = 'none';
            document.getElementById('draw-btn').innerText = 'Pick a Number';
            currentState = 'init';
        }

        window.onload = initData;
    </script>
</body>
</html>
