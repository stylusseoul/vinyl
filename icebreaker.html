<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Stylus - Ice Breaker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <style>
        :root {
            --bg: #080808; 
            --accent: #EF7C1C;
            --sub-text: rgba(255, 255, 255, 0.03); 
            --main-text: #ffffff;
            --surface: #111;
            --border: rgba(255,255,255,0.08);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: var(--bg); 
            color: var(--main-text); 
            font-family: 'Inter', -apple-system, sans-serif; 
            height: 100dvh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* [HEADER] */
        .list-header { 
            position: relative;
            z-index: 2100;
            padding-top: env(safe-area-inset-top, 0); 
            background: var(--bg);
        }
        .header-top { 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 20px; height: 60px; 
            border-bottom: 1px solid var(--border);
        }
        .logo-img { height: 22px; filter: brightness(0) invert(1); }
        .header-label { font-size: 10px; font-weight: 800; color: var(--accent); letter-spacing: 0.15em; text-transform: uppercase; }

        /* [MAIN] */
        main { 
            flex: 1; 
            position: relative; 
            display: flex; align-items: center; justify-content: center; 
        }

        .visual-bg { 
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center; 
            z-index: 1; pointer-events: none;
            margin-top: -20px; /* 시각적 무게중심 보정 */
        }
        #number-display { 
            font-size: min(65vw, 450px); 
            font-weight: 900; color: var(--sub-text); 
            line-height: 1; letter-spacing: -0.05em;
        }

        /* 힌트: 언더라인 디테일 강화 */
        #hint-display { 
            position: relative; z-index: 10;
            font-size: clamp(1.4rem, 6vw, 2.2rem); 
            font-weight: 800; text-align: center;
            opacity: 0; transform: translateY(12px);
            transition: all 0.5s cubic-bezier(0.2, 1, 0.3, 1);
            
            display: inline-block;
            padding-bottom: 12px; /* 글자와 선 사이 여백 */
            border-bottom: 3px solid var(--accent); /* 슬림하고 세련된 3px */
            letter-spacing: -0.02em;
            word-break: keep-all;
        }
        #hint-display.show { opacity: 1; transform: translateY(0); }

        /* [FOOTER] */
        .footer-group { 
            width: 100%;
            padding: 20px 20px calc(30px + env(safe-area-inset-bottom)); 
            display: flex; justify-content: center; align-items: center; 
            gap: 12px; z-index: 100;
        }
        .draw-btn { 
            flex: 1; max-width: 280px; height: 56px;
            background: #fff; color: #000; border: none; border-radius: 28px; 
            font-size: 14px; font-weight: 800; text-transform: uppercase; 
            cursor: pointer; transition: transform 0.1s;
        }
        .draw-btn:active { transform: scale(0.97); }
        .reroll-btn { 
            width: 56px; height: 56px; border-radius: 50%; 
            background: var(--surface); border: 1px solid var(--border); 
            display: none; align-items: center; justify-content: center;
        }

        /* [RESULT OVERLAY] */
        #result-overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); 
            display: none; flex-direction: column; align-items: center; justify-content: center; 
            padding: 80px 24px 24px; z-index: 2000; backdrop-filter: blur(10px);
        }
        .res-card { 
            background: var(--surface); width: 100%; max-width: 420px; 
            padding: 50px 24px; border-radius: 32px; 
            border: 1px solid var(--border); text-align: center;
        }
        .res-label { font-size: 10px; color: var(--accent); font-weight: 800; letter-spacing: 0.25em; margin-bottom: 20px; text-transform: uppercase; }
        .res-question { font-size: 1.5rem; font-weight: 700; line-height: 1.6; margin-bottom: 45px; word-break: keep-all; }
        .speaker-tag { padding: 10px 24px; background: #000; border-radius: 25px; font-size: 15px; font-weight: 600; border: 1px solid var(--border); }
    </style>
</head>
<body>
    <header class="list-header">
        <div class="header-top">
            <a href="index.html"><img src="images/logo.png" alt="Stylus" class="logo-img"></a>
            <div class="header-label">Ice Breaker</div>
        </div>
    </header>

    <main>
        <div class="visual-bg"><div id="number-display">00</div></div>
        <div id="hint-display"></div>
    </main>

    <div class="footer-group">
        <button id="draw-btn" class="draw-btn" onclick="handleAction()">Pick a Number</button>
        <button id="reroll-btn" class="reroll-btn" onclick="runShuffle()">
            <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" style="width:22px;"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
        </button>
    </div>

    <div id="result-overlay" onclick="closeOverlay()">
        <div class="res-card">
            <div class="res-label">Selected Question</div>
            <div id="display-q" class="res-question">...</div>
            <div class="res-label">Speaker</div>
            <div class="speaker-tag" id="display-p">...</div>
        </div>
        <p style="margin-top:40px; font-size:11px; color:rgba(255,255,255,0.3); letter-spacing:0.1em; text-transform: uppercase;">Tap anywhere to close</p>
    </div>

    <script>
        const SHEET_GID = '1769137139'; 
        const SHEET_URL = `https://docs.google.com/spreadsheets/d/e/2PACX-1vTXikyTZ6Abe3Ome-3JYTQK83jSC7vpQXKBPqLuGhNLVmn_1Dzh48iVB77w_9GbUCHO4VuK2K3LZ48P/pub?gid=${SHEET_GID}&output=csv`;

        let questionData = [];
        let participants = [];
        let currentState = 'init'; 
        let finalIdx = null;

        function initData() {
            Papa.parse(SHEET_URL, {
                download: true,
                complete: function(results) {
                    const data = results.data;
                    if (data[0] && data[0][1]) participants = data[0][1].split(',').map(n => n.trim());
                    questionData = data.slice(3).filter(r => r[1]).map(r => ({ q: r[1], h: r[2] || "#NO_HINT" }));
                }
            });
        }

        function handleAction() {
            if (currentState === 'init') runShuffle();
            else if (currentState === 'ready') showResult();
        }

        function runShuffle() {
            if (questionData.length === 0) return;
            currentState = 'shuffling';
            const btn = document.getElementById('draw-btn');
            const numEl = document.getElementById('number-display');
            const hintEl = document.getElementById('hint-display');
            
            btn.disabled = true;
            btn.innerText = 'Picking...';
            hintEl.classList.remove('show');
            numEl.style.color = "rgba(255,255,255,0.1)";

            let count = 0;
            const shuffle = setInterval(() => {
                numEl.innerText = Math.floor(Math.random() * questionData.length + 1).toString().padStart(2, '0');
                if (++count > 20) {
                    clearInterval(shuffle);
                    finalIdx = Math.floor(Math.random() * questionData.length);
                    numEl.innerText = (finalIdx + 1).toString().padStart(2, '0');
                    hintEl.innerText = questionData[finalIdx].h;
                    numEl.style.color = "var(--sub-text)";
                    hintEl.classList.add('show');
                    currentState = 'ready';
                    btn.disabled = false;
                    btn.innerText = 'Open Question';
                    document.getElementById('reroll-btn').style.display = 'flex';
                }
            }, 60);
        }

        function showResult() {
            document.getElementById('display-q').innerText = questionData[finalIdx].q;
            document.getElementById('display-p').innerText = participants[Math.floor(Math.random() * participants.length)] || "Guest";
            document.getElementById('result-overlay').style.display = 'flex';
        }

        function closeOverlay() {
            document.getElementById('result-overlay').style.display = 'none';
            document.getElementById('number-display').innerText = "00";
            document.getElementById('hint-display').classList.remove('show');
            document.getElementById('reroll-btn').style.display = 'none';
            document.getElementById('draw-btn').innerText = 'Pick a Number';
            currentState = 'init';
        }

        window.onload = initData;
    </script>
</body>
</html>
