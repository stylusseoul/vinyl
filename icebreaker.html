<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
    <title>STYLUS | ICE BREAKER</title>
    <meta name="theme-color" content="#0a0a0a">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <style>
        :root {
            --bg: #080808;
            --surface: #111;
            --border: rgba(255,255,255,0.08);
            --text: #fff;
            --sub: rgba(255,255,255,0.38);
            --accent: #EF7C1C;
            --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            -webkit-font-smoothing: antialiased;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* HEADER - 결과창에서도 보일 수 있도록 z-index 조정 */
        .list-header {
            position: sticky; top: 0; z-index: 1100;
            background: var(--bg);
            padding-top: env(safe-area-inset-top, 0);
            box-shadow: 0 1px 0 rgba(255,255,255,0.05);
        }
        .header-top {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 16px 10px; height: 56px;
        }
        .logo-img { height: 28px; filter: brightness(0) invert(1); opacity: 0.95; }
        .logo-text { font-size: 16px; font-weight: 800; letter-spacing: 0.18em; color: var(--text); text-decoration: none; }

        /* MAIN UI */
        main {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 20px; text-align: center;
            z-index: 1;
        }

        #number-display {
            font-size: 35vw; font-weight: 800; color: var(--text);
            margin-bottom: 32px; line-height: 0.9;
            transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        #number-display.shuffling { filter: blur(8px); opacity: 0.3; transform: scale(0.9); }
        #number-display.ready { transform: scale(1.02); text-shadow: 0 0 30px rgba(255, 255, 255, 0.1); }

        .draw-btn {
            background: rgba(30, 30, 30, 0.8);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text);
            padding: 18px 40px; border-radius: 40px;
            font-size: 14px; font-weight: 700; letter-spacing: 0.08em;
            cursor: pointer; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            text-transform: uppercase; min-width: 220px;
        }
        .draw-btn:active { transform: scale(0.96); background: var(--surface); }
        .draw-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        /* RESULT OVERLAY (헤더 아래에서 나타나도록 설정) */
        #result-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            padding: 40px 24px; z-index: 1000; text-align: center;
        }

        /* 텍스트 애니메이션 */
        .res-content-box {
            animation: contentUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        @keyframes contentUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .res-label { 
            font-size: 11px; font-weight: 600; color: var(--accent); 
            letter-spacing: 0.3em; text-transform: uppercase; margin-bottom: 20px; 
        }
        .res-question { 
            font-size: 28px; font-weight: 700; line-height: 1.45; 
            margin-bottom: 56px; word-break: keep-all; max-width: 500px; 
            color: var(--text); letter-spacing: -0.01em; 
        }

        /* SPEAKER 디자인 수정: 버튼과 확실히 다르게 */
        .res-speaker-box {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 8px 20px; border-radius: 999px;
            border: 1px solid var(--border);
            background: transparent; /* 배경 제거 */
        }
        .res-speaker-box::before {
            content: ''; width: 6px; height: 6px; 
            background: var(--accent); border-radius: 50%;
        }
        .res-speaker { 
            font-size: 15px; font-weight: 500; color: var(--sub); 
            letter-spacing: 0.02em; 
        }

        .close-hint { 
            position: absolute; bottom: 60px;
            font-size: 11px; color: var(--sub2); 
            font-style: italic; letter-spacing: 0.1em; 
            text-transform: uppercase; opacity: 0.6;
        }
    </style>
</head>
<body>

    <header class="list-header">
        <div class="header-top">
            <a href="index.html" style="display: flex; align-items: center; text-decoration: none; color: inherit;">
                <img src="images/logo.png" alt="Stylus" class="logo-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='block'">
                <span class="logo-text" style="display:none">STYLUS</span>
            </a>
            <div style="font-size: 10px; color: var(--sub); letter-spacing: 0.15em; font-weight: 700; text-transform: uppercase;">Ice Breaker</div>
        </div>
    </header>

    <main>
        <div id="number-display">00</div>
        <button id="draw-btn" class="draw-btn">Pick a number</button>
    </main>

    <div id="result-overlay" onclick="closeOverlay()">
        <div class="res-content-box">
            <div class="res-label">Selected Question</div>
            <div id="display-q" class="res-question">...</div>
            
            <div class="res-label">Speaker</div>
            <div class="res-speaker-box">
                <span id="display-p" class="res-speaker">...</span>
            </div>
        </div>
        <div class="close-hint">Tap anywhere to close</div>
    </div>

    <script>
        const SHEET_GID = '1769137139'; 
        const SHEET_URL = `https://docs.google.com/spreadsheets/d/e/2PACX-1vTXikyTZ6Abe3Ome-3JYTQK83jSC7vpQXKBPqLuGhNLVmn_1Dzh48iVB77w_9GbUCHO4VuK2K3LZ48P/pub?gid=${SHEET_GID}&output=csv`;

        let questions = [];
        let participants = [];
        let currentState = 'init';
        let finalIdx = null;

        const numEl = document.getElementById('number-display');
        const btnEl = document.getElementById('draw-btn');

        function initData() {
            Papa.parse(SHEET_URL, {
                download: true,
                complete: function(results) {
                    const data = results.data;
                    if (data[0] && data[0][1]) {
                        participants = data[0][1].split(',').map(n => n.trim());
                    }
                    questions = data.slice(3).map(row => row[1]).filter(q => q && q.trim() !== "");
                }
            });
            btnEl.addEventListener('click', handleButtonClick);
        }

        function handleButtonClick() {
            if (currentState === 'init') runShuffle();
            else if (currentState === 'ready') showResult();
        }

        function runShuffle() {
            if (questions.length === 0) return;
            currentState = 'shuffling';
            btnEl.disabled = true;
            btnEl.innerText = 'Picking...';
            numEl.classList.add('shuffling');
            numEl.classList.remove('ready');

            let count = 0;
            const itv = setInterval(() => {
                numEl.innerText = Math.floor(Math.random() * questions.length) + 1;
                count++;
                if (count > 25) {
                    clearInterval(itv);
                    finalIdx = Math.floor(Math.random() * questions.length);
                    numEl.innerText = (finalIdx + 1).toString().padStart(2, '0');
                    numEl.classList.remove('shuffling');
                    numEl.classList.add('ready');
                    currentState = 'ready';
                    btnEl.disabled = false;
                    btnEl.innerText = 'Reveal Question';
                }
            }, 60);
        }

        function showResult() {
            if (finalIdx === null) return;
            const speaker = participants[Math.floor(Math.random() * participants.length)];
            document.getElementById('display-q').innerText = questions[finalIdx];
            document.getElementById('display-p').innerText = speaker || "Anyone";
            document.getElementById('result-overlay').style.display = 'flex';
        }

        function closeOverlay() {
            document.getElementById('result-overlay').style.display = 'none';
            numEl.innerText = "00";
            numEl.classList.remove('ready', 'shuffling');
            currentState = 'init';
            finalIdx = null;
            btnEl.innerText = 'Pick a number';
            btnEl.disabled = false;
        }

        window.onload = initData;
    </script>
</body>
</html>
