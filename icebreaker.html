<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
    <title>Stylus - Ice Breaker</title>
    <meta name="theme-color" content="#0a0a0a">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <style>
        :root {
            --bg: #080808; 
            --surface: #111; 
            --border: rgba(255,255,255,0.08);
            --text: #fff; 
            --sub: rgba(255,255,255,0.15); /* 숫자를 더 흐리게 */
            --accent: #EF7C1C;
            --font: 'Inter', sans-serif;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: var(--font); height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

        /* HEADER */
        .list-header { position: sticky; top: 0; z-index: 1100; background: var(--bg); padding-top: env(safe-area-inset-top, 0); }
        .header-top { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; height: 56px; }
        .logo-img { height: 24px; filter: brightness(0) invert(1); opacity: 0.8; }
        .header-label { font-size: 10px; color: var(--accent); letter-spacing: 0.2em; font-weight: 700; text-transform: uppercase; }

        /* MAIN UI */
        main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        
        /* 숫자는 존재감을 죽임 */
        #number-display { 
            font-size: 28vw; 
            font-weight: 900; 
            color: var(--sub); 
            line-height: 1; 
            transition: all 0.4s ease; 
            letter-spacing: -0.05em;
        }
        
        /* 태그(복선)를 가장 강조 */
        #hint-display { 
            margin-top: -20px; 
            font-size: 1.5rem; 
            color: var(--text); 
            font-weight: 800; 
            letter-spacing: -0.02em; 
            opacity: 0; 
            transition: all 0.5s ease;
            border-bottom: 4px solid var(--accent);
            display: inline-block;
            padding-bottom: 4px;
        }
        #hint-display.show { opacity: 1; transform: translateY(-10px); }

        /* BUTTONS */
        .btn-group { margin-top: 50px; display: flex; align-items: center; gap: 12px; }
        .draw-btn { 
            background: #fff; 
            color: #000; 
            border: none;
            padding: 18px 48px; 
            border-radius: 40px; 
            font-size: 14px; 
            font-weight: 800; 
            letter-spacing: 0.05em; 
            cursor: pointer; 
            text-transform: uppercase;
        }
        .draw-btn:disabled { opacity: 0.3; }

        .reroll-btn { 
            background: var(--surface); 
            border: 1px solid var(--border); 
            color: var(--text); 
            width: 56px; height: 56px; 
            border-radius: 50%; 
            display: none; align-items: center; justify-content: center;
        }

        /* RESULT OVERLAY */
        #result-overlay { 
            position: fixed; inset: 0; background: #000; 
            display: none; flex-direction: column; align-items: center; justify-content: center; 
            padding: 40px; z-index: 2000; 
        }
        .res-label { font-size: 10px; font-weight: 700; color: var(--accent); letter-spacing: 0.3em; text-transform: uppercase; margin-bottom: 12px; }
        .res-question { 
            font-size: 26px; font-weight: 700; line-height: 1.45; 
            margin-bottom: 40px; color: #fff; word-break: keep-all; 
        }
        .res-speaker-box { 
            padding: 12px 30px; border-radius: 999px; 
            background: var(--surface); border: 1px solid var(--border);
        }
        .res-speaker { font-size: 18px; font-weight: 600; }
        
        .close-hint { margin-top: 80px; font-size: 11px; color: var(--sub); letter-spacing: 0.1em; cursor: pointer; }
    </style>
</head>
<body>
    <header class="list-header">
        <div class="header-top">
            <img src="images/logo.png" alt="Stylus" class="logo-img">
            <div class="header-label">Shuffle</div>
        </div>
    </header>

    <main>
        <div id="number-display">00</div>
        <div id="hint-display">#복선이_여기에</div>
        
        <div class="btn-group">
            <button id="draw-btn" class="draw-btn">Shuffle</button>
            <button id="reroll-btn" class="reroll-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="width:20px;"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
            </button>
        </div>
    </main>

    <div id="result-overlay">
        <div class="res-label">Selected Card</div>
        <div id="display-q" class="res-question">질문을 불러오지 못했습니다.</div>
        <div class="res-label">Speaker</div>
        <div class="res-speaker-box"><span id="display-p" class="res-speaker">...</span></div>
        <div class="close-hint" onclick="closeOverlay()">Tap to close and reset</div>
    </div>

    <script>
        const SHEET_GID = '1769137139'; 
        const SHEET_URL = `https://docs.google.com/spreadsheets/d/e/2PACX-1vTXikyTZ6Abe3Ome-3JYTQK83jSC7vpQXKBPqLuGhNLVmn_1Dzh48iVB77w_9GbUCHO4VuK2K3LZ48P/pub?gid=${SHEET_GID}&output=csv`;

        let questionData = [];
        let participants = [];
        let currentState = 'init'; 
        let finalIdx = null;

        const numEl = document.getElementById('number-display');
        const hintEl = document.getElementById('hint-display');
        const btnEl = document.getElementById('draw-btn');
        const rerollBtn = document.getElementById('reroll-btn');

        function initData() {
            Papa.parse(SHEET_URL, {
                download: true,
                complete: function(results) {
                    const data = results.data;
                    if (data[0] && data[0][1]) {
                        participants = data[0][1].split(',').map(n => n.trim()).filter(n => n !== "");
                    }
                    // B열(질문), C열(힌트) 로드
                    questionData = data.slice(3)
                        .filter(row => row[1] && row[1].trim() !== "")
                        .map(row => ({
                            q: row[1].trim(),
                            h: row[2] ? row[2].trim() : "#복선_없음" 
                        }));
                }
            });

            btnEl.addEventListener('click', () => {
                if (currentState === 'init') runShuffle();
                else if (currentState === 'ready') showResult();
            });
            
            rerollBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                runShuffle();
            });
        }

        function runShuffle() {
            if (questionData.length === 0) return;
            
            currentState = 'shuffling';
            btnEl.disabled = true;
            btnEl.innerText = 'Picking...';
            rerollBtn.style.display = 'none';
            hintEl.classList.remove('show');
            numEl.style.opacity = "0.5";

            let count = 0;
            const maxCount = 20; 
            
            const shuffleEffect = () => {
                const tempIdx = Math.floor(Math.random() * questionData.length);
                numEl.innerText = (tempIdx + 1).toString().padStart(2, '0');
                count++;
                
                if (count < maxCount) {
                    setTimeout(shuffleEffect, 50);
                } else {
                    finalIdx = Math.floor(Math.random() * questionData.length);
                    numEl.innerText = (finalIdx + 1).toString().padStart(2, '0');
                    hintEl.innerText = questionData[finalIdx].h;
                    
                    numEl.style.opacity = "0.15"; // 숫자는 다시 흐리게
                    hintEl.classList.add('show'); // 태그 등장
                    
                    currentState = 'ready';
                    btnEl.disabled = false;
                    btnEl.innerText = 'Open Question';
                    rerollBtn.style.display = 'flex'; 
                }
            };
            shuffleEffect();
        }

        function showResult() {
            const pIdx = Math.floor(Math.random() * participants.length);
            document.getElementById('display-q').innerText = questionData[finalIdx].q;
            document.getElementById('display-p').innerText = participants[pIdx] || "Guest";
            document.getElementById('result-overlay').style.display = 'flex';
        }

        function closeOverlay() {
            document.getElementById('result-overlay').style.display = 'none';
            numEl.innerText = "00";
            numEl.style.opacity = "0.3";
            hintEl.classList.remove('show');
            currentState = 'init';
            btnEl.innerText = 'Shuffle';
            rerollBtn.style.display = 'none';
        }

        window.onload = initData;
    </script>
</body>
</html>
