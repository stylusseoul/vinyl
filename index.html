<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
    <title>Stylus Vinyl Explorer - Schedule</title>
    <meta name="theme-color" content="#0a0a0a">

    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,300;1,400&display=swap" rel="stylesheet">

    <style>
        /* ============================================================
           1. 기존 STYLUS VINYL 변수 및 공통 CSS
           ============================================================ */
        :root {
            --bg:      #080808;
            --surface: #111;
            --border:  rgba(255,255,255,0.05);
            --text:    #fff;
            --sub:     rgba(255,255,255,0.38);
            --sub2:    rgba(255,255,255,0.18);
            --accent:  #EF7C1C;
            --font:    'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { 
            background: var(--bg); color: var(--text); font-family: var(--font);
            -webkit-font-smoothing: antialiased; overscroll-behavior: none; min-height: 100dvh;
        }

        /* ============================================================
           2. 원본 HEADER & FOOTER CSS (제공해주신 코드 100% 반영)
           ============================================================ */
        .list-header {
            position: sticky; top: 0; z-index: 50; background: var(--bg);
            padding-top: env(safe-area-inset-top, 0);
            box-shadow: 0 1px 0 rgba(255,255,255,0.05), 0 4px 20px rgba(0,0,0,0.6);
            will-change: transform; transform: translateZ(0);
        }
        .header-top {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 16px 10px; height: 56px;
        }
        .logo-img { height: 28px; object-fit: contain; filter: brightness(0) invert(1); opacity: 0.95; display: block; }
        .logo-text { font-size: 16px; font-weight: 800; letter-spacing: 0.18em; color: var(--text); }
        .icon-btn {
            width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; background: none; border: none; color: #ffffff; cursor: pointer;
            border-radius: 50%; transition: color 0.15s; -webkit-tap-highlight-color: transparent; padding: 0;
        }
        .icon-btn svg { width: 20px; height: 20px; display: block; }
        .icon-btn:active { color: var(--accent); }

        .list-footer {
            padding: 14px 24px calc(env(safe-area-inset-bottom, 0px) + 80px);
            margin-top: 0; border-top: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; gap: 12px;
        }
        .footer-desc { font-size: 12px; font-weight: 300; color: var(--sub); line-height: 1.85; text-align: center; letter-spacing: 0.01em; font-style: italic; }
        .footer-insta {
            display: inline-flex; align-items: center; justify-content: center; gap: 6px; text-decoration: none;
            color: var(--sub); font-size: 12px; font-weight: 500; letter-spacing: 0.04em; line-height: 1; transition: color 0.15s;
            border: 1px solid var(--border); border-radius: 999px; padding: 8px 14px;
        }
        .footer-insta svg { width: 15px; height: 15px; flex-shrink: 0; display: block; }
        .footer-insta:active { color: var(--text); }

        /* ============================================================
           3. CALENDAR CSS (중앙 정렬 완벽 매칭)
           ============================================================ */
        .calendar-main { padding: 0 16px 40px; max-width: 800px; margin: 0 auto; min-height: calc(100vh - 200px); }

        .fc { --fc-border-color: transparent; background: transparent; }
        .fc-theme-standard .fc-scrollgrid { border: none !important; }
        .fc-scrollgrid-sync-table { border-collapse: separate; border-spacing: 0; }
        .fc td, .fc th { border: none !important; border-bottom: 1px solid var(--border) !important; }
        
        .fc .fc-toolbar { padding: 24px 0 16px; margin: 0 !important; }
        .fc .fc-toolbar-title { font-size: 18px !important; font-weight: 700; letter-spacing: -0.02em; }
        .fc .fc-button-primary { background: transparent !important; border: none !important; color: var(--sub) !important; padding: 0 8px !important; box-shadow: none !important; }
        .fc .fc-button-primary:active { color: var(--accent) !important; background: transparent !important; }

        /* 요일 및 숫자 중앙 정렬 */
        .fc .fc-col-header-cell-cushion { 
            display: inline-block; width: 100%; text-align: center;
            color: var(--sub) !important; font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; padding: 14px 0 !important; 
        }
        .fc .fc-daygrid-day-top { display: flex; justify-content: center; }
        .fc .fc-daygrid-day-number { font-size: 14px; font-weight: 400; color: var(--text) !important; padding: 12px 8px !important; opacity: 0.9; text-decoration: none; }
        
        .fc .fc-day-other .fc-daygrid-day-number { opacity: 0.3; }
        .fc .fc-day-today { background: transparent !important; }
        .fc .fc-day-today .fc-daygrid-day-number { color: var(--accent) !important; font-weight: 700; }

        /* 이벤트 디자인 */
        .fc-event { background: transparent !important; border: none !important; padding: 2px 8px 6px !important; cursor: pointer; }
        .fc-event-main { 
            display: flex; align-items: center; justify-content: center; gap: 6px; 
            color: var(--sub) !important; font-size: 11px !important; font-weight: 400; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; 
        }
        .fc-event-main::before { content: ''; display: block; width: 4px; height: 4px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
        .fc-daygrid-day-events { margin-bottom: 8px !important; }

        /* ============================================================
           4. BOTTOM SHEET MODAL CSS
           ============================================================ */
        .request-bottom-sheet {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 100; display: flex; flex-direction: column; justify-content: flex-end;
            opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        .request-bottom-sheet.open { opacity: 1; pointer-events: auto; }
        
        .sheet-content {
            background: rgba(20, 20, 20, 0.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.08); border-radius: 28px 28px 0 0;
            padding: 32px 24px calc(env(safe-area-inset-bottom, 0px) + 24px); box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.8);
            transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .request-bottom-sheet.open .sheet-content { transform: translateY(0); }

        .request-sheet-header { margin-bottom: 24px; display: flex; justify-content: space-between; align-items: flex-end; }
        .request-sheet-title { font-size: 17px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
        .request-sheet-subtitle { font-size: 13px; color: var(--accent); font-weight: 500; }
        .close-btn { background: none; border: none; color: var(--sub); font-size: 24px; cursor: pointer; padding: 0; line-height: 1; }

        .request-sheet-body { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }
        .time-row { display: flex; gap: 12px; }
        .time-row > div { flex: 1; }

        .request-sheet-input {
            width: 100%; background: rgba(255, 255, 255, 0.06); border: 1px solid transparent; border-radius: 12px; color: var(--text); font-size: 15px; padding: 16px; outline: none; font-family: var(--font); transition: all 0.2s; -webkit-appearance: none;
        }
        .request-sheet-input:focus { background: rgba(255, 255, 255, 0.1); border: 1px solid var(--accent); }
        .request-sheet-input::placeholder { color: var(--sub); font-weight: 400; }
        input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(1); opacity: 0.5; cursor: pointer; }

        .input-label { font-size: 11px; font-weight: 500; color: var(--sub); margin-bottom: 6px; display: block; padding-left: 4px; }

        .request-sheet-submit { width: 100%; background: var(--accent); color: #fff; border: none; border-radius: 12px; padding: 16px; font-size: 16px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; margin-bottom: 8px; }
        .request-sheet-submit:active { opacity: 0.8; }
        .request-sheet-delete { width: 100%; background: transparent; color: #ff4d4d; border: 1px solid rgba(255,77,77,0.3); border-radius: 12px; padding: 16px; font-size: 14px; font-weight: 500; cursor: pointer; }
    </style>
</head>
<body>

    <header class="list-header">
      <div class="header-top">
        <a href="https://stylusseoul.github.io/vinyl/" style="display: flex; align-items: center; text-decoration: none; color: inherit;">
          <img src="https://stylusseoul.github.io/vinyl/images/logo.png" alt="Stylus" class="logo-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='block'">
          <span class="logo-text" style="display:none">STYLUS</span>
        </a>
        <a href="https://stylusseoul.github.io/vinyl/" class="icon-btn" aria-label="메인으로">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <polyline points="9 22 9 12 15 12 15 22"></polyline>
          </svg>
        </a>
      </div>
    </header>

    <main class="calendar-main">
        <div id="calendar"></div>
    </main>

    <footer class="list-footer">
      <p class="footer-desc">A small room designed for listening, where sound is free to breathe and time is never in a hurry.</p>
      <a class="footer-insta" href="https://www.instagram.com/stylus.seoul" target="_blank" rel="noopener noreferrer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
          <circle cx="12" cy="12" r="4.5"/>
          <circle cx="17.5" cy="6.5" r="0.8" fill="currentColor" stroke="none"/>
        </svg>
        <span>stylus.seoul</span>
      </a>
    </footer>

    <div class="request-bottom-sheet" id="modal">
        <div class="sheet-content">
            <div class="request-sheet-header">
                <div>
                    <div class="request-sheet-subtitle" id="m-date">DATE</div>
                    <div class="request-sheet-title" id="m-title-text">Add Schedule</div>
                </div>
                <button class="close-btn" onclick="closeModal()">×</button>
            </div>
            
            <input type="hidden" id="m-id">
            
            <div class="request-sheet-body">
                <div class="time-row">
                    <div>
                        <span class="input-label">START TIME</span>
                        <input type="time" class="request-sheet-input" id="m-start" value="19:00">
                    </div>
                    <div>
                        <span class="input-label">END TIME</span>
                        <input type="time" class="request-sheet-input" id="m-end" value="21:00">
                    </div>
                </div>

                <div>
                    <span class="input-label">EVENT NAME</span>
                    <input type="text" class="request-sheet-input" id="m-content" placeholder="일정 내용을 입력해주세요">
                </div>
                
                <div>
                    <span class="input-label">WRITER</span>
                    <input type="text" class="request-sheet-input" id="m-author" placeholder="작성자">
                </div>
            </div>

            <div class="request-sheet-footer">
                <button class="request-sheet-submit" onclick="saveEvent()">SAVE</button>
                <button class="request-sheet-delete" id="del-btn" onclick="deleteEvent()" style="display:none">DELETE</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbxmAQDzoB_apWLmq7YwAZdobLoCLG--SxYRDTD_d0tCFsvx-y7ijBdYf_KDGV9IFIAO2w/exec'; 

        let calendar;
        let selectedDate;

        document.addEventListener('DOMContentLoaded', function() {
            const calendarEl = document.getElementById('calendar');
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'en',
                headerToolbar: { left: 'prev', center: 'title', right: 'next' },
                contentHeight: 'auto',
                fixedWeekCount: false,
                dateClick: (info) => openModal(info.dateStr),
                eventClick: (info) => openModal(null, info.event),
                events: fetchEvents
            });
            calendar.render();
        });

        async function fetchEvents(info, successCallback) {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                const events = data.map(item => ({
                    id: item.ID, 
                    title: `${item.START_TIME} ${item.CONTENT}`,
                    start: item.DATE,
                    extendedProps: { 
                        start_time: item.START_TIME, 
                        end_time: item.END_TIME,
                        content: item.CONTENT, 
                        author: item.AUTHOR 
                    }
                }));
                successCallback(events);
            } catch (e) { console.error(e); }
        }

        function openModal(dateStr, event = null) {
            const modal = document.getElementById('modal');
            const delBtn = document.getElementById('del-btn');
            const titleText = document.getElementById('m-title-text');
            modal.classList.add('open');

            if (event) {
