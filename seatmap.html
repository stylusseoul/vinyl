<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>STYLUS | Seat Map</title>
    <!-- 폰트: Outfit (영문) & Noto Sans KR (국문) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <!-- 아이콘: Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        /* CORE SETUP */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #000000;
            color: #E0E0E0;
            font-family: 'Noto Sans KR', sans-serif;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        .eng { font-family: 'Outfit', sans-serif; }

        /* HEADER */
        header {
            padding: 40px 24px 10px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo-img {
            width: 120px;
            height: auto;
            margin-bottom: 8px;
            display: block;
        }

        .page-title {
            font-size: 13px;
            font-weight: 500;
            color: #FF5F1F;
            letter-spacing: 6px;
            margin-left: 6px;
            text-transform: uppercase;
        }

        /* MAIN CONTENT */
        main {
            padding: 0 24px 30px;
            max-width: 500px;
            margin: 0 auto;
        }

        /* SEAT MAP SECTION */
        .seat-section {
            margin-top: 20px;
            margin-bottom: 40px;
            text-align: center;
        }

        /* 4x2 GRID LAYOUT */
        .seat-grid-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 30px;
        }

        .seat-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            justify-items: center;
        }

        .seat {
            width: 68px;
            height: 68px;
            border-radius: 50%;
            border: 1px solid #222;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 300;
            color: #555;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            background-color: transparent;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            padding: 4px;
        }

        /* Sweet Spot Style (2, 3) */
        .seat.sweet-spot {
            border-color: rgba(255, 95, 31, 0.4);
            color: rgba(255, 95, 31, 0.6);
        }

        /* Occupied State */
        .seat.occupied {
            border-color: #444;
            color: #FFFFFF;
            background-color: #0c0c0c;
            font-size: 12px;
            font-weight: 500;
            box-shadow: inset 0 0 15px rgba(255, 255, 255, 0.05);
        }

        .seat.sweet-spot.occupied {
            background-color: #FF5F1F;
            border-color: #FF5F1F;
            color: #FFFFFF;
            box-shadow: 0 8px 20px rgba(255, 95, 31, 0.4);
            font-weight: 600;
        }

        /* REFRESH STATUS (가시성 개선) */
        .refresh-status {
            font-size: 11px;
            color: #666; /* 더 밝게 조정 */
            letter-spacing: 2px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .refresh-status .indicator {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .refresh-status i {
            font-size: 10px;
            animation: spin 4s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .last-updated {
            font-size: 9px;
            color: #555; /* 더 밝게 조정 */
            opacity: 1; /* 투명도 제거 */
            font-family: 'Outfit';
        }

        /* GUIDE SECTION */
        .guide-section {
            border-top: 1px solid #111;
            padding-top: 25px;
        }

        .guide-title {
            font-size: 16px;
            font-weight: 500;
            color: #FFFFFF;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .guide-title i { color: #FF5F1F; font-size: 20px; }

        .guide-list {
            list-style: none;
        }

        .guide-item {
            font-size: 14px;
            font-weight: 300;
            color: #888;
            line-height: 1.7;
            margin-bottom: 10px;
            word-break: keep-all;
        }

        .highlight { color: #FFFFFF; font-weight: 400; }
        .point-color { color: #FF5F1F; font-weight: 500; }

        /* FOOTER */
        footer {
            padding: 20px 24px 30px;
            text-align: center;
            border-top: 1px solid #111;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .footer-text {
            font-size: 13px;
            font-weight: 200;
            color: #555;
            line-height: 1.5;
            font-style: italic;
            max-width: 340px;
            margin: 0 auto;
            word-break: keep-all;
        }

        .footer-links a {
            color: #666;
            text-decoration: none;
            font-size: 12px;
            font-weight: 400;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s ease;
        }

        .footer-links a:active {
            color: #FF5F1F;
        }

        .footer-links i {
            font-size: 18px;
        }

    </style>
</head>
<body>

    <header>
        <img src="https://stylusseoul.github.io/vinyl/images/logo.png" alt="STYLUS Logo" class="logo-img">
        <div class="page-title eng">Seat Map</div>
    </header>

    <main>
        <!-- Seat Map Area -->
        <section class="seat-section">
            <div class="seat-grid-container" id="seatGridContainer">
                <div class="seat-row" id="row1"></div>
                <div class="seat-row" id="row2"></div>
            </div>

            <div class="refresh-status eng" id="refreshStatus">
                <div class="indicator">
                    <i class="ph ph-circle-notch"></i> LIVE CONNECTED
                </div>
                <div class="last-updated" id="lastUpdated">Initializing...</div>
            </div>
        </section>

        <!-- Seat Guide Area -->
        <section class="guide-section">
            <h3 class="guide-title"><i class="ph ph-info"></i> 좌석 안내</h3>
            <ul class="guide-list">
                <li class="guide-item">
                    1. 좌석은 별도의 지정 없이 <span class="highlight">선착순으로 운영</span>됩니다.
                </li>
                <li class="guide-item">
                    2. <span class="point-color">오렌지색</span>으로 표시된 부분은 음악을 들을 때 가장 좋게 들리는 <span class="highlight">스위트 스팟(Sweet Spot)</span>이므로 해당 좌석 착석을 추천드립니다.
                </li>
            </ul>
        </section>
    </main>

    <footer>
        <div class="footer-text eng">
            A small room designed for listening, where sound is free to breathe and time is never in a hurry.
        </div>
        <div class="footer-links eng">
            <a href="https://www.instagram.com/stylus.seoul/" target="_blank">
                <i class="ph ph-instagram-logo"></i> stylus.seoul
            </a>
        </div>
    </footer>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbxb_8ftQXfYtAqyPITwLdOwMShOXNGNGWfCvxTAFtSW9OrYTWIXRe6bWUImyOcxl6AoLw/exec';
        const SWEET_SPOTS = [2, 3];
        const TOTAL_SEATS = 8;

        let seats = Array.from({ length: TOTAL_SEATS }, (_, i) => ({ no: i + 1, name: "" }));

        function renderMap() {
            const row1 = document.getElementById('row1');
            const row2 = document.getElementById('row2');
            if (!row1 || !row2) return;

            row1.innerHTML = '';
            row2.innerHTML = '';

            seats.forEach((seat) => {
                const seatDiv = document.createElement('div');
                seatDiv.className = 'seat';
                
                if (SWEET_SPOTS.includes(seat.no)) {
                    seatDiv.classList.add('sweet-spot');
                }

                const displayName = (seat.name || "").toString().trim();
                
                if (displayName !== "") {
                    seatDiv.classList.add('occupied');
                    seatDiv.textContent = displayName;
                } else {
                    seatDiv.textContent = seat.no;
                }

                if (seat.no <= 4) {
                    row1.appendChild(seatDiv);
                } else {
                    row2.appendChild(seatDiv);
                }
            });
        }

        async function updateData() {
            const statusEl = document.getElementById('refreshStatus');
            const lastUpdatedEl = document.getElementById('lastUpdated');
            statusEl.style.opacity = "1";

            try {
                const fetchUrl = `${API_URL}?sheet=${encodeURIComponent('Seat Map')}&t=${new Date().getTime()}`;
                const response = await fetch(fetchUrl);
                
                if (!response.ok) throw new Error('Sync failed');
                
                const rawData = await response.json();
                
                // 데이터 배열 추출 (배열 자체이거나, .data 속성에 담겨있을 경우 대응)
                const dataArray = Array.isArray(rawData) ? rawData : (rawData.data || rawData.records || []);
                
                if (dataArray && dataArray.length > 0) {
                    const newSeats = Array.from({ length: TOTAL_SEATS }, (_, i) => ({ no: i + 1, name: "" }));
                    
                    dataArray.forEach(row => {
                        // 키 값을 대소문자 구분 없이 찾기 위해 모든 키를 소문자로 변환하여 검색
                        let rowNo, rowName;
                        for (let key in row) {
                            const lowerKey = key.toLowerCase().trim();
                            if (lowerKey === 'no') rowNo = row[key];
                            if (lowerKey === 'name') rowName = row[key];
                        }
                        
                        const no = parseInt(rowNo);
                        const name = (rowName !== undefined && rowName !== null) ? rowName.toString() : "";
                        
                        if (!isNaN(no) && no >= 1 && no <= TOTAL_SEATS) {
                            newSeats[no - 1].name = name;
                        }
                    });

                    seats = newSeats;
                    renderMap();
                    
                    const now = new Date();
                    lastUpdatedEl.textContent = `LAST SYNC: ${now.getHours()}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}`;
                } else {
                    lastUpdatedEl.textContent = "SYNCED (EMPTY DATA)";
                }
            } catch (error) {
                console.error("Fetch Error:", error);
                lastUpdatedEl.textContent = "SYNC RETRYING...";
            } finally {
                setTimeout(() => {
                    statusEl.style.opacity = "0.7"; /* 기존 0.3에서 가독성을 위해 높임 */
                }, 1000);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderMap();
            updateData();
            setInterval(updateData, 30000);
        });
    </script>
</body>
</html>
