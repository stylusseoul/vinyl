<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>STYLUS | Seat Map</title>
    <!-- 폰트: Outfit (영문) & Noto Sans KR (국문) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <!-- 아이콘: Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        /* CORE SETUP */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #000000;
            color: #FFFFFF;
            font-family: 'Noto Sans KR', sans-serif;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        .eng { font-family: 'Outfit', sans-serif; }

        /* HEADER */
        header {
            padding: 40px 24px 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo-img {
            width: 120px;
            height: auto;
            margin-bottom: 8px;
            display: block;
        }

        .page-title {
            font-size: 13px;
            font-weight: 500;
            color: #FF5F1F;
            letter-spacing: 6px;
            margin-left: 6px;
            text-transform: uppercase;
        }

        /* MAIN CONTENT */
        main {
            padding: 20px 24px 60px;
            max-width: 500px;
            margin: 0 auto;
        }

        /* SEAT MAP SECTION */
        .seat-section {
            margin-bottom: 50px;
            text-align: center;
        }

        .section-label {
            font-size: 18px;
            font-weight: 400;
            letter-spacing: 2px;
            margin-bottom: 40px;
            color: #FFFFFF;
            text-transform: uppercase;
        }

        /* 4x2 GRID LAYOUT */
        .seat-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 40px;
            justify-items: center;
        }

        .seat {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            border: 1px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 400;
            color: #666;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            background-color: transparent;
        }

        /* Sweet Spot Style (2, 3) */
        .seat.sweet-spot {
            border-color: #FF5F1F;
            color: #FF5F1F;
        }

        /* Occupied State */
        .seat.occupied {
            border-color: #555;
            color: #FFFFFF;
            background-color: #111;
            font-size: 13px;
            font-weight: 500;
        }

        .seat.sweet-spot.occupied {
            background-color: #FF5F1F;
            border-color: #FF5F1F;
            color: #FFFFFF;
            box-shadow: 0 0 15px rgba(255, 95, 31, 0.3);
        }

        /* LOADING INDICATOR */
        .refresh-status {
            font-size: 11px;
            color: #444;
            letter-spacing: 1px;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .refresh-status i {
            animation: spin 2s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* GUIDE SECTION */
        .guide-section {
            border-top: 1px solid #222;
            padding-top: 30px;
        }

        .guide-title {
            font-size: 16px;
            font-weight: 500;
            color: #FFFFFF;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .guide-title i { color: #FF5F1F; }

        .guide-list {
            list-style: none;
        }

        .guide-item {
            font-size: 14px;
            font-weight: 300;
            color: #888;
            line-height: 1.8;
            margin-bottom: 15px;
            word-break: keep-all;
        }

        .highlight { color: #FFFFFF; font-weight: 400; }
        .point-color { color: #FF5F1F; font-weight: 500; }

        /* FOOTER */
        footer {
            padding: 40px 24px;
            text-align: center;
            border-top: 1px solid #111;
        }

        .footer-quote {
            font-size: 13px;
            font-weight: 200;
            color: #444;
            line-height: 1.5;
            font-style: italic;
            max-width: 280px;
            margin: 0 auto;
        }

    </style>
</head>
<body>

    <header>
        <img src="https://stylusseoul.github.io/vinyl/images/logo.png" alt="STYLUS Logo" class="logo-img">
        <div class="page-title eng">Seat Map</div>
    </header>

    <main>
        <!-- Seat Map Area -->
        <section class="seat-section">
            <h2 class="section-label eng">Now Listening</h2>
            
            <div class="seat-grid" id="seatGrid">
                <!-- Seats 1-8 will be rendered here -->
            </div>

            <div class="refresh-status eng" id="refreshStatus">
                <i class="ph ph-circle-notch"></i> LIVE UPDATING
            </div>
        </section>

        <!-- Seat Guide Area -->
        <section class="guide-section">
            <h3 class="guide-title"><i class="ph ph-info"></i> 좌석 안내</h3>
            <ul class="guide-list">
                <li class="guide-item">
                    1. 좌석은 별도의 지정 없이 <span class="highlight">선착순으로 운영</span>됩니다.
                </li>
                <li class="guide-item">
                    2. <span class="point-color">오렌지색</span>으로 표시된 부분은 음악을 들을 때 가장 좋게 들리는 <span class="highlight">스위트 스팟(Sweet Spot)</span>이므로 해당 좌석 착석을 추천드립니다.
                </li>
            </ul>
        </section>
    </main>

    <footer>
        <p class="footer-quote eng">
            "A small room designed for listening, where sound is free to breathe and time is never in a hurry."
        </p>
    </footer>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbxb_8ftQXfYtAqyPITwLdOwMShOXNGNGWfCvxTAFtSW9OrYTWIXRe6bWUImyOcxl6AoLw/exec';
        const SWEET_SPOTS = [2, 3];
        const TOTAL_SEATS = 8;

        // 초기 좌석 상태 (1~8)
        let seats = Array.from({ length: TOTAL_SEATS }, (_, i) => ({ no: i + 1, name: "" }));

        // UI 렌더링 함수
        function renderMap() {
            const grid = document.getElementById('seatGrid');
            grid.innerHTML = '';

            seats.forEach(seat => {
                const seatDiv = document.createElement('div');
                seatDiv.className = 'seat';
                
                // 스위트 스팟 적용 (2, 3번)
                if (SWEET_SPOTS.includes(seat.no)) {
                    seatDiv.classList.add('sweet-spot');
                }

                // 점유 상태 확인
                if (seat.name && seat.name.trim() !== "") {
                    seatDiv.classList.add('occupied');
                    seatDiv.textContent = seat.name; // NAME이 있으면 이름 표시
                } else {
                    seatDiv.textContent = seat.no; // 비어 있으면 번호 표시
                }

                grid.appendChild(seatDiv);
            });
        }

        // 데이터 업데이트 함수
        async function updateData() {
            const statusEl = document.getElementById('refreshStatus');
            statusEl.style.opacity = "1";

            try {
                // Seat Map 시트 데이터 요청
                const response = await fetch(`${API_URL}?sheet=Seat Map`);
                if (!response.ok) throw new Error('Network error');
                
                const data = await response.json();
                
                if (data && Array.isArray(data)) {
                    // 데이터 매핑
                    const newSeats = Array.from({ length: TOTAL_SEATS }, (_, i) => ({ no: i + 1, name: "" }));
                    
                    data.forEach(row => {
                        const no = parseInt(row.NO || row.no);
                        const name = (row.NAME || row.name || "").toString();
                        
                        if (no >= 1 && no <= TOTAL_SEATS) {
                            newSeats[no - 1].name = name;
                        }
                    });

                    seats = newSeats;
                    renderMap();
                }
            } catch (error) {
                console.error("Refresh failed:", error);
            } finally {
                // 잠시 후 업데이트 표시 숨김 (부드럽게)
                setTimeout(() => {
                    statusEl.style.opacity = "0.3";
                }, 1000);
            }
        }

        // 초기 구동
        document.addEventListener('DOMContentLoaded', () => {
            renderMap();
            updateData();
            // 30초마다 자동 새로고침
            setInterval(updateData, 30000);
        });
    </script>
</body>
</html>
