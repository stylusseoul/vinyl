<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>STYLUS | Seat Map</title>
    <!-- 폰트: Outfit (영문) & Noto Sans KR (국문) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <!-- 아이콘: Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        /* CORE SETUP */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #000000;
            color: #E0E0E0;
            font-family: 'Noto Sans KR', sans-serif;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        .eng { font-family: 'Outfit', sans-serif; }

        /* HEADER */
        header {
            padding: 50px 24px 30px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo-img {
            width: 130px;
            height: auto;
            margin-bottom: 8px;
            display: block;
        }

        .page-title {
            font-size: 14px;
            font-weight: 500;
            color: #FF5F1F;
            letter-spacing: 6px;
            margin-left: 6px;
            text-transform: uppercase;
        }

        /* MAIN CONTENT */
        main {
            padding: 0 24px 60px;
            max-width: 500px;
            margin: 0 auto;
        }

        /* SEAT MAP SECTION */
        .seat-section {
            margin-top: 20px;
            margin-bottom: 60px;
            text-align: center;
        }

        /* SOUND SOURCE (Stage) Indicator */
        .sound-source {
            width: 140px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #333, #FF5F1F, #333, transparent);
            margin: 0 auto 40px;
            position: relative;
        }

        .sound-source::after {
            content: 'SOUND SOURCE';
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Outfit';
            font-size: 9px;
            letter-spacing: 3px;
            color: #555;
            width: 100%;
        }

        /* 4x2 GRID LAYOUT */
        .seat-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 40px;
            justify-items: center;
        }

        .seat {
            width: 68px;
            height: 68px;
            border-radius: 50%;
            border: 1px solid #222;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 300;
            color: #555;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            background-color: transparent;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            padding: 5px;
        }

        /* Sweet Spot Style (2, 3) */
        .seat.sweet-spot {
            border-color: rgba(255, 95, 31, 0.4);
            color: rgba(255, 95, 31, 0.6);
        }

        /* Occupied State */
        .seat.occupied {
            border-color: #444;
            color: #FFFFFF;
            background-color: #0a0a0a;
            font-size: 13px;
            font-weight: 500;
            box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.05);
        }

        .seat.sweet-spot.occupied {
            background-color: #FF5F1F;
            border-color: #FF5F1F;
            color: #FFFFFF;
            box-shadow: 0 10px 25px rgba(255, 95, 31, 0.4);
            font-weight: 600;
        }

        /* REFRESH STATUS */
        .refresh-status {
            font-size: 11px;
            color: #333;
            letter-spacing: 1.5px;
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .refresh-status .indicator {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .refresh-status i {
            font-size: 12px;
            animation: spin 3s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .last-updated {
            font-size: 9px;
            opacity: 0.6;
            font-family: 'Outfit';
        }

        /* GUIDE SECTION */
        .guide-section {
            border-top: 1px solid #111;
            padding-top: 40px;
        }

        .guide-title {
            font-size: 16px;
            font-weight: 500;
            color: #FFFFFF;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: -0.5px;
        }

        .guide-title i { color: #FF5F1F; font-size: 20px; }

        .guide-list {
            list-style: none;
        }

        .guide-item {
            font-size: 14.5px;
            font-weight: 300;
            color: #888;
            line-height: 1.8;
            margin-bottom: 18px;
            word-break: keep-all;
        }

        .highlight { color: #FFFFFF; font-weight: 400; }
        .point-color { color: #FF5F1F; font-weight: 500; }

        /* FOOTER */
        footer {
            padding: 60px 24px 80px;
            text-align: center;
            border-top: 1px solid #111;
        }

        .footer-quote {
            font-size: 14px;
            font-weight: 200;
            color: #555;
            line-height: 1.6;
            font-style: italic;
            max-width: 300px;
            margin: 0 auto;
            word-break: keep-all;
        }

    </style>
</head>
<body>

    <header>
        <img src="https://stylusseoul.github.io/vinyl/images/logo.png" alt="STYLUS Logo" class="logo-img">
        <div class="page-title eng">Seat Map</div>
    </header>

    <main>
        <!-- Seat Map Area -->
        <section class="seat-section">
            <div class="sound-source"></div>
            
            <div class="seat-grid" id="seatGrid">
                <!-- Seats 1-8 will be rendered here -->
            </div>

            <div class="refresh-status eng" id="refreshStatus">
                <div class="indicator">
                    <i class="ph ph-circle-notch"></i> LIVE UPDATING
                </div>
                <div class="last-updated" id="lastUpdated">Initializing...</div>
            </div>
        </section>

        <!-- Seat Guide Area -->
        <section class="guide-section">
            <h3 class="guide-title"><i class="ph ph-info"></i> 좌석 안내</h3>
            <ul class="guide-list">
                <li class="guide-item">
                    1. 좌석은 별도의 지정 없이 <span class="highlight">선착순으로 운영</span>됩니다.
                </li>
                <li class="guide-item">
                    2. <span class="point-color">오렌지색</span>으로 표시된 부분은 음악을 들을 때 가장 좋게 들리는 <span class="highlight">스위트 스팟(Sweet Spot)</span>이므로 해당 좌석 착석을 추천드립니다.
                </li>
            </ul>
        </section>
    </main>

    <footer>
        <p class="footer-quote eng">
            A small room designed for listening, where sound is free to breathe and time is never in a hurry.
        </p>
    </footer>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbxb_8ftQXfYtAqyPITwLdOwMShOXNGNGWfCvxTAFtSW9OrYTWIXRe6bWUImyOcxl6AoLw/exec';
        const SWEET_SPOTS = [2, 3];
        const TOTAL_SEATS = 8;

        // 초기 좌석 상태 (1~8)
        let seats = Array.from({ length: TOTAL_SEATS }, (_, i) => ({ no: i + 1, name: "" }));

        // UI 렌더링 함수
        function renderMap() {
            const grid = document.getElementById('seatGrid');
            if (!grid) return;
            grid.innerHTML = '';

            seats.forEach(seat => {
                const seatDiv = document.createElement('div');
                seatDiv.className = 'seat';
                
                // 스위트 스팟 적용 (2, 3번)
                if (SWEET_SPOTS.includes(seat.no)) {
                    seatDiv.classList.add('sweet-spot');
                }

                // 점유 상태 확인
                const displayName = seat.name ? seat.name.trim() : "";
                if (displayName !== "") {
                    seatDiv.classList.add('occupied');
                    seatDiv.textContent = displayName;
                } else {
                    seatDiv.textContent = seat.no;
                }

                grid.appendChild(seatDiv);
            });
        }

        // 데이터 업데이트 함수
        async function updateData() {
            const statusEl = document.getElementById('refreshStatus');
            const lastUpdatedEl = document.getElementById('lastUpdated');
            statusEl.style.opacity = "1";

            try {
                // 캐시 방지를 위한 타임스탬프 추가
                const fetchUrl = `${API_URL}?sheet=${encodeURIComponent('Seat Map')}&t=${new Date().getTime()}`;
                
                const response = await fetch(fetchUrl);
                if (!response.ok) throw new Error('Network error');
                
                const rawData = await response.json();
                const data = Array.isArray(rawData) ? rawData : (rawData.data || []);
                
                if (data && Array.isArray(data)) {
                    const newSeats = Array.from({ length: TOTAL_SEATS }, (_, i) => ({ no: i + 1, name: "" }));
                    
                    data.forEach(row => {
                        const noVal = row.NO !== undefined ? row.NO : row.no;
                        const nameVal = row.NAME !== undefined ? row.NAME : row.name;
                        
                        const no = parseInt(noVal);
                        const name = nameVal ? nameVal.toString() : "";
                        
                        if (!isNaN(no) && no >= 1 && no <= TOTAL_SEATS) {
                            newSeats[no - 1].name = name;
                        }
                    });

                    seats = newSeats;
                    renderMap();
                    
                    const now = new Date();
                    lastUpdatedEl.textContent = `LAST SYNC: ${now.getHours()}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}`;
                }
            } catch (error) {
                console.error("Refresh failed:", error);
                lastUpdatedEl.textContent = "SYNC INTERRUPTED";
            } finally {
                setTimeout(() => {
                    statusEl.style.opacity = "0.3";
                }, 1200);
            }
        }

        // 초기 구동
        document.addEventListener('DOMContentLoaded', () => {
            renderMap();
            updateData();
            // 30초마다 자동 새로고침
            setInterval(updateData, 30000);
        });
    </script>
</body>
</html>
