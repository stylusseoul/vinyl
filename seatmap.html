<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>STYLUS | Seat Map</title>
    <!-- 외부 설정 파일 로드 -->
    <script src="config.js"></script>
    <!-- 폰트: Outfit (영문) & Noto Sans KR (국문) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;400;600;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <!-- 아이콘: Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        /* CORE SETUP */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #000000;
            color: #E0E0E0;
            font-family: 'Noto Sans KR', sans-serif;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .eng { font-family: 'Outfit', sans-serif; }

        /* HEADER */
        header {
            padding: 50px 24px 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo-img {
            width: 130px;
            height: auto;
            margin-bottom: 10px;
            display: block;
        }

        .page-title {
            font-size: 14px;
            font-weight: 600;
            color: #FF5F1F;
            letter-spacing: 6px;
            margin-left: 6px;
            text-transform: uppercase;
        }

        /* MAIN CONTENT */
        main {
            padding: 0 24px 40px;
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
            flex: 1;
        }

        /* SEAT SECTION */
        .seat-section {
            margin-top: 30px;
            margin-bottom: 40px;
            text-align: center;
        }

        /* 4x2 GRID LAYOUT */
        .seat-grid-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 35px;
        }

        .seat-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px; /* 간격 미세 조정 */
            justify-items: center;
        }

        .seat {
            width: 82px; /* 원 크기 확대: 72px -> 82px */
            height: 82px; /* 원 크기 확대: 72px -> 82px */
            border-radius: 50%;
            border: 1.5px solid #222;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px; /* 기본 폰트 크기 상향 */
            font-weight: 300;
            color: #555;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            background-color: transparent;
            overflow: hidden;
            text-align: center;
            line-height: 1.2;
            word-break: keep-all; 
            padding: 10px; /* 내부 여백 상향 */
        }

        /* Sweet Spot Style (2, 3) */
        .seat.sweet-spot {
            border-color: rgba(255, 95, 31, 0.5);
            color: rgba(255, 95, 31, 0.7);
        }

        /* Occupied State */
        .seat.occupied {
            border-color: #444;
            color: #FFFFFF;
            background-color: #0c0c0c;
            font-size: 13px; /* 점유 시 폰트 크기 조정 */
            font-weight: 500;
            box-shadow: inset 0 0 15px rgba(255, 255, 255, 0.1);
        }

        .seat.sweet-spot.occupied {
            background-color: #FF5F1F;
            border-color: #FF5F1F;
            color: #FFFFFF;
            box-shadow: 0 8px 24px rgba(255, 95, 31, 0.3);
            font-weight: 700;
        }

        /* REFRESH STATUS - SUBTLE VERSION */
        .refresh-status {
            padding: 10px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            opacity: 0.6;
        }

        .status-header {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            font-weight: 400;
            color: #888;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .status-header i {
            font-size: 10px;
            color: #FF5F1F;
            animation: spin 4s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .last-sync-time {
            font-size: 10px;
            color: #555;
            font-family: 'Outfit';
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        /* GUIDE SECTION */
        .guide-section {
            border-top: 1px solid #111;
            padding-top: 30px;
        }

        .guide-title {
            font-size: 16px;
            font-weight: 600;
            color: #FFFFFF;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .guide-title i { color: #FF5F1F; font-size: 20px; }

        .guide-list {
            list-style: none;
        }

        .guide-item {
            font-size: 14px;
            font-weight: 300;
            color: #777;
            line-height: 1.8;
            margin-bottom: 12px;
            word-break: keep-all;
        }

        .highlight { color: #AAA; font-weight: 400; }
        .point-color { color: #FF5F1F; font-weight: 500; }

        /* FOOTER */
        footer {
            padding: 40px 24px 50px;
            text-align: center;
            border-top: 1px solid #111;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .footer-quote {
            font-size: 13px;
            font-weight: 200;
            color: #444;
            line-height: 1.6;
            font-style: italic;
            max-width: 320px;
            margin: 0 auto;
            word-break: keep-all;
        }

        .footer-links a {
            color: #555;
            text-decoration: none;
            font-size: 12px;
            font-weight: 400;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: color 0.3s ease;
        }

        .footer-links a:hover, .footer-links a:active {
            color: #FF5F1F;
        }

        .footer-links i {
            font-size: 18px;
        }
    </style>
</head>
<body>

    <header>
        <img src="https://stylusseoul.github.io/vinyl/images/logo.png" alt="STYLUS Logo" class="logo-img">
        <div class="page-title eng">Seat Map</div>
    </header>

    <main>
        <section class="seat-section">
            <div class="seat-grid-container">
                <div class="seat-row" id="row1"></div>
                <div class="seat-row" id="row2"></div>
            </div>

            <div class="refresh-status eng" id="refreshStatus">
                <div class="status-header">
                    <i class="ph ph-circle-notch"></i> Live Connected
                </div>
                <div class="last-sync-time" id="lastUpdated">Syncing</div>
            </div>
        </section>

        <section class="guide-section">
            <h3 class="guide-title"><i class="ph ph-info"></i> 좌석 안내</h3>
            <ul class="guide-list">
                <li class="guide-item">
                    1. 좌석은 별도의 지정 없이 <span class="highlight">선착순으로 운영</span>됩니다.
                </li>
                <li class="guide-item">
                    2. <span class="point-color">오렌지색</span>으로 표시된 2, 3번 좌석은 음악을 감상하기에 가장 적합한 <span class="highlight">스위트 스팟(Sweet Spot)</span>입니다.
                </li>
            </ul>
        </section>
    </main>

    <footer>
        <div class="footer-quote eng">
            "A small room designed for listening, where sound is free to breathe and time is never in a hurry."
        </div>
        <div class="footer-links eng">
            <a href="https://www.instagram.com/stylus.seoul/" target="_blank">
                <i class="ph ph-instagram-logo"></i> stylus.seoul
            </a>
        </div>
    </footer>

    <script>
        /**
         * STYLUS SEAT MAP LOGIC
         */
        const SWEET_SPOTS = [2, 3];
        const TOTAL_SEATS = 8;
        
        let seats = Array.from({ length: TOTAL_SEATS }, (_, i) => ({ no: i + 1, name: "" }));

        function renderMap() {
            const row1 = document.getElementById('row1');
            const row2 = document.getElementById('row2');
            if (!row1 || !row2) return;

            row1.innerHTML = ''; 
            row2.innerHTML = '';

            seats.forEach((seat) => {
                const seatDiv = document.createElement('div');
                seatDiv.className = 'seat';
                
                if (SWEET_SPOTS.includes(seat.no)) {
                    seatDiv.classList.add('sweet-spot');
                }

                const displayName = (seat.name || "").toString().trim();
                
                if (displayName !== "") {
                    seatDiv.classList.add('occupied');
                    seatDiv.textContent = displayName;
                    
                    // 이름 길이에 따라 폰트 크기 미세 조정
                    if (displayName.length >= 5) {
                        seatDiv.style.fontSize = '10px';
                    } else if (displayName.length >= 3) {
                        seatDiv.style.fontSize = '12px';
                    } else {
                        seatDiv.style.fontSize = '14px';
                    }
                } else {
                    seatDiv.textContent = seat.no;
                    seatDiv.style.fontSize = '16px'; 
                }

                if (seat.no <= 4) {
                    row1.appendChild(seatDiv);
                } else {
                    row2.appendChild(seatDiv);
                }
            });
        }

        async function updateData() {
            const lastUpdatedEl = document.getElementById('lastUpdated');
            
            if (typeof REQUEST_API_URL === 'undefined' || !REQUEST_API_URL) {
                lastUpdatedEl.textContent = "URL ERROR";
                return;
            }

            try {
                const url = `${REQUEST_API_URL}?action=read&sheet=Seat Map&t=${Date.now()}`;
                const response = await fetch(url);
                if (!response.ok) throw new Error('Sync failed');
                
                const data = await response.json();
                
                if (data && Array.isArray(data)) {
                    const newSeats = Array.from({ length: TOTAL_SEATS }, (_, i) => ({ no: i + 1, name: "" }));
                    
                    data.forEach(item => {
                        const no = parseInt(item.NO || item.no);
                        const name = item.NAME !== undefined && item.NAME !== null ? item.NAME : (item.name || "");
                        
                        if (!isNaN(no) && no >= 1 && no <= TOTAL_SEATS) {
                            newSeats[no - 1].name = name;
                        }
                    });

                    seats = newSeats;
                    renderMap();
                    
                    const now = new Date();
                    lastUpdatedEl.textContent = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}`;
                }
            } catch (error) {
                console.error("Fetch Error:", error);
                lastUpdatedEl.textContent = "Sync Disconnected";
            }
        }

        window.onload = function() {
            renderMap();
            updateData();
            setInterval(updateData, 30000); 
        };
    </script>
</body>
</html>
