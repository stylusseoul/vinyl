<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>STYLUS | Seat Map</title>
    <!-- 폰트: Outfit (영문) & Noto Sans KR (국문) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <!-- 아이콘: Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        /* CORE SETUP */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #000000;
            color: #E0E0E0;
            font-family: 'Noto Sans KR', sans-serif;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        .eng { font-family: 'Outfit', sans-serif; }

        /* HEADER */
        header {
            padding: 40px 24px 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo-img {
            width: 120px;
            height: auto;
            margin-bottom: 8px;
            display: block;
        }

        .page-title {
            font-size: 13px;
            font-weight: 500;
            color: #FF5F1F;
            letter-spacing: 6px;
            margin-left: 6px;
            text-transform: uppercase;
        }

        /* MAIN CONTENT */
        main {
            padding: 0 24px 40px;
            max-width: 500px;
            margin: 0 auto;
        }

        /* SEAT MAP SECTION */
        .seat-section {
            margin-top: 10px;
            margin-bottom: 40px;
            text-align: center;
            perspective: 1000px;
        }

        /* SPEAKER SYSTEM VISUALIZATION */
        .speaker-system {
            display: flex;
            justify-content: space-between;
            width: 80%;
            margin: 0 auto 50px;
            position: relative;
        }

        .speaker {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            opacity: 0.8;
        }

        .speaker i {
            font-size: 32px;
            color: #333;
        }

        .speaker.active i {
            color: #FF5F1F;
            filter: drop-shadow(0 0 8px rgba(255, 95, 31, 0.4));
        }

        .speaker-label {
            font-family: 'Outfit';
            font-size: 10px;
            letter-spacing: 2px;
            color: #444;
        }

        .sound-wave {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            height: 60px;
            background: radial-gradient(ellipse at top, rgba(255, 95, 31, 0.05) 0%, transparent 70%);
            z-index: -1;
        }

        /* 4x2 GRID LAYOUT */
        .seat-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 30px;
            justify-items: center;
        }

        .seat {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            border: 1px solid #222;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 300;
            color: #555;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            background-color: transparent;
        }

        .seat.sweet-spot {
            border-color: rgba(255, 95, 31, 0.3);
            color: rgba(255, 95, 31, 0.5);
        }

        .seat.occupied {
            border-color: #444;
            color: #FFFFFF;
            background-color: #0a0a0a;
            font-size: 12px;
            font-weight: 500;
            box-shadow: inset 0 0 15px rgba(255, 255, 255, 0.05);
        }

        .seat.sweet-spot.occupied {
            background-color: #FF5F1F;
            border-color: #FF5F1F;
            color: #FFFFFF;
            box-shadow: 0 8px 20px rgba(255, 95, 31, 0.4);
            font-weight: 600;
        }

        /* REFRESH STATUS */
        .refresh-status {
            font-size: 10px;
            color: #222;
            letter-spacing: 2px;
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .refresh-status .indicator {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .refresh-status i {
            font-size: 10px;
            animation: spin 4s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .last-updated {
            font-size: 9px;
            opacity: 0.5;
            font-family: 'Outfit';
        }

        /* GUIDE SECTION */
        .guide-section {
            border-top: 1px solid #111;
            padding-top: 30px;
        }

        .guide-title {
            font-size: 16px;
            font-weight: 500;
            color: #FFFFFF;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .guide-title i { color: #FF5F1F; font-size: 20px; }

        .guide-list {
            list-style: none;
        }

        .guide-item {
            font-size: 14px;
            font-weight: 300;
            color: #888;
            line-height: 1.7;
            margin-bottom: 12px;
            word-break: keep-all;
        }

        .highlight { color: #FFFFFF; font-weight: 400; }
        .point-color { color: #FF5F1F; font-weight: 500; }

        /* FOOTER - 콤팩트하게 수정 */
        footer {
            padding: 30px 24px 40px;
            text-align: center;
            border-top: 1px solid #111;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .footer-text {
            font-size: 13px;
            font-weight: 200;
            color: #555;
            line-height: 1.5;
            font-style: italic;
            max-width: 340px;
            margin: 0 auto;
            word-break: keep-all;
        }

        .footer-links a {
            color: #666;
            text-decoration: none;
            font-size: 12px;
            font-weight: 400;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s ease;
        }

        .footer-links a:active {
            color: #FF5F1F;
        }

        .footer-links i {
            font-size: 18px;
        }

    </style>
</head>
<body>

    <header>
        <img src="https://stylusseoul.github.io/vinyl/images/logo.png" alt="STYLUS Logo" class="logo-img">
        <div class="page-title eng">Seat Map</div>
    </header>

    <main>
        <!-- Seat Map Area -->
        <section class="seat-section">
            <div class="speaker-system">
                <div class="speaker active">
                    <i class="ph ph-speaker-hifi"></i>
                    <span class="speaker-label">LEFT</span>
                </div>
                <div class="speaker active">
                    <i class="ph ph-speaker-hifi"></i>
                    <span class="speaker-label">RIGHT</span>
                </div>
                <div class="sound-wave"></div>
            </div>
            
            <div class="seat-grid" id="seatGrid">
                <!-- JS handles seat rendering -->
            </div>

            <div class="refresh-status eng" id="refreshStatus">
                <div class="indicator">
                    <i class="ph ph-circle-notch"></i> LIVE CONNECTED
                </div>
                <div class="last-updated" id="lastUpdated">Initializing...</div>
            </div>
        </section>

        <!-- Seat Guide Area -->
        <section class="guide-section">
            <h3 class="guide-title"><i class="ph ph-info"></i> 좌석 안내</h3>
            <ul class="guide-list">
                <li class="guide-item">
                    1. 좌석은 별도의 지정 없이 <span class="highlight">선착순으로 운영</span>됩니다.
                </li>
                <li class="guide-item">
                    2. <span class="point-color">오렌지색</span>으로 표시된 부분은 음악을 들을 때 가장 좋게 들리는 <span class="highlight">스위트 스팟(Sweet Spot)</span>이므로 해당 좌석 착석을 추천드립니다.
                </li>
            </ul>
        </section>
    </main>

    <footer>
        <div class="footer-text eng">
            A small room designed for listening, where sound is free to breathe and time is never in a hurry.
        </div>
        <div class="footer-links eng">
            <a href="https://www.instagram.com/stylus.seoul/" target="_blank">
                <i class="ph ph-instagram-logo"></i> stylus.seoul
            </a>
        </div>
    </footer>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbxb_8ftQXfYtAqyPITwLdOwMShOXNGNGWfCvxTAFtSW9OrYTWIXRe6bWUImyOcxl6AoLw/exec';
        const SWEET_SPOTS = [2, 3];
        const TOTAL_SEATS = 8;

        let seats = Array.from({ length: TOTAL_SEATS }, (_, i) => ({ no: i + 1, name: "" }));

        function renderMap() {
            const grid = document.getElementById('seatGrid');
            if (!grid) return;
            grid.innerHTML = '';

            seats.forEach(seat => {
                const seatDiv = document.createElement('div');
                seatDiv.className = 'seat';
                
                if (SWEET_SPOTS.includes(seat.no)) {
                    seatDiv.classList.add('sweet-spot');
                }

                const displayName = seat.name ? seat.name.trim() : "";
                if (displayName !== "") {
                    seatDiv.classList.add('occupied');
                    seatDiv.textContent = displayName;
                } else {
                    seatDiv.textContent = seat.no;
                }

                grid.appendChild(seatDiv);
            });
        }

        async function updateData() {
            const statusEl = document.getElementById('refreshStatus');
            const lastUpdatedEl = document.getElementById('lastUpdated');
            statusEl.style.opacity = "1";

            try {
                const fetchUrl = `${API_URL}?sheet=${encodeURIComponent('Seat Map')}&t=${new Date().getTime()}`;
                const response = await fetch(fetchUrl);
                if (!response.ok) throw new Error('Sync error');
                
                const rawData = await response.json();
                const data = Array.isArray(rawData) ? rawData : (rawData.data || []);
                
                if (data && Array.isArray(data)) {
                    const newSeats = Array.from({ length: TOTAL_SEATS }, (_, i) => ({ no: i + 1, name: "" }));
                    
                    data.forEach(row => {
                        const noVal = row.NO !== undefined ? row.NO : row.no;
                        const nameVal = row.NAME !== undefined ? row.NAME : row.name;
                        
                        const no = parseInt(noVal);
                        const name = nameVal ? nameVal.toString() : "";
                        
                        if (!isNaN(no) && no >= 1 && no <= TOTAL_SEATS) {
                            newSeats[no - 1].name = name;
                        }
                    });

                    seats = newSeats;
                    renderMap();
                    
                    const now = new Date();
                    lastUpdatedEl.textContent = `LAST SYNC: ${now.getHours()}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}`;
                }
            } catch (error) {
                console.error("Refresh failed:", error);
                lastUpdatedEl.textContent = "SYNC RETRYING...";
            } finally {
                setTimeout(() => {
                    statusEl.style.opacity = "0.3";
                }, 1500);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderMap();
            updateData();
            setInterval(updateData, 30000);
        });
    </script>
</body>
</html>
