<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Stylus Seat Map</title>
    <script src="config.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@200;400;600&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --bg:      #080808;
            --surface: #111;
            --border:  rgba(255,255,255,0.05);
            --text:    #fff;
            --sub:     rgba(255,255,255,0.38);
            --sub2:    rgba(255,255,255,0.18);
            --accent:  #EF7C1C;
            --font:    'Inter', -apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif;
            /* 모바일 대응을 위해 최소 크기 및 vw 비율 미세 조정 */
            --seat-size: clamp(68px, 20vw, 92px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg); color: var(--text); font-family: var(--font); 
            line-height: 1.6; -webkit-font-smoothing: antialiased; 
            min-height: 100vh; display: flex; flex-direction: column; 
        }
        .eng { font-family: 'Outfit', sans-serif; }

        header { 
            position: relative; background: var(--bg);
            padding: 40px 20px 20px; 
            text-align: center; display: flex; flex-direction: column; align-items: center;
        }
        .logo-img { height: 28px; width: auto; margin-bottom: 8px; filter: brightness(0) invert(1); opacity: 0.95; }
        
        /* 타이틀 아래 라인 */
        .page-title { 
            font-size: 11px; 
            font-weight: 800; 
            color: var(--accent); 
            letter-spacing: 0.18em; 
            text-transform: uppercase;
            position: relative;
            padding-bottom: 10px;
        }
        .page-title::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 1px;
            background: var(--accent);
            opacity: 0.6;
        }

        main { padding: 0 16px 20px; max-width: 500px; margin: 0 auto; width: 100%; flex: 1; display: flex; flex-direction: column; }
        
        .seat-section { margin-top: 15px; text-align: center; }
        .seat-grid-container { display: flex; flex-direction: column; gap: 12px; margin-bottom: 30px; width: 100%; }
        
        /* 그리드 간격 및 정렬 최적화 */
        .seat-row { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 8px; 
            justify-items: center; 
            width: 100%; 
        }

        .seat {
            width: var(--seat-size);
            height: var(--seat-size);
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--surface);
            display: flex; align-items: center; justify-content: center;
            font-size: clamp(13px, 4vw, 18px);
            font-weight: 300; color: var(--sub);
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            text-align: center; 
            line-height: 1.25; 
            word-break: break-all; 
            padding: 8px;
            overflow: hidden;
        }

        .seat.sweet-spot { border-color: var(--accent); color: var(--accent); }
        
        .seat.occupied { 
            border-color: var(--sub2); 
            color: var(--text); 
            background-color: #1a1a1a; 
            font-weight: 400;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .seat-name-label {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
        }
        
        .seat.sweet-spot.occupied { 
            background-color: #1a1a1a; 
            border-color: var(--accent); 
            color: var(--text); 
            box-shadow: 0 0 15px rgba(239, 124, 28, 0.15);
        }

        .refresh-status { 
            margin: 0 auto 40px; 
            display: flex; flex-direction: column; align-items: center; gap: 5px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.03); 
            border-radius: 24px;
            width: fit-content;
        }
        .status-header { 
            display: flex; align-items: center; gap: 7px; 
            font-size: 10px; font-weight: 700; color: var(--text); 
            letter-spacing: 0.1em; text-transform: uppercase; 
        }
        .status-header i { font-size: 11px; color: var(--accent); animation: spin 3s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .last-sync-time { font-size: 9px; color: var(--sub); letter-spacing: 0.5px; }

        .guide-section { border-top: 1px solid var(--border); padding-top: 25px; width: 100%; }
        .guide-title { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
        .guide-title i { color: var(--accent); font-size: 18px; }
        .guide-item { font-size: 13px; color: var(--sub); margin-bottom: 10px; word-break: keep-all; list-style: none; }
        .highlight { color: #BBB; }
        .point-color { color: var(--accent); }

        .list-footer {
            padding: 40px 24px 60px; 
            border-top: 1px solid var(--border);
            display: flex; flex-direction: column; align-items: center; gap: 12px; text-align: center;
        }
        .footer-desc { font-size: 12px; font-weight: 300; color: var(--sub); line-height: 1.85; letter-spacing: 0.01em; font-style: italic; max-width: 320px; }
        .footer-insta {
            display: inline-flex; align-items: center; justify-content: center; gap: 6px;
            text-decoration: none; color: var(--sub); font-size: 12px; font-weight: 500;
            letter-spacing: 0.04em; border: 1px solid var(--border); border-radius: 999px; padding: 8px 14px;
            transition: all 0.15s;
        }
        .footer-insta svg { width: 15px; height: 15px; display: block; }
        .footer-insta:active { color: var(--text); border-color: var(--sub); }
    </style>
</head>
<body>
    <header>
        <img src="https://stylusseoul.github.io/vinyl/images/logo.png" alt="Stylus" class="logo-img">
        <div class="page-title">Stylus Seat Map</div>
    </header>
    <main>
        <section class="seat-section">
            <div class="seat-grid-container">
                <div class="seat-row" id="row1"></div>
                <div class="seat-row" id="row2"></div>
            </div>
            <div class="refresh-status eng">
                <div class="status-header"><i class="ph ph-circle-notch"></i> Live Connected</div>
                <div class="last-sync-time" id="lastUpdated">Syncing</div>
            </div>
        </section>
        <section class="guide-section">
            <h3 class="guide-title"><i class="ph ph-info"></i> 좌석 안내</h3>
            <div class="guide-item">1. 좌석은 별도의 지정 없이 <span class="highlight">선착순으로 운영</span>됩니다.</div>
            <div class="guide-item">2. <span class="point-color">오렌지색 라인</span> 좌석은 음악 감상에 가장 적합한 <span class="highlight">스위트 스팟(Sweet Spot)</span>입니다.</div>
        </section>
    </main>
    <footer class="list-footer">
        <p class="footer-desc">A small room designed for listening, where sound is free to breathe and time is never in a hurry.</p>
        <a class="footer-insta" href="https://www.instagram.com/stylus.seoul" target="_blank">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><circle cx="12" cy="12" r="4.5"/><circle cx="17.5" cy="6.5" r="0.8" fill="currentColor" stroke="none"/></svg>
            <span>stylus.seoul</span>
        </a>
    </footer>
    <script>
        const SWEET_SPOTS = [2, 3];
        const TOTAL_SEATS = 8;
        let seats = Array.from({ length: TOTAL_SEATS }, (_, i) => ({ no: i + 1, name: "" }));
        
        function renderMap() {
            const r1 = document.getElementById('row1'); const r2 = document.getElementById('row2');
            r1.innerHTML = ''; r2.innerHTML = '';
            seats.forEach((s) => {
                const d = document.createElement('div'); d.className = 'seat';
                if (SWEET_SPOTS.includes(s.no)) d.classList.add('sweet-spot');
                const n = (s.name || "").trim();
                if (n !== "") { 
                    d.classList.add('occupied');
                    const label = document.createElement('span');
                    label.className = 'seat-name-label';
                    label.textContent = n;
                    d.appendChild(label);
                    
                    if (n.length >= 10) d.style.fontSize = 'clamp(10px, 2.6vw, 11px)'; 
                    else if (n.length >= 6) d.style.fontSize = 'clamp(11px, 3vw, 13px)'; 
                    else if (n.length >= 4) d.style.fontSize = 'clamp(13px, 3.5vw, 15px)';
                    else d.style.fontSize = 'clamp(15px, 4vw, 17px)';
                } else {
                    d.textContent = s.no;
                    d.style.fontSize = ''; 
                }
                if (s.no <= 4) r1.appendChild(d); else r2.appendChild(d);
            });
        }

        async function updateData() {
            const el = document.getElementById('lastUpdated'); if (typeof REQUEST_API_URL === 'undefined') return;
            try {
                const res = await fetch(`${REQUEST_API_URL}?action=read&sheet=Seat Map&t=${Date.now()}`);
                const data = await res.json();
                if (data && Array.isArray(data)) {
                    const ns = Array.from({ length: TOTAL_SEATS }, (_, i) => ({ no: i + 1, name: "" }));
                    data.forEach(item => { 
                        const no = parseInt(item.NO || item.no); 
                        const name = item.NAME || item.name || ""; 
                        if (no >= 1 && no <= TOTAL_SEATS) ns[no - 1].name = name; 
                    });
                    seats = ns; 
                    renderMap();
                    const now = new Date(); 
                    el.textContent = `LAST SYNC: ${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}`;
                }
            } catch (e) { el.textContent = "Sync Error"; }
        }
        window.onload = () => { renderMap(); updateData(); setInterval(updateData, 30000); };
    </script>
</body>
</html>
