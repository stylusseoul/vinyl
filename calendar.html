<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>STYLUS VINYL — SCHEDULE</title>
    
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #080808;
            --surface: #111;
            --border: rgba(255,255,255,0.05);
            --text: #fff;
            --sub: rgba(255,255,255,0.38);
            --sub2: rgba(255,255,255,0.18);
            --accent: #EF7C1C;
            --font: 'Inter', 'Pretendard', -apple-system, sans-serif;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        html, body { 
            background: var(--bg); color: var(--text); 
            font-family: var(--font); -webkit-font-smoothing: antialiased;
            overflow-x: hidden; height: 100%;
        }

        /* [1] HEADER: 홈 버튼 제거, 타이틀 중앙 정렬 스타일 */
        .list-header {
            position: sticky; top: 0; z-index: 100;
            background: var(--bg);
            padding-top: env(safe-area-inset-top, 0);
            box-shadow: 0 1px 0 rgba(255,255,255,0.05), 0 4px 20px rgba(0,0,0,0.6);
        }
        .header-top {
            display: flex; align-items: center; justify-content: center; /* 중앙 정렬 */
            padding: 12px 16px 10px; height: 56px;
        }
        .logo-text {
            font-size: 15px; font-weight: 800; letter-spacing: 0.18em; 
            color: var(--text); text-transform: uppercase;
        }

        /* [2] 캘린더 메인 컨테이너 */
        .calendar-main { padding: 20px 16px; max-width: 1000px; margin: 0 auto; }

        /* [3] FullCalendar 커스텀 (디자인 고도화) */
        .fc { --fc-border-color: var(--border); }
        .fc-theme-standard .fc-scrollgrid { border: none !important; }
        .fc td, .fc th { border: 0.5px solid var(--border) !important; }

        /* 툴바: 월 이동 버튼 미니멀화 */
        .fc .fc-toolbar { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 4px 15px; margin-bottom: 10px !important; 
        }
        .fc .fc-toolbar-title { 
            font-size: 14px !important; font-weight: 700; 
            letter-spacing: 0.05em; text-transform: uppercase; 
        }
        
        /* 이전/다음 버튼 디자인 */
        .fc .fc-button-primary { 
            background: var(--surface) !important; border: 1px solid var(--border) !important; 
            color: var(--text) !important; border-radius: 8px !important; 
            padding: 5px 10px !important; font-size: 11px !important;
        }
        .fc .fc-button-primary:active { opacity: 0.6; }
        
        /* 날짜 및 요일 스타일 */
        .fc .fc-col-header-cell-cushion { 
            color: var(--sub) !important; font-size: 11px; 
            text-decoration: none; padding: 12px 0 !important; 
        }
        .fc .fc-daygrid-day-number { 
            color: var(--sub) !important; font-size: 12px; 
            font-weight: 300; padding: 10px !important; text-decoration: none; 
        }
        .fc .fc-day-today { background: rgba(255,255,255,0.03) !important; }
        .fc .fc-day-today .fc-daygrid-day-number { color: var(--accent) !important; font-weight: 800; }

        /* 이벤트 디자인 */
        .fc-event { 
            background: rgba(239, 124, 28, 0.08) !important; border: none !important; 
            border-left: 2px solid var(--accent) !important; border-radius: 0 !important;
            margin: 2px 4px !important; padding: 2px 4px !important;
        }
        .fc-event-main { color: var(--text) !important; font-size: 10px !important; font-weight: 500; }

        /* [4] 모달: 하단 시트 스타일 */
        #modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 1000; align-items: flex-end; 
        }
        #modal.active { display: flex; }
        .modal-content {
            background: #161616; width: 100%; border-radius: 28px 28px 0 0;
            padding: 32px 24px calc(env(safe-area-inset-bottom) + 32px);
            border-top: 1px solid rgba(255,255,255,0.1);
            animation: slideUp 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .modal-content h3 { font-size: 17px; margin-bottom: 20px; font-weight: 600; color: var(--text); }
        .input-group { display: flex; gap: 12px; margin-bottom: 12px; }
        .modal-content input {
            width: 100%; background: rgba(255,255,255,0.06); border: 1px solid transparent;
            border-radius: 12px; color: #fff; padding: 16px; font-size: 15px; outline: none; font-family: var(--font);
        }
        .modal-content input:focus { border: 1px solid var(--accent); background: rgba(255,255,255,0.1); }
        .label-small { font-size: 11px; color: var(--sub); margin-bottom: 6px; display: block; text-transform: uppercase; letter-spacing: 0.05em; }

        .btn-group { display: flex; flex-direction: column; gap: 10px; margin-top: 24px; }
        .btn-save { background: var(--accent); color: #fff; padding: 16px; border-radius: 12px; border: none; font-size: 16px; font-weight: 600; cursor: pointer; }
        .btn-close { background: var(--sub2); color: #fff; padding: 16px; border-radius: 12px; border: none; font-size: 16px; font-weight: 600; cursor: pointer; }
        .btn-del { background: transparent; color: #ff4d4d; padding: 10px; border: none; font-size: 13px; cursor: pointer; margin-top: 5px; }

    </style>
</head>
<body>

    <header class="list-header">
        <div class="header-top">
            <div class="logo-text">STYLUS SCHEDULE</div>
        </div>
    </header>

    <main class="calendar-main">
        <div id="calendar"></div>
    </main>

    <div id="modal">
        <div class="modal-content">
            <h3 id="m-date">DATE</h3>
            <input type="hidden" id="m-id">
            
            <div class="input-group">
                <div style="flex:1">
                    <span class="label-small">Start Time</span>
                    <input type="time" id="m-start" value="19:00">
                </div>
                <div style="flex:1">
                    <span class="label-small">End Time</span>
                    <input type="time" id="m-end" value="21:00">
                </div>
            </div>

            <span class="label-small">Vinyl / Artist</span>
            <input type="text" id="m-content" placeholder="무엇을 들을까요?" style="margin-bottom:12px">
            
            <span class="label-small">Requested By</span>
            <input type="text" id="m-author" placeholder="성함 입력">

            <div class="btn-group">
                <button class="btn-save" onclick="saveEvent()">SAVE SCHEDULE</button>
                <button class="btn-close" onclick="closeModal()">CLOSE</button>
                <button id="del-btn" class="btn-del" onclick="deleteEvent()" style="display:none">DELETE THIS SCHEDULE</button>
            </div>
        </div>
    </div>

    <script>
        // ★ 본인의 Google Apps Script URL을 여기에 넣으세요
        const API_URL = '본인의_GAS_URL'; 

        let calendar;
        let selectedDate;

        document.addEventListener('DOMContentLoaded', function() {
            const calendarEl = document.getElementById('calendar');
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'ko',
                headerToolbar: { left: 'prev,next', center: 'title', right: '' },
                height: 'auto',
                dateClick: (info) => openModal(info.dateStr),
                eventClick: (info) => openModal(null, info.event),
                events: fetchEvents
            });
            calendar.render();
        });

        async function fetchEvents(info, successCallback) {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                const events = data.map(item => ({
                    id: item.ID, 
                    title: `${item.START_TIME} ${item.CONTENT}`,
                    start: item.DATE,
                    extendedProps: { 
                        start_time: item.START_TIME, 
                        end_time: item.END_TIME,
                        content: item.CONTENT, 
                        author: item.AUTHOR 
                    }
                }));
                successCallback(events);
            } catch (e) { console.error(e); }
        }

        function openModal(dateStr, event = null) {
            const modal = document.getElementById('modal');
            const delBtn = document.getElementById('del-btn');
            modal.classList.add('active');

            if (event) {
                selectedDate = event.startStr;
                document.getElementById('m-id').value = event.id;
                document.getElementById('m-start').value = event.extendedProps.start_time;
                document.getElementById('m-end').value = event.extendedProps.end_time;
                document.getElementById('m-content').value = event.extendedProps.content;
                document.getElementById('m-author').value = event.extendedProps.author;
                delBtn.style.display = 'block';
            } else {
                selectedDate = dateStr;
                document.getElementById('m-id').value = '';
                document.getElementById('m-start').value = '19:00';
                document.getElementById('m-end').value = '21:00';
                document.getElementById('m-content').value = '';
                document.getElementById('m-author').value = '';
                delBtn.style.display = 'none';
            }
            document.getElementById('m-date').innerText = selectedDate;
        }

        function closeModal() { document.getElementById('modal').classList.remove('active'); }

        async function saveEvent() {
            const payload = {
                action: 'create',
                date: selectedDate,
                start_time: document.getElementById('m-start').value,
                end_time: document.getElementById('m-end').value,
                content: document.getElementById('m-content').value,
                author: document.getElementById('m-author').value
            };
            const btn = document.querySelector('.btn-save');
            btn.innerText = "SAVING...";
            await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
            calendar.refetchEvents();
            btn.innerText = "SAVE SCHEDULE";
            closeModal();
        }

        async function deleteEvent() {
            if(!confirm("삭제할까요?")) return;
            const payload = { action: 'delete', id: document.getElementById('m-id').value };
            await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
            calendar.refetchEvents();
            closeModal();
        }
    </script>
</body>
</html>
