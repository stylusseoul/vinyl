<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>STYLUS VINYL — CALENDAR</title>
    
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    
    <style>
        /* [1] 기존 사이트 변수 복제 */
        :root {
            --bg: #080808;
            --surface: #111;
            --border: rgba(255,255,255,0.08);
            --text: #fff;
            --sub: rgba(255,255,255,0.38);
            --sub2: rgba(255,255,255,0.18);
            --accent: #EF7C1C;
            --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        /* [2] 기본 레이아웃 하드코딩 (배경 하얀색 방지) */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { 
            background: var(--bg) !important; 
            color: var(--text); 
            font-family: var(--font);
            min-height: 100vh;
        }

        /* [3] 헤더/푸터 (기존 디자인 복제) */
        .list-header {
            position: sticky; top: 0; z-index: 50;
            background: var(--bg);
            padding: 12px 16px;
            height: 56px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }
        .logo-text { font-size: 16px; font-weight: 800; letter-spacing: 0.18em; text-transform: uppercase; }
        .icon-btn { color: #fff; text-decoration: none; width: 32px; height: 32px; display: grid; place-items: center; }

        .calendar-wrapper { max-width: 1000px; margin: 30px auto; padding: 0 16px; }

        /* [4] FullCalendar 강력 오버라이드 (기존 톤앤매너) */
        .fc { --fc-border-color: var(--border); }
        .fc-theme-standard td, .fc-theme-standard th { border: 1px solid var(--border) !important; }
        .fc .fc-toolbar-title { font-size: 15px !important; font-weight: 700; letter-spacing: 0.05em; }
        
        /* 버튼 스타일 */
        .fc .fc-button-primary {
            background: var(--surface) !important;
            border: 1px solid var(--border) !important;
            border-radius: 8px !important;
            font-size: 11px !important;
            text-transform: uppercase;
            padding: 6px 12px !important;
        }
        .fc .fc-button-primary:active { background: var(--accent) !important; }

        /* 날짜 및 요일 */
        .fc .fc-col-header-cell-cushion { color: var(--sub) !important; font-size: 10px; text-decoration: none; }
        .fc .fc-daygrid-day-number { color: var(--sub2) !important; font-size: 11px; padding: 8px !important; text-decoration: none; }
        .fc .fc-day-today { background: rgba(255,255,255,0.03) !important; }
        .fc .fc-day-today .fc-daygrid-day-number { color: var(--accent) !important; font-weight: 800; }

        /* 이벤트 스타일 (심플 세로선) */
        .fc-event { background: rgba(239, 124, 28, 0.05) !important; border: none !important; border-left: 2px solid var(--accent) !important; cursor: pointer; margin: 2px 0 !important; }
        .fc-event-title { color: var(--text) !important; font-size: 11px !important; padding: 2px 4px !important; }

        /* [5] 모달 (Request Sheet 스타일) */
        #modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            z-index: 1000; justify-content: center; align-items: center;
        }
        #modal.active { display: flex; }
        .modal-content {
            background: var(--surface); border: 1px solid var(--border);
            width: 90%; max-width: 340px; padding: 30px; border-radius: 24px;
        }
        .modal-content h3 { font-size: 16px; margin-bottom: 20px; color: var(--accent); letter-spacing: 0.05em; }
        .modal-content input {
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            border-radius: 12px; color: #fff; padding: 14px; margin-bottom: 12px; outline: none;
        }
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        .btn-group button { flex: 1; padding: 14px; border-radius: 12px; border: none; font-weight: 600; cursor: pointer; }
        .btn-save { background: var(--accent); color: #fff; }
        .btn-del { background: #ff4d4d; color: #fff; }
        .btn-close { background: var(--sub2); color: #fff; }
    </style>
</head>
<body>

    <header class="list-header">
        <div class="logo-text">STYLUS VINYL</div>
        <a href="index.html" class="icon-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
        </a>
    </header>

    <div class="calendar-wrapper">
        <div id="calendar"></div>
    </div>

    <div id="modal">
        <div class="modal-content">
            <h3 id="modal-date">DATE</h3>
            <input type="hidden" id="event-id">
            <input type="time" id="event-time" value="19:00">
            <input type="text" id="event-content" placeholder="내용 입력">
            <input type="text" id="event-author" placeholder="작성자">
            <div class="btn-group">
                <button class="btn-save" onclick="saveEvent()">SAVE</button>
                <button id="del-btn" class="btn-del" onclick="deleteEvent()" style="display:none;">DEL</button>
                <button class="btn-close" onclick="closeModal()">CLOSE</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '여기에_GAS_URL을_넣으세요'; 
        let calendar;
        let selectedDate;

        document.addEventListener('DOMContentLoaded', function() {
            const calendarEl = document.getElementById('calendar');
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'ko',
                headerToolbar: { left: 'prev,next', center: 'title', right: 'today' },
                dateClick: (info) => openModal(info.dateStr),
                eventClick: (info) => openModal(null, info.event),
                events: fetchEvents
            });
            calendar.render();
        });

        async function fetchEvents(info, successCallback) {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                const events = data.map(item => ({
                    id: item.ID, 
                    title: `${item.TIME} ${item.CONTENT} (${item.AUTHOR})`,
                    start: item.DATE,
                    extendedProps: { time: item.TIME, content: item.CONTENT, author: item.AUTHOR }
                }));
                successCallback(events);
            } catch (e) { console.error(e); }
        }

        function openModal(dateStr, event = null) {
            const modal = document.getElementById('modal');
            const delBtn = document.getElementById('del-btn');
            modal.classList.add('active');
            if (event) {
                selectedDate = event.startStr;
                document.getElementById('event-id').value = event.id;
                document.getElementById('event-time').value = event.extendedProps.time;
                document.getElementById('event-content').value = event.extendedProps.content;
                document.getElementById('event-author').value = event.extendedProps.author;
                delBtn.style.display = 'block';
            } else {
                selectedDate = dateStr;
                document.getElementById('event-id').value = '';
                document.getElementById('event-time').value = '19:00';
                document.getElementById('event-content').value = '';
                document.getElementById('event-author').value = '';
                delBtn.style.display = 'none';
            }
            document.getElementById('modal-date').innerText = selectedDate;
        }

        function closeModal() { document.getElementById('modal').classList.remove('active'); }

        async function saveEvent() {
            const payload = {
                action: 'create',
                date: selectedDate,
                time: document.getElementById('event-time').value,
                content: document.getElementById('event-content').value,
                author: document.getElementById('event-author').value
            };
            await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
            calendar.refetchEvents();
            closeModal();
        }

        async function deleteEvent() {
            if(!confirm("삭제할까요?")) return;
            const payload = { action: 'delete', id: document.getElementById('event-id').value };
            await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
            calendar.refetchEvents();
            closeModal();
        }
    </script>
</body>
</html>
