<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>STYLUS VINYL — CALENDAR</title>
    
    <link rel="stylesheet" href="style.css"> <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    
    <style>
        /* 캘린더 페이지 전용 추가 보정 (기존 CSS와 조화) */
        .list-main { padding-top: 20px; min-height: 80vh; }
        #calendar { margin-bottom: 50px; }
        
        /* 모달 중앙 정렬을 위한 헬퍼 */
        #modal.active { display: flex !important; }
    </style>
</head>
<body>

    <header class="list-header">
        <div class="header-top">
            <div class="logo-text">STYLUS VINYL</div>
            <a href="index.html" class="icon-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
            </a>
        </div>
    </header>

    <main class="list-main">
        <div id="calendar-container">
            <div id="calendar"></div>
        </div>
    </main>

    <footer class="list-footer">
        <p class="footer-desc">Shared Vinyl Listening Schedule</p>
        <div class="footer-insta">© 2026 STYLUS SEOUL</div>
    </footer>

    <div id="modal">
        <div class="modal-content">
            <h3 id="modal-date">SELECT DATE</h3>
            <input type="hidden" id="event-id">
            <input type="time" id="event-time" value="19:00">
            <input type="text" id="event-content" placeholder="무엇을 들을까요?">
            <input type="text" id="event-author" placeholder="작성자 성함">
            
            <div class="btn-group">
                <button class="btn-save" onclick="saveEvent()">SAVE</button>
                <button id="del-btn" class="btn-del" onclick="deleteEvent()" style="display:none;">DEL</button>
                <button class="btn-close" onclick="closeModal()">CLOSE</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbxmAQDzoB_apWLmq7YwAZdobLoCLG--SxYRDTD_d0tCFsvx-y7ijBdYf_KDGV9IFIAO2w/exec'; // ★ 중요: 본인의 GAS URL로 교체
        let calendar;
        let selectedDate;

        document.addEventListener('DOMContentLoaded', function() {
            const calendarEl = document.getElementById('calendar');
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'ko',
                headerToolbar: { left: 'prev,next', center: 'title', right: 'today' },
                // 날짜 클릭 시 (새 일정)
                dateClick: (info) => openModal(info.dateStr),
                // 일정 클릭 시 (수정/삭제)
                eventClick: (info) => openModal(null, info.event),
                events: fetchEvents
            });
            calendar.render();
        });

        // 데이터 불러오기 (시트의 대문자 컬럼 반영)
        async function fetchEvents(info, successCallback) {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                const events = data.map(item => ({
                    id: item.ID, 
                    title: `${item.TIME} | ${item.CONTENT} (${item.AUTHOR})`,
                    start: item.DATE,
                    extendedProps: { time: item.TIME, content: item.CONTENT, author: item.AUTHOR }
                }));
                successCallback(events);
            } catch (e) { console.error("데이터 로드 실패:", e); }
        }

        function openModal(dateStr, event = null) {
            const modal = document.getElementById('modal');
            const delBtn = document.getElementById('del-btn');
            modal.classList.add('active');

            if (event) {
                selectedDate = event.startStr;
                document.getElementById('event-id').value = event.id;
                document.getElementById('event-time').value = event.extendedProps.time;
                document.getElementById('event-content').value = event.extendedProps.content;
                document.getElementById('event-author').value = event.extendedProps.author;
                delBtn.style.display = 'block';
            } else {
                selectedDate = dateStr;
                document.getElementById('event-id').value = '';
                document.getElementById('event-time').value = '19:00';
                document.getElementById('event-content').value = '';
                document.getElementById('event-author').value = '';
                delBtn.style.display = 'none';
            }
            document.getElementById('modal-date').innerText = selectedDate;
        }

        function closeModal() { document.getElementById('modal').classList.remove('active'); }

        async function saveEvent() {
            const payload = {
                action: 'create',
                date: selectedDate,
                time: document.getElementById('event-time').value,
                content: document.getElementById('event-content').value,
                author: document.getElementById('event-author').value
            };
            
            // 버튼 비활성화 (중복 클릭 방지)
            const btn = document.querySelector('.btn-save');
            btn.innerText = "SAVING...";
            btn.disabled = true;

            await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
            calendar.refetchEvents();
            btn.innerText = "SAVE";
            btn.disabled = false;
            closeModal();
        }

        async function deleteEvent() {
            if(!confirm("이 일정을 삭제할까요?")) return;
            const payload = { action: 'delete', id: document.getElementById('event-id').value };
            await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
            calendar.refetchEvents();
            closeModal();
        }
    </script>
</body>
</html>
