<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STYLUS LIVE QUEUE</title>
  <script src="config.js"></script>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-base: #000000;
      --bg-card: #0a0a0a;
      --border-color: #222222;
      --text-main: #ffffff;
      --text-sub: #777777;
      --accent: #1DB954;
      --alert: #ff3b30;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background-color: var(--bg-base);
      color: var(--text-main);
      font-family: 'Pretendard', sans-serif;
      -webkit-font-smoothing: antialiased;
      padding-bottom: 120px; /* 플로팅 버튼 여백 */
    }

    /* ─── 헤더 (완벽한 Flex 구조) ─── */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border-color);
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }

    .header-left {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 16px;
    }

    .logo {
      height: 24px;
      width: auto;
      object-fit: contain;
      display: block;
    }

    .title-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      border-left: 1px solid var(--border-color);
      padding-left: 16px;
    }

    .page-title {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 1px;
      color: #ccc;
      white-space: nowrap;
    }

    .live-dot {
      width: 8px;
      height: 8px;
      background-color: var(--alert);
      border-radius: 50%;
      box-shadow: 0 0 10px var(--alert);
      animation: blink 1.5s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes blink {
      0% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1); }
    }

    .header-right {
      text-align: right;
      font-family: 'JetBrains Mono', monospace;
      flex-shrink: 0;
    }

    .clock {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: 2px;
      white-space: nowrap;
    }

    .sync-time {
      font-size: 0.75rem;
      color: var(--text-sub);
      white-space: nowrap;
    }

    /* 반응형 헤더 처리 (모바일 화면) */
    @media (max-width: 600px) {
      .header {
        padding: 12px 16px;
      }
      .title-wrap {
        border-left: none;
        padding-left: 0;
      }
      .logo {
        display: none; /* 모바일에서는 로고 숨기고 글씨만 표시 */
      }
      .page-title {
        font-size: 0.9rem;
      }
      .clock {
        font-size: 1rem;
      }
      .sync-time {
        font-size: 0.65rem;
      }
    }

    /* ─── 큐 리스트 ─── */
    .queue-container {
      max-width: 1400px;
      margin: 24px auto 0;
      padding: 0 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ─── 카드 디자인 ─── */
    .card {
      background-color: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 24px;
      display: grid;
      grid-template-columns: 100px 1fr auto;
      gap: 24px;
      align-items: center;
      transition: all 0.2s ease;
    }
    
    .card:hover {
      border-color: #444;
      background-color: #111;
    }

    .card-time {
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-sub);
      display: flex;
      flex-direction: column;
      gap: 4px;
      border-right: 1px solid var(--border-color);
      padding-right: 24px;
    }
    
    .card-time .hhmm { font-size: 1.3rem; font-weight: 700; color: #eee; }
    .card-time .yymmdd { font-size: 0.75rem; letter-spacing: 0.5px; }

    .card-info { display: flex; flex-direction: column; justify-content: center; overflow: hidden; }
    .track-name { font-size: 1.5rem; font-weight: 800; color: var(--text-main); margin-bottom: 6px; letter-spacing: -0.5px; word-break: break-word; }
    .artist-name { font-size: 1rem; font-weight: 500; color: var(--text-sub); margin-bottom: 12px; word-break: break-word; }

    .meta-group { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .tag-user { display: inline-flex; align-items: center; gap: 6px; font-size: 0.8rem; font-weight: 600; color: #fff; background: #1a1a1a; padding: 6px 12px; border-radius: 4px; border: 1px solid #333; }
    .tag-memo { font-size: 0.85rem; font-weight: 400; color: #aaa; font-style: italic; border-left: 2px solid var(--text-sub); padding-left: 10px; }

    .card-status { text-align: right; }
    .badge { display: inline-flex; align-items: center; justify-content: center; padding: 8px 20px; border-radius: 4px; font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; font-weight: 700; letter-spacing: 1px; }
    .badge-waiting { background: transparent; color: var(--accent); border: 1px solid var(--accent); box-shadow: 0 0 10px rgba(29, 185, 84, 0.1); }
    .badge-played { background: #1a1a1a; color: #555; border: 1px solid #222; }

    .card.played { opacity: 0.3; filter: grayscale(100%); background-color: transparent; border-color: #111; }
    .card.played:hover { background-color: transparent; border-color: #111; }
    .card.played .track-name { text-decoration: line-through; }

    @media (max-width: 900px) {
      .queue-container { padding: 0 16px; }
      .card { grid-template-columns: 1fr; gap: 16px; padding: 20px; }
      .card-time { border-right: none; border-bottom: 1px solid var(--border-color); padding-right: 0; padding-bottom: 12px; flex-direction: row; align-items: baseline; gap: 12px; }
      .card-status { text-align: left; margin-top: 8px; }
    }

    /* ─── 플로팅 버튼 (메인 화면 검색기와 동일한 디자인/위치) ─── */
    .floating-back-btn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background-color: var(--accent);
      color: #000;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 12px rgba(29, 185, 84, 0.4);
      cursor: pointer;
      z-index: 999;
      text-decoration: none;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .floating-back-btn:hover {
      transform: scale(1.05) translateY(-2px);
      box-shadow: 0 6px 16px rgba(29, 185, 84, 0.6);
    }

    .floating-back-btn svg {
      width: 24px;
      height: 24px;
      fill: currentColor;
    }
  </style>
</head>
<body>

  <!-- 헤더 영역 -->
  <header class="header">
    <div class="header-left">
      <img src="images/logo.png" alt="STYLUS" class="logo" onerror="this.style.display='none';">
      <div class="title-wrap">
        <div class="live-dot"></div>
        <div class="page-title">REQUEST QUEUE</div>
      </div>
    </div>
    <div class="header-right">
      <div class="clock" id="clock">00:00:00</div>
      <div class="sync-time" id="lastUpdate">SYNC: --:--:--</div>
    </div>
  </header>

  <!-- 큐 리스트 -->
  <main class="queue-container" id="queue">
    <div style="text-align:center; padding:100px 20px; color:var(--text-sub); font-family: 'JetBrains Mono', monospace;">LOADING DATA...</div>
  </main>

  <!-- 메인 검색기로 돌아가는 플로팅 버튼 (우측 하단) -->
  <a href="index.html" class="floating-back-btn" aria-label="음악 검색기로 돌아가기">
    <svg viewBox="0 0 24 24">
      <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
    </svg>
  </a>

  <script>
    const queueEl = document.getElementById('queue');
    const updateEl = document.getElementById('lastUpdate');
    const clockEl = document.getElementById('clock');

    setInterval(() => {
      const d = new Date();
      clockEl.textContent = d.toLocaleTimeString('en-US', { hour12: false });
    }, 1000);

    function parseDateTime(rawText) {
      if (!rawText) return { date: '', time: '' };
      const parts = rawText.split(' ');
      if (parts.length >= 2) {
        return { date: parts[0], time: parts.slice(1).join(' ') };
      }
      return { date: '', time: rawText };
    }

    function getSortableTime(timeStr) {
      if (!timeStr) return 0;
      const parsed = new Date(timeStr.replace(/\./g, '/'));
      return isNaN(parsed.getTime()) ? 0 : parsed.getTime();
    }

    async function fetchRequests() {
      const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Requests&_=${new Date().getTime()}`;
      
      try {
        const res = await fetch(url);
        const text = await res.text();
        const json = JSON.parse(text.replace(/^[^{]*/, '').replace(/\);\s*$/, ''));
        const rows = json.table.rows;
        let requests = [];

        rows.forEach(r => {
          if (!r || !r.c) return;
          const rawTime = r.c[0] ? (r.c[0].f || r.c[0].v) : '';
          const artist = r.c[1] ? (r.c[1].v || '') : '';
          const album = r.c[2] ? (r.c[2].v || '') : '';
          const track = r.c[3] ? (r.c[3].v || '') : '';
          const name = r.c[4] ? (r.c[4].v || '') : '';
          const memo = r.c[5] ? (r.c[5].v || '') : '';
          const status = r.c[6] ? (r.c[6].v || '') : '';

          if (!track || !rawTime || track === 'Track' || track === '곡명') return;

          requests.push({ 
            rawTime, artist, album, track, name, memo, status,
            timestamp: getSortableTime(rawTime)
          });
        });

        // 정렬 (1순위: N 대기중 / 2순위: 신청 시간)
        requests.sort((a, b) => {
          const aStatus = (a.status || '').toString().trim().toUpperCase();
          const bStatus = (b.status || '').toString().trim().toUpperCase();
          
          const aIsPlayed = (aStatus === 'Y');
          const bIsPlayed = (bStatus === 'Y');

          if (!aIsPlayed && bIsPlayed) return -1;
          if (aIsPlayed && !bIsPlayed) return 1;

          return a.timestamp - b.timestamp; 
        });

        renderQueue(requests);
      } catch (err) {
        console.error('Fetch Error:', err);
      }
    }

    function renderQueue(requests) {
      const now = new Date();
      updateEl.textContent = `SYNC: ${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}`;

      if (requests.length === 0) {
        queueEl.innerHTML = `<div style="text-align:center; padding:100px 20px; color:var(--text-sub); font-family: 'JetBrains Mono', monospace;">NO REQUESTS IN QUEUE</div>`;
        return;
      }

      let html = '';
      
      requests.forEach(req => {
        const s = (req.status || '').toString().trim().toUpperCase();
        const isPlayed = (s === 'Y');
        
        const cardClass = isPlayed ? 'card played' : 'card';
        const { date, time } = parseDateTime(req.rawTime);
        const artistAlbumText = req.album ? `${req.artist} · ${req.album}` : req.artist;

        let statusBadge = '';
        if (isPlayed) {
          statusBadge = `<div class="badge badge-played">PLAYED</div>`;
        } else {
          statusBadge = `<div class="badge badge-waiting">WAITING</div>`;
        }

        html += `
          <div class="${cardClass}">
            <div class="card-time">
              <div class="hhmm">${time}</div>
              <div class="yymmdd">${date}</div>
            </div>
            
            <div class="card-info">
              <div class="track-name">${req.track}</div>
              <div class="artist-name">${artistAlbumText}</div>
              <div class="meta-group">
                <span class="tag-user">👤 ${req.name}</span>
                ${req.memo ? `<span class="tag-memo">"${req.memo}"</span>` : ''}
              </div>
            </div>

            <div class="card-status">
              ${statusBadge}
            </div>
          </div>
        `;
      });

      queueEl.innerHTML = html;
    }

    fetchRequests();
    setInterval(fetchRequests, 10000);
  </script>
</body>
</html>
