<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STYLUS LIVE QUEUE</title>
  <script src="config.js"></script>
  <!-- 프리미엄 폰트: Pretendard & JetBrains Mono(숫자/시계용) -->
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-base: #000000;
      --bg-card: #0a0a0a;
      --border-color: #222222;
      --text-main: #ffffff;
      --text-sub: #777777;
      --accent: #1DB954;
      --alert: #ff3b30;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background-color: var(--bg-base);
      color: var(--text-main);
      font-family: 'Pretendard', sans-serif;
      -webkit-font-smoothing: antialiased;
      padding-bottom: 80px;
    }

    /* ─── 헤더 (로고 & 직관적 정보) ─── */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border-color);
      padding: 24px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-left {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* 로고 이미지 (경로 수정 필요시 변경) */
    .logo {
      height: 32px;
      width: auto;
      object-fit: contain;
    }

    .title-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .page-title {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 2px;
      color: #ccc;
    }

    .live-dot {
      width: 8px;
      height: 8px;
      background-color: var(--alert);
      border-radius: 50%;
      box-shadow: 0 0 12px var(--alert);
      animation: blink 1.5s ease-in-out infinite;
    }

    @keyframes blink {
      0% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1); }
    }

    .header-right {
      text-align: right;
      font-family: 'JetBrains Mono', monospace;
    }

    .clock {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: 4px;
    }

    .sync-time {
      font-size: 0.8rem;
      color: var(--text-sub);
    }

    /* ─── 큐 리스트 ─── */
    .queue-container {
      max-width: 1400px;
      margin: 40px auto 0;
      padding: 0 40px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ─── 카드 디자인 (미니멀 하이엔드) ─── */
    .card {
      background-color: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 24px 32px;
      display: grid;
      grid-template-columns: 120px 1fr auto;
      gap: 32px;
      align-items: center;
      transition: all 0.3s ease;
    }
    
    .card:hover {
      border-color: #444;
      background-color: #111;
    }

    /* 1. 시간 영역 */
    .card-time {
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-sub);
      display: flex;
      flex-direction: column;
      gap: 4px;
      border-right: 1px solid var(--border-color);
      padding-right: 32px;
    }
    
    .card-time .hhmm {
      font-size: 1.4rem;
      font-weight: 700;
      color: #eee;
    }
    .card-time .yymmdd {
      font-size: 0.75rem;
      letter-spacing: 0.5px;
    }

    /* 2. 곡 정보 영역 */
    .card-info {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .track-name {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--text-main);
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .artist-name {
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--text-sub);
      margin-bottom: 16px;
    }

    .meta-group {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    /* 유저명 & 메모 디자인 (세련된 태그 형태) */
    .tag-user {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      color: #fff;
      background: #1a1a1a;
      padding: 6px 14px;
      border-radius: 4px;
      border: 1px solid #333;
    }

    .tag-memo {
      font-size: 0.9rem;
      font-weight: 400;
      color: #aaa;
      font-style: italic;
      border-left: 2px solid var(--text-sub);
      padding-left: 12px;
    }

    /* 3. 상태 뱃지 영역 */
    .card-status {
      text-align: right;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 24px;
      border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 1px;
    }

    /* 대기중 (강렬한 라인형 버튼) */
    .badge-waiting {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--accent);
      box-shadow: 0 0 10px rgba(29, 185, 84, 0.1);
    }

    /* 재생완료 (죽은 느낌의 솔리드 버튼) */
    .badge-played {
      background: #1a1a1a;
      color: #555;
      border: 1px solid #222;
    }

    /* ─── 재생 완료 상태 시 카드 전체 딤처리 ─── */
    .card.played {
      opacity: 0.3;
      filter: grayscale(100%);
      background-color: transparent;
      border-color: #111;
    }
    .card.played:hover { background-color: transparent; border-color: #111; }
    .card.played .track-name { text-decoration: line-through; }

    /* ─── 반응형 (태블릿/모바일) ─── */
    @media (max-width: 900px) {
      .header { padding: 20px; }
      .queue-container { padding: 0 20px; }
      .card { 
        grid-template-columns: 1fr; 
        gap: 20px; 
        padding: 24px;
      }
      .card-time { 
        border-right: none; 
        border-bottom: 1px solid var(--border-color); 
        padding-right: 0; 
        padding-bottom: 16px; 
        flex-direction: row; 
        align-items: baseline; 
        gap: 12px;
      }
      .card-status { text-align: left; margin-top: 12px; }
    }
  </style>
</head>
<body>

  <!-- 헤더 영역 -->
  <header class="header">
    <div class="header-left">
      <!-- 기존 흑백 로고 이미지 적용 (경로는 사이트 상황에 맞게 수정 가능) -->
      <img src="images/logo.png" alt="STYLUS" class="logo" onerror="this.style.display='none';">
      <div class="title-wrap">
        <div class="live-dot"></div>
        <div class="page-title">REQUEST QUEUE</div>
      </div>
    </div>
    <div class="header-right">
      <div class="clock" id="clock">00:00:00</div>
      <div class="sync-time" id="lastUpdate">SYNC: --:--:--</div>
    </div>
  </header>

  <!-- 큐 리스트 -->
  <main class="queue-container" id="queue">
    <div style="text-align:center; padding:100px 20px; color:var(--text-sub); font-family: 'JetBrains Mono', monospace;">LOADING DATA...</div>
  </main>

  <script>
    const queueEl = document.getElementById('queue');
    const updateEl = document.getElementById('lastUpdate');
    const clockEl = document.getElementById('clock');

    // 상단 시계 초 단위 업데이트
    setInterval(() => {
      const d = new Date();
      clockEl.textContent = d.toLocaleTimeString('en-US', { hour12: false });
    }, 1000);

    // YYYY.MM.DD HH:MM 형태를 분리
    function parseDateTime(rawText) {
      if (!rawText) return { date: '', time: '' };
      const parts = rawText.split(' ');
      if (parts.length >= 2) {
        return { date: parts[0], time: parts.slice(1).join(' ') };
      }
      return { date: '', time: rawText };
    }

    // 시간 정렬용 변환
    function getSortableTime(timeStr) {
      if (!timeStr) return 0;
      const parsed = new Date(timeStr.replace(/\./g, '/'));
      return isNaN(parsed.getTime()) ? 0 : parsed.getTime();
    }

    async function fetchRequests() {
      const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Requests&_=${new Date().getTime()}`;
      
      try {
        const res = await fetch(url);
        const text = await res.text();
        const json = JSON.parse(text.replace(/^[^{]*/, '').replace(/\);\s*$/, ''));
        const rows = json.table.rows;
        let requests = [];

        rows.forEach(r => {
          if (!r || !r.c) return;
          const rawTime = r.c[0] ? (r.c[0].f || r.c[0].v) : '';
          const artist = r.c[1] ? (r.c[1].v || '') : '';
          const album = r.c[2] ? (r.c[2].v || '') : '';
          const track = r.c[3] ? (r.c[3].v || '') : '';
          const name = r.c[4] ? (r.c[4].v || '') : '';
          const memo = r.c[5] ? (r.c[5].v || '') : '';
          const status = r.c[6] ? (r.c[6].v || '') : '';

          if (!track || !rawTime || track === 'Track' || track === '곡명') return;

          requests.push({ 
            rawTime, artist, album, track, name, memo, status,
            timestamp: getSortableTime(rawTime)
          });
        });

        // 다중 조건 정렬: N(대기중)을 위로, 그 안에서는 시간 오름차순(옛날 것 우선)
        requests.sort((a, b) => {
          const aStatus = (a.status || '').toString().trim().toUpperCase();
          const bStatus = (b.status || '').toString().trim().toUpperCase();
          
          const aIsPlayed = (aStatus === 'Y');
          const bIsPlayed = (bStatus === 'Y');

          if (!aIsPlayed && bIsPlayed) return -1;
          if (aIsPlayed && !bIsPlayed) return 1;

          return a.timestamp - b.timestamp; 
        });

        renderQueue(requests);
      } catch (err) {
        console.error('Fetch Error:', err);
      }
    }

    function renderQueue(requests) {
      const now = new Date();
      updateEl.textContent = `SYNC: ${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}`;

      if (requests.length === 0) {
        queueEl.innerHTML = `<div style="text-align:center; padding:100px 20px; color:var(--text-sub); font-family: 'JetBrains Mono', monospace;">NO REQUESTS IN QUEUE</div>`;
        return;
      }

      let html = '';
      
      requests.forEach(req => {
        const s = (req.status || '').toString().trim().toUpperCase();
        const isPlayed = (s === 'Y');
        
        const cardClass = isPlayed ? 'card played' : 'card';
        const { date, time } = parseDateTime(req.rawTime);
        const artistAlbumText = req.album ? `${req.artist} · ${req.album}` : req.artist;

        // 뱃지 상태 (N = WAITING / Y = PLAYED)
        let statusBadge = '';
        if (isPlayed) {
          statusBadge = `<div class="badge badge-played">PLAYED</div>`;
        } else {
          statusBadge = `<div class="badge badge-waiting">WAITING</div>`;
        }

        html += `
          <div class="${cardClass}">
            <!-- 1. 시간 -->
            <div class="card-time">
              <div class="hhmm">${time}</div>
              <div class="yymmdd">${date}</div>
            </div>
            
            <!-- 2. 곡 정보 -->
            <div class="card-info">
              <div class="track-name">${req.track}</div>
              <div class="artist-name">${artistAlbumText}</div>
              <div class="meta-group">
                <span class="tag-user">👤 ${req.name}</span>
                ${req.memo ? `<span class="tag-memo">"${req.memo}"</span>` : ''}
              </div>
            </div>

            <!-- 3. 상태 뱃지 -->
            <div class="card-status">
              ${statusBadge}
            </div>
          </div>
        `;
      });

      queueEl.innerHTML = html;
    }

    fetchRequests();
    setInterval(fetchRequests, 10000);
  </script>
</body>
</html>
