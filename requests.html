<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STYLUS LIVE QUEUE</title>
  <script src="config.js"></script>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    :root {
      --bg-base: #050505;
      --bg-card: #111111;
      --border-color: #262626;
      --text-main: #ffffff;
      --text-muted: #888888;
      --accent: #1DB954;
      --accent-dim: rgba(29, 185, 84, 0.15);
      --played-opacity: 0.35;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background-color: var(--bg-base);
      color: var(--text-main);
      font-family: 'Pretendard', -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      padding-bottom: 60px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(5, 5, 5, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border-color);
      padding: 20px 32px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    .topbar-left h1 {
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      text-transform: uppercase;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .live-dot {
      width: 10px;
      height: 10px;
      background-color: #ff3b30;
      border-radius: 50%;
      box-shadow: 0 0 10px #ff3b30;
      animation: pulse-red 1.5s infinite;
    }
    @keyframes pulse-red {
      0% { box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.7); }
      70% { box-shadow: 0 0 0 6px rgba(255, 59, 48, 0); }
      100% { box-shadow: 0 0 0 0 rgba(255, 59, 48, 0); }
    }

    .topbar-left p {
      color: var(--text-muted);
      font-size: 0.95rem;
      font-weight: 500;
    }

    .topbar-right {
      text-align: right;
      color: var(--text-muted);
      font-family: monospace;
      font-size: 0.9rem;
    }

    .queue-wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .track-card {
      background-color: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 24px;
      display: grid;
      grid-template-columns: 80px 1fr auto;
      gap: 24px;
      align-items: center;
      transition: transform 0.2s ease, border-color 0.2s ease;
      animation: slideIn 0.4s ease forwards;
    }
    
    .track-card:hover { border-color: #444; transform: translateY(-2px); }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .time-col {
      text-align: center;
      font-family: monospace;
      color: var(--text-muted);
      border-right: 1px solid var(--border-color);
      padding-right: 24px;
    }
    .time-time { font-size: 1.1rem; font-weight: 600; color: #ccc; }
    .time-date { font-size: 0.75rem; margin-top: 4px; letter-spacing: -0.5px; }

    .info-col { display: flex; flex-direction: column; justify-content: center; }
    .track-title { font-size: 1.5rem; font-weight: 700; color: var(--text-main); margin-bottom: 6px; letter-spacing: -0.3px; }
    .track-artist { font-size: 1.05rem; font-weight: 500; color: var(--text-muted); margin-bottom: 16px; }

    .meta-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .req-name { display: inline-flex; align-items: center; gap: 6px; background: #222; color: #ddd; padding: 6px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; }
    .req-memo { display: inline-block; background: var(--accent-dim); color: var(--accent); padding: 6px 14px; border-radius: 8px; font-size: 0.9rem; font-weight: 500; }

    .status-col { text-align: right; }
    .status-badge {
      display: inline-block;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* 상태별 컬러 디자인 */
    /* 대기중 (N) - 초록색으로 활성화된 느낌 */
    .status-pending { 
      background: rgba(29, 185, 84, 0.1); 
      color: var(--accent); 
      border: 1px solid rgba(29, 185, 84, 0.3); 
    }
    /* 재생완료 (Y) - 회색으로 죽인 느낌 */
    .status-played { 
      background: transparent; 
      color: #555; 
      border: 1px solid #333; 
    }
    .status-custom { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid #555; }

    /* 재생 완료(Played) 카드 전체 디자인 - 확 어둡게 죽임 */
    .track-card.played {
      opacity: var(--played-opacity);
      background-color: transparent;
      border-color: transparent;
      box-shadow: none;
    }
    .track-card.played:hover { transform: none; border-color: transparent; }
    .track-card.played .track-title { text-decoration: line-through; color: #666; }

    @media (max-width: 768px) {
      .track-card { grid-template-columns: 1fr; gap: 16px; }
      .time-col { border-right: none; border-bottom: 1px solid var(--border-color); padding-right: 0; padding-bottom: 12px; text-align: left; display: flex; gap: 12px; align-items: baseline; }
      .status-col { text-align: left; margin-top: 8px; }
      .topbar { padding: 16px 20px; flex-direction: column; align-items: flex-start; gap: 8px; }
    }
  </style>
</head>
<body>

  <header class="topbar">
    <div class="topbar-left">
      <h1><div class="live-dot"></div> REQUEST QUEUE</h1>
      <p>STYLUS Vinyl & Music</p>
    </div>
    <div class="topbar-right">
      <div id="clock">00:00:00</div>
      <div id="lastUpdate">Sync: -</div>
    </div>
  </header>

  <main class="queue-wrap" id="queue">
    <div style="text-align:center; padding:100px 20px; color:var(--text-muted);">로딩 중...</div>
  </main>

  <script>
    const queueEl = document.getElementById('queue');
    const updateEl = document.getElementById('lastUpdate');
    const clockEl = document.getElementById('clock');

    setInterval(() => {
      const d = new Date();
      clockEl.textContent = d.toLocaleTimeString('en-US', { hour12: false });
    }, 1000);

    function parseDateTime(rawText) {
      if (!rawText) return { date: '', time: '' };
      const parts = rawText.split(' ');
      if (parts.length >= 2) {
        return { date: parts[0], time: parts.slice(1).join(' ') };
      }
      return { date: '', time: rawText };
    }

    // 날짜 문자열(YYYY.MM.DD HH:MM)을 비교 가능한 숫자로 변환하는 함수
    function getSortableTime(timeStr) {
      if (!timeStr) return 0;
      // "2026.03.03 12:48" -> "2026/03/03 12:48" 형태로 바꿔서 Date 객체 생성
      const parsed = new Date(timeStr.replace(/\./g, '/'));
      return isNaN(parsed.getTime()) ? 0 : parsed.getTime();
    }

    async function fetchRequests() {
      const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Requests&_=${new Date().getTime()}`;
      
      try {
        const res = await fetch(url);
        const text = await res.text();
        const json = JSON.parse(text.replace(/^[^{]*/, '').replace(/\);\s*$/, ''));
        const rows = json.table.rows;
        let requests = [];

        rows.forEach(r => {
          if (!r || !r.c) return;
          const rawTime = r.c[0] ? (r.c[0].f || r.c[0].v) : '';
          const artist = r.c[1] ? (r.c[1].v || '') : '';
          const album = r.c[2] ? (r.c[2].v || '') : '';
          const track = r.c[3] ? (r.c[3].v || '') : '';
          const name = r.c[4] ? (r.c[4].v || '') : '';
          const memo = r.c[5] ? (r.c[5].v || '') : '';
          const status = r.c[6] ? (r.c[6].v || '') : '';

          if (!track || !rawTime || track === 'Track' || track === '곡명') return;

          requests.push({ 
            rawTime, 
            artist, 
            album, 
            track, 
            name, 
            memo, 
            status,
            timestamp: getSortableTime(rawTime) // 정렬용 타임스탬프 추가
          });
        });

        // ★ 정렬 로직 (다중 조건 정렬)
        requests.sort((a, b) => {
          const aStatus = (a.status || '').toString().trim().toUpperCase();
          const bStatus = (b.status || '').toString().trim().toUpperCase();
          
          const aIsPlayed = (aStatus === 'Y');
          const bIsPlayed = (bStatus === 'Y');

          // 1순위: 재생 안 된 것(N 또는 빈값)이 재생 된 것(Y)보다 무조건 위로!
          if (!aIsPlayed && bIsPlayed) return -1;
          if (aIsPlayed && !bIsPlayed) return 1;

          // 2순위: 상태가 같다면, 더 옛날에 신청한 곡(시간 오름차순)이 위로!
          return a.timestamp - b.timestamp; 
        });

        renderQueue(requests);
      } catch (err) {
        console.error('Fetch Error:', err);
      }
    }

    function renderQueue(requests) {
      const now = new Date();
      updateEl.textContent = `Sync: ${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}`;

      if (requests.length === 0) {
        queueEl.innerHTML = `<div style="text-align:center; padding:100px 20px; color:var(--text-muted);">현재 대기 중인 신청곡이 없습니다.</div>`;
        return;
      }

      let html = '';
      
      requests.forEach(req => {
        const s = (req.status || '').toString().trim().toUpperCase();
        const isPlayed = (s === 'Y');
        const isPending = (s === 'N' || s === '');

        const cardClass = isPlayed ? 'track-card played' : 'track-card';
        const { date, time } = parseDateTime(req.rawTime);
        const artistAlbumText = req.album ? `${req.artist} · ${req.album}` : req.artist;

        let statusBadge = '';
        if (isPlayed) {
          statusBadge = `<span class="status-badge status-played">PLAYED</span>`;
        } else if (isPending) {
          statusBadge = `<span class="status-badge status-pending">WAITING</span>`;
        } else {
          statusBadge = `<span class="status-badge status-custom">${req.status}</span>`;
        }

        html += `
          <div class="${cardClass}">
            <div class="time-col">
              <div class="time-time">${time}</div>
              <div class="time-date">${date}</div>
            </div>
            
            <div class="info-col">
              <div class="track-title">${req.track}</div>
              <div class="track-artist">${artistAlbumText}</div>
              <div class="meta-row">
                <span class="req-name">👤 ${req.name}</span>
                ${req.memo ? `<span class="req-memo">💬 ${req.memo}</span>` : ''}
              </div>
            </div>

            <div class="status-col">
              ${statusBadge}
            </div>
          </div>
        `;
      });

      queueEl.innerHTML = html;
    }

    fetchRequests();
    setInterval(fetchRequests, 10000);
  </script>
</body>
</html>
