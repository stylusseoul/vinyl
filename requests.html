<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <title>Stylus — Request Queue</title>
  <meta name="theme-color" content="#080808">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:     #080808;
      --surface:#111111;
      --border: rgba(255,255,255,0.07);
      --text:   #ffffff;
      --sub:    rgba(255,255,255,0.42); 
      --sub2:   rgba(255,255,255,0.18);
      --accent: #EF7C1C;
      --font:   'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { background: var(--bg); }
    body {
      min-height: 100dvh;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
      -webkit-text-size-adjust: 100%;
      overscroll-behavior: none;
      padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 96px);
      overflow-x: hidden; 
    }
    .hidden { display: none !important; }

    /* ══════════════════════════════
       HEADER (Web UI)
    ══════════════════════════════ */
    .req-header { position: sticky; top: 0; z-index: 50; background: rgba(8,8,8,0.94); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); padding-top: env(safe-area-inset-top, 0); border-bottom: 1px solid var(--border); }
    .req-header-inner { position: relative; display: flex; align-items: center; justify-content: space-between; height: 56px; padding: 12px 16px 10px; }
    .header-left { display: flex; align-items: center; flex: 1; }
    .logo-img { height: 28px; object-fit: contain; filter: brightness(0) invert(1); opacity: 0.95; display: block; flex-shrink: 0; }
    .header-center { position: absolute; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; gap: 5px; pointer-events: none; white-space: nowrap; }
    .header-page-name { font-size: 14px; font-weight: 700; letter-spacing: 0.04em; color: var(--text); text-transform: uppercase; line-height: 1; }
    .header-live-row { display: flex; align-items: center; gap: 5px; }
    .live-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 6px var(--accent); animation: pulse 2s ease-in-out infinite; flex-shrink: 0; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    .live-label { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; color: var(--accent); text-transform: uppercase; line-height: 1; }
    .hd-sep { width: 1px; height: 9px; background: rgba(255,255,255,0.14); }
    .req-clock { font-size: 10px; font-weight: 400; letter-spacing: 0.04em; color: var(--sub); font-variant-numeric: tabular-nums; line-height: 1; }
    .header-right { display: flex; align-items: center; justify-content: flex-end; flex: 1; }

    .pdf-btn { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; background: none; border: none; color: #ffffff; cursor: pointer; border-radius: 50%; transition: color 0.15s; -webkit-tap-highlight-color: transparent; padding: 0; }
    .pdf-btn svg { width: 20px; height: 20px; display: block; }
    .pdf-btn:active { color: var(--accent); }

    .req-count-bar { display: flex; align-items: center; padding: 0 16px 11px; gap: 5px; }
    .req-count-num { font-size: 12px; font-weight: 700; color: var(--accent); font-variant-numeric: tabular-nums; }
    .req-count-label { font-size: 12px; font-weight: 400; color: var(--sub); }
    .sync-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--sub2); margin-left: auto; flex-shrink: 0; }
    .sync-time { font-size: 11px; font-weight: 400; color: var(--sub2); font-variant-numeric: tabular-nums; }

    /* ══════════════════════════════
       LIST (Web UI)
    ══════════════════════════════ */
    .req-main { padding: 0 16px; } 
    .req-list  { display: flex; flex-direction: column; }
    .req-item { display: flex; flex-direction: column; gap: 10px; padding: 18px 0; border-bottom: 1px solid var(--border); }
    .req-item:last-child { border-bottom: none; padding-bottom: 18px; }

    .req-top-row { display: flex; align-items: center; gap: 8px; }
    .req-idx { font-size: 16px; font-weight: 800; font-variant-numeric: tabular-nums; line-height: 1; letter-spacing: -0.01em; color: rgba(255,255,255,0.14); min-width: 26px; }
    .req-item.waiting .req-idx { color: var(--accent); }
    .req-status { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; line-height: 1; padding: 3px 8px; border-radius: 4px; }
    .req-item.waiting .req-status { color: var(--accent); background: rgba(239,124,28,0.1); }
    .req-item.played .req-status { color: rgba(255,255,255,0.22); background: rgba(255,255,255,0.05); }
    .req-top-time { font-size: 11px; font-weight: 400; color: var(--sub); font-variant-numeric: tabular-nums; margin-left: auto; }

    .req-main-row { display: flex; align-items: center; gap: 13px; }
    .req-cover { flex-shrink: 0; width: 64px; height: 64px; border-radius: 7px; object-fit: cover; display: block; background: var(--surface); }

    .req-body { 
      flex: 1; min-width: 0; 
      display: flex; flex-direction: column; justify-content: center; gap: 3px; 
    }
    
    .req-track, .req-artist, .req-user, .req-memo {
      display: block; width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; 
    }

    .req-track { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.3; }
    .req-artist { font-size: 12px; font-weight: 400; color: var(--sub); line-height: 1.3; }
    .req-user { font-size: 11px; font-weight: 500; color: var(--accent); opacity: 0.85; line-height: 1.3; margin-top: 2px;}
    .req-memo { font-size: 11px; font-weight: 400; color: var(--sub); font-style: italic; line-height: 1.3; }

    .req-item.played { opacity: 0.48; }
    .req-item.played .req-track { text-decoration: line-through; text-decoration-color: rgba(255,255,255,0.2); }

    /* ══════════════════════════════
       LOADING / EMPTY / FOOTER (Web UI)
    ══════════════════════════════ */
    .req-loading { display: flex; justify-content: center; padding: 80px 0; }
    .spinner { width: 20px; height: 20px; border: 1.5px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.65s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .req-empty { text-align: center; padding: 80px 20px; color: var(--sub); font-size: 13px; line-height: 1.6; }
    .req-footer { padding: 24px 20px calc(env(safe-area-inset-bottom, 0px) + 24px); border-top: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; gap: 16px; }
    .footer-desc { font-size: 12px; font-weight: 300; color: var(--sub); line-height: 2; text-align: center; font-style: italic; }
    .footer-insta { display: inline-flex; align-items: center; gap: 6px; text-decoration: none; color: var(--sub); font-size: 12px; font-weight: 500; border: 1px solid var(--border); border-radius: 999px; padding: 8px 14px; }
    .footer-insta svg { width: 14px; height: 14px; }
    .float-btn { position: fixed; bottom: calc(max(24px, env(safe-area-inset-bottom, 0px) + 16px)); left: 50%; transform: translateX(-50%); z-index: 1000; display: inline-flex; align-items: center; gap: 7px; background: rgba(20,20,20,0.92); backdrop-filter: blur(16px); color: var(--text); padding: 11px 20px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 8px 28px rgba(0,0,0,0.5); font-size: 13px; font-weight: 600; text-decoration: none; }
    .float-btn svg { width: 16px; height: 16px; flex-shrink: 0; }

    @media (min-width: 600px) { .req-header-inner, .req-count-bar, .req-main, .req-footer { max-width: 600px; margin-left: auto; margin-right: auto; } }

    /* ══════════════════════════════
       📸 캡처 전용 컨테이너 (Ultimate Spotify Vibe)
    ══════════════════════════════ */
    .capture-container {
      position: absolute; top: 0; left: -9999px; 
      width: 540px; 
      background-color: #121212; 
      z-index: -1;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", var(--font);
    }
    
    .cap-gradient {
      position: absolute; top: 0; left: 0; right: 0; height: 600px;
      background: linear-gradient(to bottom, rgba(80, 80, 80, 0.5) 0%, #121212 400px);
      z-index: 0; pointer-events: none;
    }

    /* 📱 아이폰 스타일 상태바 (30% 확대) */
    .cap-status-bar {
      position: relative; z-index: 2;
      display: flex; justify-content: space-between; align-items: center;
      padding: 18px 36px 0; 
      color: #fff; 
      font-size: 22px; 
      font-weight: 600; letter-spacing: -0.01em;
    }
    .cap-status-right { 
      display: flex; gap: 8px; align-items: center; 
      transform: scale(1.3); 
      transform-origin: right center;
    }
    
    .cap-nav-bar {
      position: relative; z-index: 2;
      display: flex; justify-content: space-between; align-items: center;
      padding: 0 32px; height: 70px;
      color: #fff;
    }
    .cap-nav-icon { width: 32px; height: 32px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    
    .cap-content { position: relative; z-index: 1; padding: 10px 32px 30px; }

    .cap-header { margin-bottom: 24px; }
    
    /* 동적 그리드 */
    .cap-grid {
      width: 280px; height: 280px; 
      margin: 0 auto 32px; 
      display: grid; 
      box-shadow: 0 24px 50px rgba(0,0,0,0.6); 
      background: #222;
      overflow: hidden;
    }
    .cap-grid img { width: 100%; height: 100%; object-fit: cover; }

    .cap-title-area { text-align: left; display: flex; flex-direction: column; align-items: flex-start; width: 100%; }
    .cap-title { 
      font-size: 38px !important; 
      font-weight: 800; color: #ffffff; letter-spacing: -0.04em; 
      margin-bottom: 12px; 
      line-height: 1.1; 
      white-space: normal; 
    }

    /* 🎶 프로필 및 플레이리스트 텍스트 (20% 확대) */
    .cap-profile-wrap { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .cap-profile-img-wrap {
      width: 34px; height: 34px; 
      border-radius: 50%; background: #222;
      position: relative; overflow: hidden;
    }
    .cap-profile-img { 
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      max-width: 19px; max-height: 14px; 
      width: auto !important; height: auto !important; 
      filter: brightness(0) invert(1); 
    }
    .cap-profile-name { font-size: 19.8px; font-weight: 700; color: #ffffff; letter-spacing: -0.01em; } 
    
    .cap-subtitle-wrap { font-size: 17.4px; font-weight: 400; color: rgba(255,255,255,0.65); display: flex; align-items: center; gap: 6px; } 

    /* 액션 버튼 영역 */
    .cap-actions {
      display: flex; justify-content: flex-start; 
      align-items: center;
      margin-top: 24px; margin-bottom: 24px;
      gap: 22px; 
      color: rgba(255,255,255,0.7); 
    }
    .cap-action-icon { 
      width: 34px; height: 34px; display: block; 
      stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; 
    }
    .cap-action-icon.fill { fill: currentColor; stroke: none; }

    /* 버튼 하단 라인 */
    .cap-divider {
      width: 100%; height: 1px; background: rgba(255, 255, 255, 0.12);
      margin-bottom: 20px; 
    }

    /* 🎶 간격 불일치 및 텍스트 팽창 완벽 해결 */
    .cap-list {
      display: flex !important;
      flex-direction: column !important;
      gap: 16px !important; 
      padding: 0 !important; 
      width: 100% !important;
      box-sizing: border-box !important;
    }
    .cap-list .req-status { display: none !important; }
    .cap-list .req-top-time { display: none !important; } 
    
    .cap-list .req-item { 
      display: flex !important;
      flex-direction: row !important;
      align-items: center !important; 
      padding: 0 !important; 
      margin: 0 !important; 
      border: none !important; 
      gap: 16px !important; 
      width: 100% !important; /* 영역 제한 */
      max-width: 100% !important;
      box-sizing: border-box !important;
    }
    .cap-list .req-item.played { opacity: 1 !important; }
    .cap-list .req-item.played .req-track { text-decoration: none !important; }
    
    .cap-list .req-top-row {
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      width: 26px !important;
      margin: 0 !important;
      flex-shrink: 0 !important;
    }
    .cap-list .req-idx { 
      color: rgba(255,255,255,0.6) !important; 
      font-size: 18px !important; 
      font-weight: 500 !important;
      min-width: unset !important; 
    }

    .cap-list .req-main-row { 
      display: flex !important; 
      align-items: center !important; 
      gap: 14px !important; 
      flex: 1 !important; 
      margin: 0 !important;
      min-width: 0 !important; /* 🚨 Flex 팽창 방지 핵심 🚨 */
    }
    .cap-list .req-cover { 
      width: 62px !important; 
      height: 62px !important; 
      border-radius: 4px !important; 
      flex-shrink: 0 !important;
    } 
    
    .cap-list .req-body { 
      flex: 1 !important; 
      min-width: 0 !important; /* 🚨 Flex 팽창 방지 핵심 🚨 */
      display: flex !important;
      flex-direction: column !important;
      justify-content: center !important;
      gap: 4px !important; 
      margin: 0 !important; 
    }
    
    .cap-list .req-track, 
    .cap-list .req-artist, 
    .cap-list .req-user, 
    .cap-list .req-memo { 
      display: block !important; 
      width: 100% !important; 
      white-space: normal !important; 
      word-break: break-all !important; /* 🚨 띄어쓰기 없는 긴 텍스트 강제 줄바꿈 🚨 */
      overflow-wrap: break-word !important; 
      overflow: hidden !important; 
    }

    .cap-list .req-track { font-size: 18.5px !important; font-weight: 600 !important; line-height: 1.3 !important; color: #ffffff !important; } 
    .cap-list .req-artist { font-size: 16px !important; font-weight: 400 !important; line-height: 1.3 !important; color: rgba(255, 255, 255, 0.7) !important; } 
    .cap-list .req-user { font-size: 14.5px !important; line-height: 1.3 !important; margin-top: 2px !important; color: var(--accent) !important; }
    .cap-list .req-memo { font-size: 14.5px !important; line-height: 1.3 !important; } 

    /* 캡처 푸터 */
    .cap-footer {
      width: 85%;
      margin: 20px auto 0; 
      padding-top: 24px; 
      border-top: 1px solid rgba(255, 255, 255, 0.12);
      display: flex; flex-direction: column; align-items: center; gap: 10px;
    }
    .cap-quote {
      display: flex; flex-direction: column; align-items: center;
      margin-bottom: 6px; text-align: center;
    }
    .cap-quote-text {
      font-size: 15.5px; color: rgba(255, 255, 255, 0.7); font-style: italic; line-height: 1.4; margin-bottom: 4px;
    }
    .cap-quote-author {
      font-size: 13.5px; color: rgba(255, 255, 255, 0.35); 
    }
    .cap-insta { font-size: 19.2px; font-weight: 600; color: rgba(255,255,255,0.9); letter-spacing: 0.04em; }
    .cap-time { display: none; } 
  </style>
</head>
<body>

  <header class="req-header">
    <div class="req-header-inner">
      <div class="header-left">
        <a href="https://stylusseoul.github.io/vinyl/" style="display: flex; align-items: center; text-decoration: none; color: inherit;">
          <img src="images/logo.png" alt="Stylus" class="logo-img" onerror="this.style.display='none'">
        </a>
      </div>
      <div class="header-center">
        <span class="header-page-name">Requests</span>
        <div class="header-live-row">
          <div class="live-dot"></div><span class="live-label">Live</span><div class="hd-sep"></div><span class="req-clock" id="clock">00:00</span>
        </div>
      </div>
      <div class="header-right">
        <button class="pdf-btn" id="downloadBtn" aria-label="플레이리스트 이미지 저장">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 3v12m0 0-4-4m4 4 4-4"/>
            <path d="M3 17v2a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-2"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="req-count-bar">
      <span class="req-count-num" id="reqCountNum">—</span><span class="req-count-label">requests</span>
      <div class="sync-dot"></div><span class="sync-time" id="lastSync">—</span>
    </div>
  </header>

  <main class="req-main">
    <div id="reqLoading" class="req-loading"><div class="spinner"></div></div>
    <p id="reqEmpty" class="req-empty hidden">신청곡이 없어요</p>
    <div id="reqList" class="req-list"></div>
  </main>

  <footer class="req-footer">
    <p class="footer-desc">A small room designed for listening,<br>where sound is free to breathe and time is never in a hurry.</p>
    <a class="footer-insta" href="https://www.instagram.com/stylus.seoul" target="_blank" rel="noopener noreferrer">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><circle cx="12" cy="12" r="4.5"/><circle cx="17.5" cy="6.5" r="0.8" fill="currentColor" stroke="none"/>
      </svg>
      <span>stylus.seoul</span>
    </a>
  </footer>

  <a href="index.html" class="float-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <span>Search</span>
  </a>

  <div id="captureContainer" class="capture-container">
    <div class="cap-gradient"></div>
    
    <div class="cap-status-bar">
      <div id="capStatusTime">00:00</div>
      <div class="cap-status-right">
        <svg width="18" height="12" viewBox="0 0 18 12" fill="none"><path d="M1 12h2.5c.3 0 .5-.2.5-.5v-2c0-.3-.2-.5-.5-.5H1c-.3 0-.5.2-.5.5v2c0 .3.2.5.5.5zm4.5 0h2.5c.3 0 .5-.2.5-.5v-4.5c0-.3-.2-.5-.5-.5h-2.5c-.3 0-.5.2-.5.5v4.5c0 .3.2.5.5.5zm4.5 0h2.5c.3 0 .5-.2.5-.5v-7c0-.3-.2-.5-.5-.5h-2.5c-.3 0-.5.2-.5.5v7c0 .3.2.5.5.5zm4.5 0h2.5c.3 0 .5-.2.5-.5v-10c0-.3-.2-.5-.5-.5h-2.5c-.3 0-.5.2-.5.5v10c0 .3.2.5.5.5z" fill="#fff"/></svg>
        <svg width="17" height="12" viewBox="0 0 16 12" fill="none"><path d="M8 12c.8 0 1.5-.7 1.5-1.5S8.8 9 8 9s-1.5.7-1.5 1.5S7.2 12 8 12zm5.7-4.3c-1.5-1.5-3.5-2.4-5.7-2.4s-4.2.9-5.7 2.4c-.2.2-.2.6 0 .8l.8.8c.2.2.6.2.8 0 1.1-1.1 2.5-1.7 4.1-1.7s3 .6 4.1 1.7c.2.2.6.2.8 0l.8-.8c.2-.2.2-.6 0-.8zm2.8-2.9C14.2 2.6 11.3 1.2 8 1.2S1.8 2.6-.5 4.8c-.2.2-.2.6 0 .8l.8.8c.2.2.6.2.8 0 1.9-1.9 4.6-3 7.4-3s5.5 1.1 7.4 3c.2.2.6.2.8 0l.8-.8c.2-.3.2-.6 0-.8z" fill="#fff"/></svg>
        <svg width="26" height="12" viewBox="0 0 25 12" fill="none"><rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="#fff"/><path d="M23 4v4a2 2 0 0 0 0-4z" fill="#fff"/><rect x="2" y="2" width="18" height="8" rx="2" fill="#fff"/></svg>
      </div>
    </div>

    <div class="cap-nav-bar">
      <svg class="cap-nav-icon" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"></polyline></svg>
      <svg class="cap-nav-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
    </div>

    <div class="cap-content">
      <div class="cap-header">
        <div id="captureGrid" class="cap-grid"></div>
        <div class="cap-title-area">
          <h1 class="cap-title">Spins by Request</h1>
          <div class="cap-profile-wrap">
            <div class="cap-profile-img-wrap">
              <img src="images/logo.png" alt="Stylus" class="cap-profile-img" onerror="this.style.display='none'">
            </div>
            <span class="cap-profile-name">Stylus</span>
          </div>
          <div class="cap-subtitle-wrap">
            <span>플레이리스트</span>
            <span>·</span>
            <span id="capOldestDate"></span>
          </div>
        </div>
      </div>
      
      <div class="cap-actions">
        <svg class="cap-action-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg>
        <svg class="cap-action-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><polyline points="8 12 12 16 16 12"></polyline><line x1="12" y1="8" x2="12" y2="16"></line></svg>
        <svg class="cap-action-icon cap-action-icon.fill" viewBox="0 0 24 24"><circle cx="12" cy="12" r="2" fill="currentColor" stroke="none"></circle><circle cx="19" cy="12" r="2" fill="currentColor" stroke="none"></circle><circle cx="5" cy="12" r="2" fill="currentColor" stroke="none"></circle></svg>
      </div>

      <div class="cap-divider"></div>

      <div id="captureList" class="req-list cap-list"></div>
      
      <div class="cap-footer">
        <div class="cap-quote">
          <span class="cap-quote-text">Without music, life would be a mistake</span>
          <span class="cap-quote-author">Friedrich Nietzsche</span>
        </div>
        <div class="cap-insta">@stylus.seoul</div>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <script>
    'use strict';

    let allRequests = [];
    const clockEl     = document.getElementById('clock');
    const reqCountNum = document.getElementById('reqCountNum');
    const reqLoading  = document.getElementById('reqLoading');
    const reqEmpty    = document.getElementById('reqEmpty');
    const reqList     = document.getElementById('reqList');
    const lastSync    = document.getElementById('lastSync');
    const downloadBtn = document.getElementById('downloadBtn');

    function updateClock() {
      const d = new Date();
      clockEl.textContent = String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
    }
    updateClock();
    setInterval(updateClock, 5000);

    function parseTime(raw) {
      if (!raw) return { display: '', ts: 0 };
      const str = String(raw);
      const m   = str.match(/(\d{1,2}:\d{2})/);
      const disp = m ? m[1] : str.substring(0, 5);
      const ts   = new Date(str.replace(/\./g, '/')).getTime();
      return { display: disp, ts: isNaN(ts) ? 0 : ts };
    }

    /* ── CORS 우회 프록시 ── */
    function thumb(url) {
      const u = String(url || '').trim().replace(/&amp;/g, '&').replace(/^\/\//, 'https://').replace(/^http:/, 'https:');
      const core = u.replace(/^https:\/\//, '');
      return 'https://images.weserv.nl/?url=' + encodeURIComponent(core) + '&w=240&h=240&fit=cover&q=80&t=anonymous';
    }

    function esc(s) {
      return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function updateSync() {
      const n = new Date();
      lastSync.textContent = String(n.getHours()).padStart(2, '0') + ':' + String(n.getMinutes()).padStart(2, '0') + ':' + String(n.getSeconds()).padStart(2, '0');
    }

    function renderRequests() {
      reqCountNum.textContent = allRequests.length;
      if (allRequests.length === 0) {
        reqEmpty.classList.remove('hidden');
        reqList.innerHTML = '';
        return;
      }
      reqEmpty.classList.add('hidden');
      let totalIdx = 0;
      const frag = document.createDocumentFragment();

      allRequests.forEach(function(req) {
        const isPlayed = req.status.toUpperCase() === 'Y';
        totalIdx++;
        const idxStr   = String(totalIdx).padStart(2, '0');
        const timeDisp = parseTime(req.rawTime).display;
        const artistTxt = [req.artist, req.album].filter(Boolean).join(' · ');
        const statusText = isPlayed ? 'Played' : 'Waiting';
        
        const item = document.createElement('div');
        item.className = 'req-item ' + (isPlayed ? 'played' : 'waiting');

        const topRowHtml = '<div class="req-top-row"><span class="req-idx">' + idxStr + '</span><span class="req-status">' + statusText + '</span>' + (timeDisp ? '<span class="req-top-time">' + esc(timeDisp) + '</span>' : '') + '</div>';
        
        const coverHtml = '<img class="req-cover" src="' + thumb(req.cover) + '" crossorigin="anonymous" alt="" width="64" loading="lazy">';

        let artistHtml = artistTxt ? '<div class="req-artist">' + esc(artistTxt) + '</div>' : '';
        let metaHtml = '';
        if (req.name) metaHtml += '<div class="req-user">' + esc(req.name) + '</div>';
        if (req.memo) metaHtml += '<div class="req-memo">\u201c' + esc(req.memo) + '\u201d</div>';

        const bodyHtml = '<div class="req-body"><span class="req-track">' + esc(req.track) + '</span>' + artistHtml + metaHtml + '</div>';
        const mainRowHtml = '<div class="req-main-row">' + coverHtml + bodyHtml + '</div>';

        item.innerHTML = topRowHtml + mainRowHtml;
        frag.appendChild(item);
      });
      reqList.innerHTML = '';
      reqList.appendChild(frag);
    }

    function sortRequests(arr) {
      return arr.slice().sort(function(a, b) {
        const aP = a.status.toUpperCase() === 'Y';
        const bP = b.status.toUpperCase() === 'Y';
        if (!aP && bP) return -1;
        if (aP && !bP) return  1;
        return a.ts - b.ts;
      });
    }

    async function fetchRequests() {
      const url = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:json&sheet=Requests&_=' + Date.now();
      try {
        const res  = await fetch(url);
        const text = await res.text();
        const json = JSON.parse(text.replace(/^[^{]*/, '').replace(/\);\s*$/, ''));
        const rows = (json.table && json.table.rows) ? json.table.rows : [];
        const parsed = rows.map(function(r) {
          if (!r || !r.c) return null;
          function get(i) { const cell = r.c[i]; return cell ? String(cell.f || cell.v || '') : ''; }
          return {
            rawTime: get(0), artist: get(1), album: get(2), track: get(3),
            name: get(4), memo: get(5), cover: get(6), status: get(7), ts: parseTime(get(0)).ts,
          };
        }).filter(function(r) {
          return r && r.track && r.track !== 'Track' && r.track !== '곡명' && r.artist !== 'SWITCH' && r.artist !== 'Artist';
        });

        if (parsed.length === 0) return;
        allRequests = sortRequests(parsed);
        reqLoading.classList.add('hidden');
        updateSync();
        renderRequests();
      } catch (e) {
        console.warn('fetch failed:', e);
        reqLoading.classList.add('hidden');
        reqEmpty.classList.remove('hidden');
      }
    }

    fetchRequests();
    setInterval(fetchRequests, 10000);

    /* ── 이미지 다운로드 로직 ── */
    downloadBtn.addEventListener('click', async function() {
      if (allRequests.length === 0) {
        alert('저장할 신청곡이 없습니다.');
        return;
      }

      const originalIcon = downloadBtn.innerHTML;
      downloadBtn.innerHTML = '<div class="spinner" style="width:16px;height:16px;border-width:1.5px;border-top-color:#fff;"></div>';
      downloadBtn.disabled = true;

      const now = new Date();
      const hoursCurrent = String(now.getHours()).padStart(2, '0');
      const minsCurrent = String(now.getMinutes()).padStart(2, '0');
      document.getElementById('capStatusTime').textContent = `${hoursCurrent}:${minsCurrent}`;

      const yyyy = now.getFullYear();
      const mm = String(now.getMonth() + 1).padStart(2, '0');
      const dd = String(now.getDate()).padStart(2, '0');
      
      // 요청곡 중 가장 오래된 날짜 추출하여 플레이리스트 날짜로 세팅 (YYYY.MM.DD 포맷으로 변경)
      const validReqs = allRequests.filter(r => r.ts > 0);
      let oldestDateStr = '';
      if (validReqs.length > 0) {
        const oldestTs = Math.min(...validReqs.map(r => r.ts));
        const oldestD = new Date(oldestTs);
        const yyyyStr = oldestD.getFullYear();
        const mmStr = String(oldestD.getMonth() + 1).padStart(2, '0');
        const ddStr = String(oldestD.getDate()).padStart(2, '0');
        oldestDateStr = `${yyyyStr}.${mmStr}.${ddStr}`;
      } else {
        oldestDateStr = 'Just now';
      }
      document.getElementById('capOldestDate').textContent = oldestDateStr;

      // 동적 그리드 계산 로직 (2x2, 3x3, 4x4, 5x5)
      const count = allRequests.length;
      let gridN = 2; // 기본 2x2
      if (count > 16) gridN = 5;
      else if (count > 9) gridN = 4;
      else if (count > 4) gridN = 3;

      const gridEl = document.getElementById('captureGrid');
      gridEl.style.gridTemplateColumns = `repeat(${gridN}, 1fr)`;
      gridEl.style.gridTemplateRows = `repeat(${gridN}, 1fr)`;

      const covers = allRequests.map(r => r.cover).filter(Boolean);
      const gridHtml = [];
      const totalSlots = gridN * gridN;
      
      for (let i = 0; i < totalSlots; i++) {
        if (i < covers.length) {
          gridHtml.push(`<img src="${thumb(covers[i])}" crossorigin="anonymous">`);
        } else {
          // 비어있는 슬롯은 스포티파이 느낌을 살려 다크 그레이 배경 처리
          gridHtml.push(`<div style="background-color: #1a1a1a; width: 100%; height: 100%;"></div>`);
        }
      }
      gridEl.innerHTML = gridHtml.join('');

      document.getElementById('captureList').innerHTML = reqList.innerHTML;

      const container = document.getElementById('captureContainer');

      try {
        await new Promise(resolve => setTimeout(resolve, 500));

        const canvas = await html2canvas(container, {
          useCORS: true,       
          allowTaint: true,    
          backgroundColor: '#121212', 
          scale: 2,
          windowWidth: 540,
          onclone: (clonedDoc) => {
            const clonedContainer = clonedDoc.getElementById('captureContainer');
            clonedContainer.style.left = '0';
          }
        });

        // 다운로드 로직: 갤러리 저장을 위해 다시 a 태그 다운로드 형태로 원복
        const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
        const link = document.createElement('a');
        link.download = `Stylus_Playlist_${yyyy}${mm}${dd}.jpg`;
        link.href = dataUrl;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);

      } catch (error) {
        console.error('이미지 생성 실패:', error);
        alert('이미지 생성 중 오류가 발생했습니다.');
      } finally {
        downloadBtn.innerHTML = originalIcon;
        downloadBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
