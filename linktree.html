<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Stylus Linktree</title>
    
    <!-- 오픈그래프(Open Graph) 메타 태그 -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://stylusseoul.github.io/vinyl/linktree.html">
    <meta property="og:title" content="Stylus Linktree">
    <meta property="og:description" content="Sound · Space · Serenity">
    <meta property="og:image" content="https://stylusseoul.github.io/vinyl/images/linktree_OG.jpg">
    
    <!-- Twitter 카드 태그 -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Stylus Linktree">
    <meta name="twitter:description" content="Sound · Space · Serenity">
    <meta name="twitter:image" content="https://stylusseoul.github.io/vinyl/images/linktree_OG.jpg">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@300;400;600&family=Noto+Sans+KR:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web" defer></script>
    <style>
        :root {
            --bg:      #000000; 
            --surface: rgba(255, 255, 255, 0.06); 
            --surface-active: rgba(255, 255, 255, 0.12);
            --border:  rgba(255, 255, 255, 0.1);
            --border-active: rgba(239, 124, 28, 0.6);
            --text:    #ffffff;
            --sub:     rgba(255, 255, 255, 0.55);
            --accent:  #EF7C1C; 
            --font:    'Inter', -apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif;
            
            /* [수정] 상단 여백 축소에 따른 중심점 조정: body padding-top(40px) + 썸네일 반지름(63px) = 103px */
            --center-y: 103px; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: var(--font); 
            line-height: 1.6; 
            -webkit-font-smoothing: antialiased; 
            min-height: 100dvh; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            /* [수정] 상단 여백 60px -> 40px로 축소 */
            padding: 40px 20px 30px; 
            position: relative;
            overflow-x: hidden;
        }

        /* 바이닐 그루브 & 광택 배경 */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0; 
            z-index: -2;
            background: 
                repeating-radial-gradient(
                    circle at 50% var(--center-y),
                    transparent 0,
                    transparent 2px,
                    rgba(255, 255, 255, 0.035) 3px,
                    rgba(255, 255, 255, 0.035) 4px
                ),
                conic-gradient(
                    from 20deg at 50% var(--center-y),
                    transparent 0deg,
                    rgba(255, 255, 255, 0.08) 30deg,
                    rgba(239, 124, 28, 0.06) 45deg,
                    transparent 80deg,
                    transparent 180deg,
                    rgba(255, 255, 255, 0.08) 210deg,
                    rgba(239, 124, 28, 0.06) 225deg,
                    transparent 260deg,
                    transparent 360deg
                );
            pointer-events: none;
        }

        /* 앰비언트 글로우 */
        body::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 50% var(--center-y), rgba(239, 124, 28, 0.15) 0%, transparent 70%);
            z-index: -1;
            pointer-events: none;
        }

        .eng { font-family: 'Outfit', sans-serif; }

        @keyframes fadeUp { 
            from { opacity: 0; transform: translateY(15px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        
        .animate-up { animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.15s; }
        .delay-3 { animation-delay: 0.2s; }
        .delay-4 { animation-delay: 0.25s; }

        /* Profile Hero Section */
        .hero-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            /* [수정] 하단 여백 40px -> 24px로 축소 */
            margin-bottom: 24px;
            text-align: center;
            width: 100%;
            max-width: 440px;
        }

        .vinyl-record {
            width: 126px; 
            height: 126px;
            border-radius: 50%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            /* [수정] 이미지 하단 여백 24px -> 16px로 축소 */
            margin-bottom: 16px;
            position: relative;
            box-shadow: 
                0 0 0 1px rgba(255, 255, 255, 0.08),
                0 15px 45px rgba(0, 0, 0, 1),
                0 0 20px rgba(239, 124, 28, 0.2), 
                inset 0 0 0 2px rgba(0,0,0,0.6);
        }

        .vinyl-record img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            box-shadow: 0 0 0 2px #000;
        }

        .vinyl-record::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: conic-gradient(
                from 20deg at center,
                transparent 0deg,
                rgba(255, 255, 255, 0.1) 40deg,
                transparent 80deg,
                transparent 180deg,
                rgba(255, 255, 255, 0.1) 220deg,
                transparent 260deg,
                transparent 360deg
            );
            z-index: 1;
            pointer-events: none;
        }

        .vinyl-record::after {
            content: '';
            position: absolute;
            width: 6px;
            height: 6px;
            background: #000;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.8);
            z-index: 2;
        }

        .hero-title {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 0.01em;
            margin-bottom: 6px;
            color: var(--text);
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .hero-desc {
            font-size: 14px;
            font-weight: 400;
            color: var(--sub);
            letter-spacing: 0.05em;
        }

        /* Bento Grid UI */
        .bento-grid {
            width: 100%;
            max-width: 440px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .bento-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            text-decoration: none;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1), background 0.2s, border-color 0.2s;
        }

        .bento-card:active {
            transform: scale(0.96); 
            background: var(--surface-active);
            border-color: var(--border-active);
            box-shadow: 0 0 20px rgba(239, 124, 28, 0.15);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            width: 100%;
        }

        .card-icon { font-size: 28px; color: var(--text); }
        .card-arrow { font-size: 20px; color: var(--sub); }

        .bento-card:active .card-icon,
        .bento-card:active .card-arrow {
            color: var(--accent);
        }
        
        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 4px;
            line-height: 1.3;
            word-break: keep-all;
            margin-top: 32px;
        }

        .card-subtitle {
            font-size: 13px;
            font-weight: 400;
            color: var(--sub);
            letter-spacing: 0.02em;
        }

        .span-2 { grid-column: span 2; }
        .bento-card:not(.span-2) { aspect-ratio: 1 / 1; }
        
        .live-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(239, 124, 28, 0.18);
            padding: 5px 12px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        .live-dot {
            width: 6px; height: 6px;
            background: var(--accent);
            border-radius: 50%;
            animation: pulse-dot 2s infinite;
        }
        @keyframes pulse-dot {
            0% { box-shadow: 0 0 0 0 rgba(239, 124, 28, 0.4); }
            70% { box-shadow: 0 0 0 6px rgba(239, 124, 28, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 124, 28, 0); }
        }

        /* Footer */
        .footer {
            margin-top: auto;
            padding-top: 40px;
            padding-bottom: 20px;
            font-size: 12px;
            font-weight: 400;
            color: var(--sub);
            letter-spacing: 0.05em;
            text-align: center;
        }
    </style>
</head>
<body>

    <!-- Hero Section -->
    <div class="hero-container animate-up">
        <div class="vinyl-record">
            <img src="https://stylusseoul.github.io/vinyl/images/linktree_thumbnail.jpg" alt="Stylus Logo Label">
        </div>
        <h1 class="hero-title eng">Welcome to Stylus</h1>
        <p class="hero-desc eng">Sound · Space · Serenity</p>
    </div>

    <!-- Bento Grid Menu -->
    <div class="bento-grid">
        
        <!-- 1. Seat Map (Wide) -->
        <a href="https://stylusseoul.github.io/vinyl/seatmap.html" class="bento-card span-2 animate-up delay-1">
            <div class="card-header">
                <div class="live-badge eng"><div class="live-dot"></div>Live</div>
                <i class="ph-bold ph-arrow-up-right card-arrow"></i>
            </div>
            <div class="card-content">
                <h2 class="card-title">실시간 좌석 확인</h2>
                <p class="card-subtitle eng">Live Seat Map</p>
            </div>
        </a>

        <!-- 2. Directions (Square) -->
        <a href="https://www.notion.so/2be59aa3ab6180519edef1d72baac966" target="_blank" class="bento-card animate-up delay-2">
            <div class="card-header">
                <i class="ph-fill ph-map-pin card-icon"></i>
                <i class="ph-bold ph-arrow-up-right card-arrow"></i>
            </div>
            <div class="card-content">
                <h2 class="card-title">오시는 길</h2>
                <p class="card-subtitle eng">Directions</p>
            </div>
        </a>

        <!-- 3. User Guide (Square) -->
        <a href="https://stylusseoul.github.io/vinyl/userguide.html" class="bento-card animate-up delay-3">
            <div class="card-header">
                <i class="ph-fill ph-book-open-text card-icon"></i>
                <i class="ph-bold ph-arrow-up-right card-arrow"></i>
            </div>
            <div class="card-content">
                <h2 class="card-title">이용 안내</h2>
                <p class="card-subtitle eng">User Guide</p>
            </div>
        </a>

        <!-- 4. Vinyl Explorer (Wide) -->
        <a href="https://stylusseoul.github.io/vinyl/" class="bento-card span-2 animate-up delay-4">
            <div class="card-header">
                <i class="ph-fill ph-vinyl-record card-icon"></i>
                <i class="ph-bold ph-arrow-up-right card-arrow"></i>
            </div>
            <div class="card-content">
                <h2 class="card-title">바이닐 검색기</h2>
                <p class="card-subtitle eng">Vinyl Explorer</p>
            </div>
        </a>

    </div>

    <!-- Footer -->
    <div class="footer animate-up delay-4 eng">
        © Stylus Seoul. All rights reserved.
    </div>

</body>
</html>
