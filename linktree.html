<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>STYLUS | Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@300;400;600&family=Noto+Sans+KR:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web" defer></script>
    <style>
        :root {
            --bg:      #030303; /* 더욱 깊어진 순수 블랙 */
            --surface: rgba(255, 255, 255, 0.04); 
            --surface-active: rgba(255, 255, 255, 0.08);
            --border:  rgba(255, 255, 255, 0.08);
            --border-active: rgba(239, 124, 28, 0.5);
            --text:    #ffffff;
            --sub:     rgba(255, 255, 255, 0.5);
            --accent:  #EF7C1C; /* 브랜드 오렌지 */
            --font:    'Inter', -apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif;
            
            /* 프로필 썸네일 기준점: body padding-top(60px) + 썸네일 반지름(90px) = 150px */
            --center-y: 150px; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: var(--font); 
            line-height: 1.6; 
            -webkit-font-smoothing: antialiased; 
            min-height: 100dvh; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            padding: 60px 20px 40px; 
            position: relative;
            overflow-x: hidden;
        }

        /* 바이닐 그루브 & 광택 배경 - 갈색 톤을 제거한 선명한 오렌지/화이트 믹스 */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0; 
            z-index: -2;
            background: 
                /* 소리골 패턴: 오렌지 채도를 살짝 높이고 투명도를 조절하여 탁함 방지 */
                repeating-radial-gradient(
                    circle at 50% var(--center-y),
                    transparent 0,
                    transparent 2px,
                    rgba(239, 124, 28, 0.03) 3px,
                    rgba(239, 124, 28, 0.03) 4px
                ),
                /* 광택: 갈색 느낌이 나지 않도록 순수 화이트 광택 위주로 배치 */
                conic-gradient(
                    from 20deg at 50% var(--center-y),
                    transparent 0deg,
                    rgba(255, 255, 255, 0.03) 40deg,
                    transparent 80deg,
                    transparent 180deg,
                    rgba(255, 255, 255, 0.03) 220deg,
                    transparent 260deg,
                    transparent 360deg
                );
            pointer-events: none;
        }

        /* 앰비언트 글로우 - 맑은 오렌지 톤으로 포인트 */
        body::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 50% var(--center-y), rgba(239, 124, 28, 0.06) 0%, transparent 65%);
            z-index: -1;
            pointer-events: none;
        }

        .eng { font-family: 'Outfit', sans-serif; }

        @keyframes fadeUp { 
            from { opacity: 0; transform: translateY(15px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        
        .animate-up { animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.15s; }
        .delay-3 { animation-delay: 0.2s; }
        .delay-4 { animation-delay: 0.25s; }

        /* Profile Hero Section */
        .hero-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 40px;
            text-align: center;
            width: 100%;
            max-width: 440px;
        }

        /* 썸네일: 배경과 자연스럽게 묻히도록 오렌지 림 라이트(Rim light) 추가 */
        .vinyl-record {
            width: 180px; 
            height: 180px;
            border-radius: 50%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            /* 갈색 그림자를 배제한 딥 블랙 쉐도우 + 미세한 오렌지 광선 */
            box-shadow: 
                0 25px 60px rgba(0, 0, 0, 0.9), 
                0 0 0 1px rgba(255, 255, 255, 0.05),
                0 0 15px rgba(239, 124, 28, 0.1);
            position: relative;
            will-change: transform;
        }

        .vinyl-record img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        /* LP판 중앙 구멍: 핀 역할을 하는 스핀들 홀 */
        .vinyl-record::after {
            content: '';
            position: absolute;
            width: 8px;
            height: 8px;
            background: #030303;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.8);
        }

        .hero-title {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 0.01em;
            margin-bottom: 8px;
            color: var(--text);
        }

        .hero-desc {
            font-size: 14px;
            font-weight: 400;
            color: var(--sub);
            letter-spacing: 0.05em;
        }

        /* Bento Grid UI */
        .bento-grid {
            width: 100%;
            max-width: 440px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .bento-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            text-decoration: none;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1), background 0.2s, border-color 0.2s;
        }

        .bento-card:active {
            transform: scale(0.96); 
            background: var(--surface-active);
            border-color: var(--border-active);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            width: 100%;
        }

        .card-icon { font-size: 28px; color: var(--text); }
        .card-arrow { font-size: 20px; color: var(--sub); }

        .bento-card:active .card-icon,
        .bento-card:active .card-arrow {
            color: var(--accent);
        }
        
        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 4px;
            line-height: 1.3;
            word-break: keep-all;
            margin-top: 32px;
        }

        .card-subtitle {
            font-size: 13px;
            font-weight: 400;
            color: var(--sub);
            letter-spacing: 0.02em;
        }

        .span-2 { grid-column: span 2; }
        .bento-card:not(.span-2) { aspect-ratio: 1 / 1; }
        
        .live-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(239, 124, 28, 0.12);
            padding: 5px 12px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        .live-dot {
            width: 6px; height: 6px;
            background: var(--accent);
            border-radius: 50%;
            animation: pulse-dot 2s infinite;
        }
        @keyframes pulse-dot {
            0% { box-shadow: 0 0 0 0 rgba(239, 124, 28, 0.4); }
            70% { box-shadow: 0 0 0 6px rgba(239, 124, 28, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 124, 28, 0); }
        }

        /* Footer */
        .footer {
            margin-top: auto;
            padding-top: 50px;
            padding-bottom: 20px;
            font-size: 12px;
            font-weight: 400;
            color: var(--sub);
            letter-spacing: 0.05em;
            text-align: center;
        }
    </style>
</head>
<body>

    <!-- Hero Section -->
    <div class="hero-container animate-up">
        <div class="vinyl-record">
            <img src="https://stylusseoul.github.io/vinyl/images/linktree_thumbnail.jpg" alt="Stylus Logo Label">
        </div>
        <h1 class="hero-title eng">Welcome to Stylus</h1>
        <p class="hero-desc eng">Sound · Space · Serenity</p>
    </div>

    <!-- Bento Grid Menu -->
    <div class="bento-grid">
        
        <!-- 1. Seat Map (Wide) -->
        <a href="https://stylusseoul.github.io/vinyl/seatmap.html" class="bento-card span-2 animate-up delay-1">
            <div class="card-header">
                <div class="live-badge eng"><div class="live-dot"></div>Live</div>
                <i class="ph-bold ph-arrow-up-right card-arrow"></i>
            </div>
            <div class="card-content">
                <h2 class="card-title">실시간 좌석 확인</h2>
                <p class="card-subtitle eng">Live Seat Map</p>
            </div>
        </a>

        <!-- 2. Directions (Square) -->
        <a href="https://www.notion.so/2be59aa3ab6180519edef1d72baac966" target="_blank" class="bento-card animate-up delay-2">
            <div class="card-header">
                <i class="ph-fill ph-map-pin card-icon"></i>
                <i class="ph-bold ph-arrow-up-right card-arrow"></i>
            </div>
            <div class="card-content">
                <h2 class="card-title">오시는 길</h2>
                <p class="card-subtitle eng">Directions</p>
            </div>
        </a>

        <!-- 3. User Guide (Square) -->
        <a href="https://stylusseoul.github.io/vinyl/userguide.html" class="bento-card animate-up delay-3">
            <div class="card-header">
                <i class="ph-fill ph-book-open-text card-icon"></i>
                <i class="ph-bold ph-arrow-up-right card-arrow"></i>
            </div>
            <div class="card-content">
                <h2 class="card-title">이용 안내</h2>
                <p class="card-subtitle eng">User Guide</p>
            </div>
        </a>

        <!-- 4. Vinyl Explorer (Wide) -->
        <a href="https://stylusseoul.github.io/vinyl/" class="bento-card span-2 animate-up delay-4">
            <div class="card-header">
                <i class="ph-fill ph-vinyl-record card-icon"></i>
                <i class="ph-bold ph-arrow-up-right card-arrow"></i>
            </div>
            <div class="card-content">
                <h2 class="card-title">바이닐 검색기</h2>
                <p class="card-subtitle eng">Vinyl Explorer</p>
            </div>
        </a>

    </div>

    <!-- Footer -->
    <div class="footer animate-up delay-4 eng">
        © Stylus Seoul. All rights reserved.
    </div>

</body>
</html>
